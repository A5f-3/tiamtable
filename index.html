<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSchedule Pro</title>
<style>
/* ============ RESET & VARIABLES ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-w:240px;--header-h:56px;
  --primary:#1a365d;--primary-light:#2b6cb0;--primary-lighter:#ebf4ff;--primary-dark:#0f2440;
  --accent:#319795;--accent-light:#81e6d9;--accent-bg:#e6fffa;
  --success:#48bb78;--success-bg:#f0fff4;--warning:#ecc94b;--warning-bg:#fffff0;--danger:#f56565;--danger-bg:#fff5f5;
  --bg:#f0f4f8;--card:#ffffff;--text:#1a202c;--text-sec:#4a5568;--text-light:#718096;--text-lighter:#a0aec0;
  --border:#e2e8f0;--border-light:#edf2f7;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.03);
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
}
html{font-size:14.5px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;overflow:hidden;height:100vh}
a{color:var(--primary-light);text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;background:none;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:.92rem}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#a0aec0}

/* ============ APP SHELL ============ */
.app-shell{display:flex;height:100vh;overflow:hidden}

/* ============ SIDEBAR ============ */
.sidebar{width:var(--sidebar-w);background:var(--primary-dark);color:#fff;display:flex;flex-direction:column;flex-shrink:0;z-index:120;transition:transform .3s}
.sidebar-brand{padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand svg{width:30px;height:30px;flex-shrink:0}
.sidebar-brand span{font-size:1.15rem;font-weight:700;letter-spacing:-.3px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.sidebar-section{padding:0 12px;margin-bottom:8px}
.sidebar-section-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.35);padding:8px 12px 4px;font-weight:600}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--radius-xs);color:rgba(255,255,255,.7);font-size:.88rem;font-weight:500;transition:.15s;cursor:pointer;margin-bottom:1px}
.sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-item.active{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
.sidebar-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
.sidebar-item.active svg{opacity:1}
.sidebar-item .si-badge{margin-left:auto;font-size:.7rem;background:var(--accent);color:#fff;padding:1px 7px;border-radius:10px;font-weight:600}
.sidebar-courses{padding:6px 12px}
.sidebar-course{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:var(--radius-xs);color:rgba(255,255,255,.6);font-size:.83rem;cursor:pointer;transition:.15s}
.sidebar-course:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-course.active{background:rgba(255,255,255,.12);color:#fff}
.sidebar-course .sc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-course .sc-lock{font-size:.7rem;margin-left:auto;opacity:.4}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:.78rem;color:rgba(255,255,255,.3);text-align:center}

/* ============ MAIN AREA ============ */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ============ HEADER ============ */
.header{height:var(--header-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;z-index:110}
.header-hamburger{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:var(--radius-xs);color:var(--text)}
.header-hamburger:hover{background:var(--bg)}
.header-hamburger svg{width:22px;height:22px}
.header-greeting{font-size:1.05rem;font-weight:700;color:var(--primary);white-space:nowrap}
.header-search{flex:1;max-width:380px;position:relative}
.header-search input{width:100%;padding:8px 14px 8px 36px;border:1.5px solid var(--border);border-radius:20px;font-size:.87rem;background:var(--bg);transition:.2s}
.header-search input:focus{outline:none;border-color:var(--primary-light);background:var(--card)}
.header-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-lighter)}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.header-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.15s;color:var(--text-light);position:relative}
.header-btn:hover{background:var(--bg);color:var(--text)}
.header-btn svg{width:18px;height:18px}
.header-btn .notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid var(--card)}
.header-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-size:.82rem;font-weight:700;cursor:pointer}

/* ============ CONTENT ============ */
.content{flex:1;overflow-y:auto;padding:20px 24px 30px}

/* ============ DASHBOARD GRID ============ */
.dash-top{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.summary-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;transition:.2s;cursor:default}
.summary-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.sc-icon{width:42px;height:42px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc-icon svg{width:20px;height:20px}
.sc-info{min-width:0}
.sc-num{font-size:1.45rem;font-weight:800;line-height:1.2}
.sc-label{font-size:.75rem;color:var(--text-light);font-weight:500;white-space:nowrap}

.dash-main{display:grid;grid-template-columns:1fr 340px;gap:18px;margin-bottom:20px;align-items:start}
.dash-bottom{display:grid;grid-template-columns:1fr 1fr;gap:18px}

/* ============ PANEL CARDS ============ */
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
/* Calendar panel — JS sets height to match right column; inner body scrolls vertically */
.panel.cal-panel{
  display:flex;flex-direction:column;
  overflow:hidden;
  min-width:0;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-light);flex-shrink:0}
.panel-title{font-size:.92rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:7px}
.panel-title svg{width:16px;height:16px;opacity:.6}
.panel-actions{display:flex;gap:4px}
.panel-body{padding:14px 18px;flex:1;overflow-y:auto}
.panel-body-compact{padding:8px 14px;flex:1;overflow-y:auto}
.panel-footer{padding:10px 18px;border-top:1px solid var(--border-light);text-align:center}
.panel-footer a{font-size:.82rem;font-weight:600;color:var(--primary-light)}

/* ============ BUTTONS ============ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:var(--radius-xs);font-size:.84rem;font-weight:600;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-light)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#2c7a7b}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#38a169}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#e53e3e}
.btn-outline{border:1.5px solid var(--border);color:var(--text-sec);background:var(--card)}.btn-outline:hover{border-color:var(--primary-light);color:var(--primary-light)}
.btn-ghost{color:var(--text-light);padding:5px 10px}.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:5px 11px;font-size:.79rem}
.btn-xs{padding:3px 8px;font-size:.75rem;border-radius:4px}
.btn-icon-sm{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:50%}
.btn svg{width:14px;height:14px}

/* ============ QUICK ACTIONS ============ */
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.qa-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;font-size:.82rem;font-weight:600;color:var(--text-sec);transition:.15s;cursor:pointer}
.qa-btn:hover{border-color:var(--primary-light);color:var(--primary-light);box-shadow:var(--shadow)}
.qa-btn svg{width:14px;height:14px}

/* ============ UNIVERSITY SCHEDULE ============ */
.us-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.us-filter-group{display:flex;align-items:center;gap:6px}
.us-filter-label{font-size:.78rem;font-weight:600;color:var(--text-sec);white-space:nowrap}
.us-chip{padding:5px 14px;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text-sec);transition:.15s;white-space:nowrap}
.us-chip:hover{border-color:var(--primary-light);color:var(--primary-light)}
.us-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.us-chip.active-f{background:#d53f8c;color:#fff;border-color:#d53f8c}
.us-chip.active-m{background:var(--primary-light);color:#fff;border-color:var(--primary-light)}
.us-week-nav{display:flex;align-items:center;gap:8px;margin-left:auto}
.us-week-label{font-size:.9rem;font-weight:700;color:var(--primary);min-width:90px;text-align:center}
.us-grid{display:grid;grid-template-columns:100px repeat(9,1fr);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
.us-grid-header{background:var(--primary-dark);color:#fff;padding:8px 4px;font-size:.68rem;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;line-height:1.2;border-right:1px solid rgba(255,255,255,.1)}
.us-grid-header:last-child{border-right:none}
.us-grid-day{background:var(--primary-lighter);padding:8px 6px;font-size:.78rem;font-weight:700;color:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);line-height:1.3}
.us-grid-day.today-row{background:#e6fffa;border-left:3px solid var(--accent)}
.us-grid-day .us-day-name{font-size:.82rem}
.us-grid-day .us-day-date{font-size:.68rem;color:var(--text-light);font-weight:500}
.us-grid-day .us-day-gender{font-size:.62rem;padding:1px 6px;border-radius:8px;margin-top:2px;font-weight:600}
.us-gender-m{background:#bee3f8;color:#2a4365}
.us-gender-f{background:#fed7e2;color:#97266d}
.us-cell{border-bottom:1px solid var(--border-light);border-right:1px solid var(--border-light);padding:2px;min-height:52px;position:relative;display:flex;flex-direction:column;gap:1px}
.us-cell:hover{background:var(--bg)}
.us-cell.break-cell{background:repeating-linear-gradient(45deg,var(--border-light),var(--border-light) 4px,transparent 4px,transparent 8px);pointer-events:none}
.us-entry{padding:3px 5px;border-radius:4px;font-size:.65rem;line-height:1.25;cursor:pointer;transition:.12s;position:relative;border-left:3px solid transparent;font-weight:500}
.us-entry:hover{transform:scale(1.02);box-shadow:var(--shadow-md);z-index:5}
.us-entry .us-entry-title{font-weight:600;margin-bottom:1px}
.us-entry .us-entry-meta{opacity:.7;font-size:.6rem}
.us-entry-lecture{background:#ebf4ff;border-left-color:#3182ce;color:#2a4365}
.us-entry-practical{background:#f0fff4;border-left-color:#38a169;color:#276749}
.us-entry-workshop{background:#fefcbf;border-left-color:#d69e2e;color:#975a16}
.us-entry-tutor{background:#faf5ff;border-left-color:#805ad5;color:#553c9a}
.us-entry-exam{background:#fff5f5;border-left-color:#e53e3e;color:#9b2c2c;font-weight:700}
.us-entry-pd2{background:#e6fffa;border-left-color:#319795;color:#234e52}
.us-entry-research{background:#fdf2f8;border-left-color:#d53f8c;color:#97266d}
.us-entry-response{background:#fffaf0;border-left-color:#dd6b20;color:#7b341e}
.us-entry-patient{background:#fef3c7;border-left-color:#b7791f;color:#744210}
.us-entry-sdl{background:#edf2f7;border-left-color:#a0aec0;color:#718096}
.us-entry-orientation{background:#ebf4ff;border-left-color:#2b6cb0;color:#2b6cb0}
.us-entry-holiday{background:#fed7d7;border-left-color:#e53e3e;color:#9b2c2c;text-align:center;font-weight:700;font-size:.78rem}
.us-entry-other{background:var(--bg);border-left-color:var(--text-lighter);color:var(--text-sec)}
.us-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.us-legend-item{display:flex;align-items:center;gap:4px;font-size:.72rem;font-weight:500;color:var(--text-sec)}
.us-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.us-list-view{display:flex;flex-direction:column;gap:8px}
.us-list-day{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.us-list-day-header{padding:10px 16px;background:var(--primary-lighter);font-weight:700;font-size:.9rem;color:var(--primary);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.us-list-day-header.today-header{background:#e6fffa;border-left:4px solid var(--accent)}
.us-list-sessions{padding:6px 12px}
.us-list-item{display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--border-light);transition:.1s}
.us-list-item:last-child{border-bottom:none}
.us-list-item:hover{background:var(--bg);border-radius:var(--radius-xs)}
.us-list-time{font-size:.78rem;font-weight:600;color:var(--text-light);min-width:95px;white-space:nowrap}
.us-list-badge{padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700;white-space:nowrap}
.us-list-title{flex:1;font-size:.85rem;font-weight:600;min-width:0}
.us-list-group{font-size:.7rem;padding:1px 7px;border-radius:10px;background:var(--bg);color:var(--text-sec);font-weight:600;white-space:nowrap}
.us-list-add{flex-shrink:0}
.us-pref-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--accent-bg);border-radius:var(--radius-sm);margin-bottom:12px;border:1px solid #b2f5ea}
.us-pref-bar span{font-size:.82rem;color:var(--accent);font-weight:600;flex:1}
.us-search{padding:7px 14px 7px 34px;border:1.5px solid var(--border);border-radius:20px;font-size:.84rem;background:var(--card);min-width:160px;transition:.2s}
.us-search:focus{outline:none;border-color:var(--primary-light)}
.us-search-wrap{position:relative;display:flex;align-items:center}
.us-search-wrap svg{position:absolute;left:10px;width:15px;height:15px;color:var(--text-lighter);pointer-events:none}
.us-stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.us-stat-pill{padding:6px 14px;background:var(--card);border-radius:20px;box-shadow:var(--shadow);font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:5px}
.us-added-badge{position:absolute;top:1px;right:1px;width:14px;height:14px;background:var(--success);border-radius:50%;display:flex;align-items:center;justify-content:center}
.us-added-badge svg{width:8px;height:8px;color:#fff}
@media(max-width:900px){.us-grid{grid-template-columns:80px repeat(9,minmax(60px,1fr));overflow-x:auto}.us-controls{flex-direction:column;align-items:stretch}.us-week-nav{margin-left:0;justify-content:center}}
@media(max-width:768px){.us-grid{display:none}.us-list-view-mobile-only{display:block!important}}

/* ============ FOCUS CITY ============ */
.fc-widget{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.fc-widget-header{padding:14px 18px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.fc-widget-title{font-size:.92rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:7px}
.fc-widget-body{padding:14px 18px}
.fc-horiz-layout{display:flex;gap:18px;align-items:stretch}
.fc-horiz-city{flex:0 0 220px;height:160px;border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;transition:.2s}
.fc-horiz-city:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.fc-horiz-city svg{width:100%;height:100%}
.fc-horiz-controls{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px}
.fc-city-preview{width:100%;height:140px;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:12px;cursor:pointer;transition:.2s}
.fc-city-preview:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.fc-stats-row{display:flex;gap:8px;margin-bottom:12px}
.fc-stat{flex:1;text-align:center;padding:6px;background:var(--bg);border-radius:var(--radius-xs)}
.fc-stat-val{font-size:1rem;font-weight:700;color:var(--primary)}
.fc-stat-lbl{font-size:.65rem;color:var(--text-lighter)}
.fc-task-select{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:.82rem;background:var(--card);margin-bottom:10px;font-family:inherit}
.fc-start-btn{width:100%;padding:10px;background:linear-gradient(135deg,#319795,#2b6cb0);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.88rem;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.3px}
.fc-start-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(49,151,149,.25)}
.fc-active-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:600;background:#f0fdf4;color:#16a34a}
.fc-fire-badge{background:#fff7ed;color:#ea580c}
.fc-fullpage{width:100%;height:calc(100vh - var(--header-h) - 40px);border:none;border-radius:var(--radius);overflow:hidden}
.fc-fullpage iframe{width:100%;height:100%;border:none;border-radius:var(--radius)}

/* ============ FOCUS SESSION MINI-TIMER (HEADER BAR) ============ */
.fc-mini-timer{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 8px;background:linear-gradient(135deg,rgba(49,151,149,.08),rgba(56,189,248,.06));border:1.5px solid rgba(49,151,149,.2);border-radius:20px;cursor:pointer;transition:.2s;white-space:nowrap;animation:fc-mini-pulse 3s ease-in-out infinite}
.fc-mini-timer:hover{background:linear-gradient(135deg,rgba(49,151,149,.14),rgba(56,189,248,.1));border-color:rgba(49,151,149,.35);transform:scale(1.02)}
@keyframes fc-mini-pulse{0%,100%{box-shadow:0 0 0 0 rgba(49,151,149,.15)}50%{box-shadow:0 0 0 4px rgba(49,151,149,.08)}}
.fc-mini-dot{width:8px;height:8px;border-radius:50%;background:#319795;animation:fc-dot-blink 1.5s ease-in-out infinite}
@keyframes fc-dot-blink{0%,100%{opacity:1}50%{opacity:.3}}
.fc-mini-time{font-size:.82rem;font-weight:700;color:#319795;font-variant-numeric:tabular-nums;min-width:44px}
.fc-mini-task{font-size:.72rem;color:var(--text-light);max-width:120px;overflow:hidden;text-overflow:ellipsis}
.fc-mini-progress{width:32px;height:4px;border-radius:2px;background:rgba(49,151,149,.12);overflow:hidden}
.fc-mini-progress-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#319795,#2b6cb0);transition:width .3s}

/* ============ DASHBOARD ACTIVE SESSION PANEL ============ */
.fc-active-session{background:linear-gradient(135deg,rgba(49,151,149,.04),rgba(56,189,248,.03));border:1.5px solid rgba(49,151,149,.15);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px}
.fc-active-session-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fc-active-session-title{font-size:.85rem;font-weight:700;color:#319795;display:flex;align-items:center;gap:6px}
.fc-session-timer{font-size:1.6rem;font-weight:800;color:var(--primary);text-align:center;padding:8px 0;font-variant-numeric:tabular-nums;letter-spacing:1px}
.fc-session-progress{width:100%;height:6px;border-radius:3px;background:rgba(49,151,149,.1);overflow:hidden;margin-bottom:8px}
.fc-session-progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#319795,#2b6cb0);transition:width .5s}
.fc-session-task{font-size:.78rem;color:var(--text-light);text-align:center}
.fc-session-actions{display:flex;gap:8px;margin-top:10px}
.fc-session-actions button{flex:1;padding:7px;border-radius:var(--radius-xs);font-size:.8rem;font-weight:600;cursor:pointer;transition:.2s}

/* ============ ALARM SETTINGS ============ */
.fc-alarm-toggle{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg);border-radius:var(--radius-xs);cursor:pointer;transition:.15s;font-size:.78rem;color:var(--text-sec);margin-bottom:10px;border:1px solid transparent}
.fc-alarm-toggle:hover{border-color:var(--border);background:var(--card)}
.fc-alarm-toggle svg{width:14px;height:14px;opacity:.6}
.fc-alarm-panel{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:16px;position:absolute;bottom:calc(100% + 8px);left:0;right:0;z-index:200;animation:fcFadeIn .2s ease-out}
@keyframes fcFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fc-alarm-panel-title{font-size:.85rem;font-weight:700;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.fc-alarm-modes{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fc-alarm-mode{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-xs);cursor:pointer;transition:.15s;border:1.5px solid transparent;font-size:.8rem}
.fc-alarm-mode:hover{background:var(--bg)}
.fc-alarm-mode.selected{background:rgba(49,151,149,.06);border-color:rgba(49,151,149,.2);color:#319795;font-weight:600}
.fc-alarm-mode-icon{font-size:1rem;width:20px;text-align:center}
.fc-alarm-mode-info{flex:1}
.fc-alarm-mode-label{font-weight:600}
.fc-alarm-mode-desc{font-size:.7rem;color:var(--text-lighter);margin-top:1px}
.fc-alarm-sounds{display:flex;flex-direction:column;gap:3px}
.fc-alarm-sounds-title{font-size:.78rem;font-weight:600;color:var(--text-sec);margin-bottom:6px}
.fc-alarm-sound{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:var(--radius-xs);cursor:pointer;transition:.15s;font-size:.8rem;border:1.5px solid transparent}
.fc-alarm-sound:hover{background:var(--bg)}
.fc-alarm-sound.selected{background:rgba(49,151,149,.06);border-color:rgba(49,151,149,.2);color:#319795;font-weight:600}
.fc-alarm-sound-preview{font-size:.7rem;color:var(--accent);cursor:pointer;padding:2px 6px;border-radius:4px;transition:.15s}
.fc-alarm-sound-preview:hover{background:var(--accent-bg)}
.fc-notif-banner{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--radius-xs);font-size:.75rem;color:#9a3412;margin-top:10px;cursor:pointer;transition:.15s}
.fc-notif-banner:hover{background:#ffedd5}

/* ============ FOCUS ALARM SETTINGS ============ */
.fc-alarm-toggle{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:14px;font-size:.7rem;font-weight:600;color:var(--text-light);background:var(--bg);cursor:pointer;transition:.2s;border:1px solid transparent}
.fc-alarm-toggle:hover{border-color:var(--border);color:var(--text-sec)}
.fc-alarm-toggle svg{width:13px;height:13px;opacity:.6}
.fc-alarm-panel{position:absolute;right:0;top:100%;margin-top:6px;width:280px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);border:1px solid var(--border);z-index:200;padding:14px;animation:fc-alarm-in .2s ease-out}
@keyframes fc-alarm-in{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.fc-alarm-panel-title{font-size:.82rem;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.fc-alarm-modes{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fc-alarm-mode{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-xs);cursor:pointer;transition:.15s;border:1.5px solid transparent;font-size:.78rem}
.fc-alarm-mode:hover{background:var(--bg)}
.fc-alarm-mode.selected{background:rgba(49,151,149,.06);border-color:rgba(49,151,149,.2);color:#319795;font-weight:600}
.fc-alarm-mode-icon{font-size:1rem;width:22px;text-align:center}
.fc-alarm-mode-label{flex:1}
.fc-alarm-mode-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center}
.fc-alarm-mode.selected .fc-alarm-mode-check{border-color:#319795;background:#319795}
.fc-alarm-mode.selected .fc-alarm-mode-check::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff}
.fc-alarm-sounds{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.fc-alarm-sound{padding:4px 10px;border-radius:12px;font-size:.72rem;font-weight:600;cursor:pointer;transition:.15s;background:var(--bg);color:var(--text-sec);border:1.5px solid transparent}
.fc-alarm-sound:hover{border-color:var(--border)}
.fc-alarm-sound.selected{background:rgba(49,151,149,.08);border-color:rgba(49,151,149,.25);color:#319795}
.fc-alarm-sound-test{padding:4px 10px;border-radius:12px;font-size:.72rem;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#319795,#2b6cb0);color:#fff;border:none;transition:.15s}
.fc-alarm-sound-test:hover{transform:scale(1.04)}
.fc-notif-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-xs);background:var(--bg);font-size:.75rem;color:var(--text-sec)}
.fc-notif-bar button{padding:3px 10px;border-radius:10px;font-size:.72rem;font-weight:600;background:#319795;color:#fff;border:none;cursor:pointer;transition:.15s}
.fc-notif-bar button:hover{background:#276e6c}
.fc-flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:9998;animation:fc-flash-anim 1.2s ease-out forwards}
@keyframes fc-flash-anim{0%{background:rgba(49,151,149,.15)}100%{background:transparent}}

/* ============ CALENDAR ============ */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav button{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text-sec);transition:.15s}
.cal-nav button svg{width:14px;height:14px}
.cal-nav button:hover{background:var(--primary);color:#fff}
.cal-month{font-size:.95rem;font-weight:700;min-width:140px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;font-size:.7rem;font-weight:600;color:var(--text-lighter);padding:4px 0;text-transform:uppercase}
.cal-day{min-height:58px;padding:3px;border-radius:var(--radius-xs);background:var(--card);border:1.5px solid transparent;cursor:pointer;transition:.12s;position:relative}
.cal-day:hover{border-color:var(--primary-light)}
.cal-day.today{border-color:var(--accent);background:var(--accent-bg)}
.cal-day.other-month{opacity:.35}
.cal-day.selected{border-color:var(--primary);background:var(--primary-lighter)}
.cal-day-num{font-size:.75rem;font-weight:600;margin-bottom:1px}
.cal-dot{width:100%;font-size:.6rem;padding:1px 2px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.cal-dots-more{font-size:.6rem;color:var(--text-lighter);text-align:center}

/* ============ COUNTDOWN COMPACT ============ */
.cd-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.cd-item:last-child{border-bottom:none}
.cd-days-box{width:42px;height:42px;border-radius:var(--radius-xs);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.cd-days-num{font-size:1.1rem;font-weight:800;line-height:1}
.cd-days-lbl{font-size:.55rem;font-weight:600;text-transform:uppercase;opacity:.8}
.cd-info{flex:1;min-width:0}
.cd-title{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cd-date{font-size:.72rem;color:var(--text-lighter)}
.cd-actions{display:flex;gap:3px}

/* ============ TODO COMPACT ============ */
.todo-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-light)}
.todo-item:last-child{border-bottom:none}
.todo-item.completed .todo-text{text-decoration:line-through;opacity:.45}
.todo-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.todo-check.checked{background:var(--success);border-color:var(--success);color:#fff}
.todo-check svg{width:10px;height:10px}
.todo-text{flex:1;font-size:.85rem;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.todo-badge{font-size:.65rem;padding:1px 7px;border-radius:10px;font-weight:600;white-space:nowrap;flex-shrink:0}

/* ============ AGENDA ============ */
.agenda-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.agenda-item:last-child{border-bottom:none}
.agenda-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.agenda-info{flex:1;min-width:0}
.agenda-title{font-size:.85rem;font-weight:600}
.agenda-meta{font-size:.72rem;color:var(--text-lighter)}

/* ============ TABS ============ */
.tabs{display:flex;gap:3px;background:var(--bg);padding:3px;border-radius:var(--radius-sm);overflow-x:auto}
.tab{padding:7px 16px;border-radius:var(--radius-xs);font-size:.84rem;font-weight:600;color:var(--text-light);white-space:nowrap;transition:.15s}
.tab.active{background:var(--primary);color:#fff;box-shadow:var(--shadow)}
.tab:hover:not(.active){background:var(--border-light)}

/* ============ COURSE PAGE CARDS ============ */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.course-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:.2s;cursor:pointer;position:relative}
.course-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.course-card .cc-top{height:6px}
.course-card .cc-body{padding:16px}
.course-card .cc-name{font-size:1rem;font-weight:700;margin-bottom:4px}
.course-card .cc-sub{font-size:.78rem;color:var(--text-light);margin-bottom:10px}
.course-card .cc-price{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:.82rem;font-weight:700}
.cc-price.free{background:var(--success-bg);color:var(--success)}
.cc-price.paid{background:var(--danger-bg);color:var(--danger)}
.cc-lock{position:absolute;top:12px;right:12px;width:26px;height:26px;background:rgba(0,0,0,.05);border-radius:50%;display:flex;align-items:center;justify-content:center}
.cc-lock svg{width:13px;height:13px;color:var(--text-light)}
.cc-unlocked{position:absolute;top:12px;right:12px;width:26px;height:26px;background:var(--success-bg);border-radius:50%;display:flex;align-items:center;justify-content:center}
.cc-unlocked svg{width:13px;height:13px;color:var(--success)}

/* ============ LECTURES ============ */
.lecture-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search-input{padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:.87rem;flex:1;min-width:180px;transition:.2s;background:var(--card)}
.search-input:focus{outline:none;border-color:var(--primary-light)}
.filter-select{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:.82rem;background:var(--card)}
.lecture-group{margin-bottom:16px}
.lecture-group-title{font-size:.95rem;font-weight:700;color:var(--primary);margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--primary-lighter)}
.lecture-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:6px;box-shadow:var(--shadow);transition:.15s;border-left:4px solid var(--border)}
.lecture-item:hover{box-shadow:var(--shadow-md)}
.lecture-item.mastery-green{border-left-color:var(--success);background:var(--success-bg)}
.lecture-item.mastery-yellow{border-left-color:var(--warning);background:var(--warning-bg)}
.lecture-item.mastery-red{border-left-color:var(--danger);background:var(--danger-bg)}
.lecture-item.mastery-started{border-left-color:#90cdf4}
.lec-info{flex:1;min-width:0}
.lec-title{font-size:.88rem;font-weight:600;margin-bottom:2px}
.lec-meta{display:flex;gap:6px;flex-wrap:wrap}
.lec-meta span{font-size:.7rem;padding:1px 7px;border-radius:10px;background:var(--primary-lighter);color:var(--primary);font-weight:500}
.lec-actions{display:flex;gap:5px;flex-shrink:0}

/* ============ STATS ============ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:var(--card);border-radius:var(--radius-sm);padding:14px;box-shadow:var(--shadow);text-align:center}
.stat-num{font-size:1.6rem;font-weight:800;color:var(--primary);line-height:1.2}
.stat-label{font-size:.75rem;color:var(--text-light);font-weight:500}
.progress-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:.4s}
.chart-bar-group{margin-bottom:7px}
.chart-bar-label{font-size:.75rem;color:var(--text-light);margin-bottom:2px}
.chart-bar{height:16px;background:var(--bg);border-radius:4px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;min-width:2px}

/* ============ BADGES ============ */
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.7rem;font-weight:600}
.badge-green{background:#c6f6d5;color:#276749}
.badge-yellow{background:#fefcbf;color:#975a16}
.badge-red{background:#fed7d7;color:#9b2c2c}
.badge-blue{background:#bee3f8;color:#2a4365}
.badge-gray{background:#e2e8f0;color:#4a5568}

/* ============ REVISION HISTORY ============ */
.rev-history{margin-top:8px;padding:10px;background:var(--bg);border-radius:var(--radius-xs)}
.rev-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border-light);font-size:.82rem}
.rev-row:last-child{border-bottom:none}
.rev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ============ MASTERY LEGEND ============ */
.mastery-legend{display:flex;gap:12px;margin:6px 0;font-size:.78rem}
.mastery-legend span{display:flex;align-items:center;gap:4px}
.ml-dot{width:9px;height:9px;border-radius:50%;display:inline-block}

/* ============ MODAL ============ */
.modal-overlay{position:fixed;inset:0;background:rgba(15,36,64,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(2px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:460px;max-height:85vh;overflow-y:auto;transform:translateY(16px) scale(.98);transition:.25s}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-header{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:1.05rem;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-light);font-size:1.1rem;transition:.15s}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:14px 20px 20px}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:.82rem;font-weight:600;margin-bottom:3px;color:var(--text-sec)}
.form-input,.form-select,.form-control{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:.88rem;transition:.2s}
.form-input:focus,.form-select:focus,.form-control:focus{outline:none;border-color:var(--primary-light)}
.form-check{display:flex;align-items:center;gap:8px;font-size:.85rem;cursor:pointer}
.form-check input{width:16px;height:16px;accent-color:var(--primary)}

/* ============ PAYMENT ============ */
.pay-modal-course{text-align:center;padding:16px 0 8px}
.pay-modal-course h3{font-size:1.2rem;font-weight:700}
.pay-modal-price{font-size:1.8rem;font-weight:800;color:var(--primary);margin:6px 0}
.pay-modal-price span{font-size:.85rem;font-weight:400;color:var(--text-light)}
.pay-features{list-style:none;margin:14px 0;text-align:left}
.pay-features li{padding:5px 0;font-size:.87rem;display:flex;align-items:center;gap:8px;color:var(--text-sec)}
.pay-features li::before{content:"✓";color:var(--success);font-weight:700;font-size:.95rem}
.pay-processing{text-align:center;padding:28px 0}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============ EMPTY STATE ============ */
.empty-state{text-align:center;padding:24px 16px;color:var(--text-light)}
.empty-state svg{width:36px;height:36px;margin-bottom:8px;opacity:.35}
.empty-state p{font-size:.88rem}

/* ============ DAY EVENTS PANEL ============ */
.day-events-panel{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-top:10px}
.day-event-item{display:flex;align-items:center;gap:8px;padding:6px;border-radius:var(--radius-xs);margin-bottom:3px;font-size:.85rem}
.day-event-item:hover{background:var(--bg)}
.day-event-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ============ DRAG-AND-DROP CALENDAR ============ */
/* Calendar grid — 7 equal columns, no horizontal overflow ever */
.cal-dnd-grid{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:3px;
  width:100%;
  overflow-x:hidden;
  /* align-content:start so rows size to content height, not stretched */
  align-content:start;
}
.cal-day-name-dnd{
  text-align:center;font-size:.68rem;font-weight:700;
  color:var(--text-lighter);padding:5px 0;
  text-transform:uppercase;letter-spacing:.5px;
  white-space:nowrap;overflow:hidden;
}

/* Day cells — expand vertically to fit all content, no fixed height */
.cal-day-dnd{
  /* no min-height / no fixed height — grows with content */
  padding:4px;border-radius:var(--radius-xs);
  background:var(--card);border:1.5px solid transparent;
  transition:border-color .15s,background .15s;
  position:relative;display:flex;flex-direction:column;gap:2px;
  cursor:default;
  overflow:hidden; /* clip any rogue child, but height still auto */
  min-width:0;     /* prevent cell from escaping grid column width */
}
.cal-day-dnd:hover{border-color:var(--border)}
.cal-day-dnd.today{border-color:var(--accent);background:var(--accent-bg)}
.cal-day-dnd.other-month{opacity:.35}
.cal-day-dnd.selected{border-color:var(--primary);background:var(--primary-lighter)}
/* Drop target highlight while dragging over */
.cal-day-dnd.drag-over{
  border-color:var(--primary-light);
  background:rgba(43,108,176,.07);
  box-shadow:inset 0 0 0 2px rgba(43,108,176,.15);
}
.cal-day-num-dnd{
  font-size:.72rem;font-weight:700;padding:1px 3px;
  flex-shrink:0;line-height:1.3;color:var(--text);
}
.cal-day-dnd.today .cal-day-num-dnd{
  background:var(--accent);color:#fff;border-radius:50%;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
}

/* Event cards — text wraps, no horizontal overflow */
.cal-evt-card{
  padding:3px 5px;border-radius:4px;font-size:.62rem;line-height:1.35;
  cursor:grab;transition:transform .12s,box-shadow .12s,opacity .15s;
  border-left:3px solid transparent;user-select:none;
  position:relative;
  min-width:0;      /* must stay inside grid column */
  width:100%;       /* fill column */
  box-sizing:border-box;
}
.cal-evt-card:hover{transform:scale(1.02);box-shadow:var(--shadow-md);z-index:5}
.cal-evt-card:active{cursor:grabbing;opacity:.7}
.cal-evt-card.dragging{opacity:.4;transform:scale(.97)}
@keyframes calCardDrop{from{transform:scale(.95);opacity:.6}to{transform:scale(1);opacity:1}}
.cal-evt-card.just-dropped{animation:calCardDrop .25s ease-out}
/* Card text: wraps naturally, no forced single line */
.cal-evt-name{
  font-weight:700;
  white-space:normal;   /* WRAP — do not truncate */
  word-break:break-word;
  overflow-wrap:break-word;
  line-height:1.3;
}
.cal-evt-meta{
  opacity:.75;font-size:.58rem;
  white-space:normal;
  word-break:break-word;
  overflow-wrap:break-word;
  line-height:1.25;
}


/* Calendar item edit modal */
.cal-edit-modal-overlay{
  position:fixed;inset:0;background:rgba(15,36,64,.45);z-index:400;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(2px);
}
.cal-edit-modal-overlay.open{opacity:1;pointer-events:all}
.cal-edit-modal{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);
  width:100%;max-width:460px;max-height:88vh;overflow-y:auto;
  transform:translateY(14px) scale(.98);transition:.22s;
}
.cal-edit-modal-overlay.open .cal-edit-modal{transform:none}

/* ============ SETTINGS DROPDOWN ============ */
.settings-dropdown{
  position:absolute;top:calc(100% + 8px);right:0;
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow-lg);border:1px solid var(--border);
  width:280px;z-index:500;
  animation:settingsFadeIn .18s ease-out;
}
@keyframes settingsFadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.settings-dropdown-header{
  padding:12px 16px 10px;
  border-bottom:1px solid var(--border-light);
  font-size:.88rem;font-weight:700;color:var(--primary);
  display:flex;align-items:center;gap:7px;
}
.settings-dropdown-header svg{width:15px;height:15px;opacity:.7}
.settings-section-label{
  padding:10px 16px 4px;
  font-size:.68rem;font-weight:700;color:var(--text-lighter);
  text-transform:uppercase;letter-spacing:.7px;
}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;gap:10px;
}
.settings-row-label{font-size:.85rem;color:var(--text);font-weight:500;line-height:1.35}
.settings-row-sub{font-size:.72rem;color:var(--text-light);margin-top:1px}
/* Toggle switch */
.toggle-switch{
  position:relative;flex-shrink:0;
  width:36px;height:20px;
}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{
  position:absolute;inset:0;
  background:var(--border);border-radius:10px;
  transition:background .2s;cursor:pointer;
}
.toggle-track::after{
  content:'';position:absolute;
  width:14px;height:14px;border-radius:50%;
  background:#fff;top:3px;left:3px;
  transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-switch input:checked+.toggle-track::after{transform:translateX(16px)}


.color-dots{display:flex;gap:8px;margin-top:6px}
.color-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}
.color-dot:hover,.color-dot.selected{border-color:var(--primary);transform:scale(1.1)}

/* ============ MOBILE OVERLAY ============ */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:115}

/* ============ RESPONSIVE ============ */
@media(max-width:1100px){
  .dash-top{grid-template-columns:repeat(3,1fr)}
  .dash-main{grid-template-columns:1fr 280px}
}
@media(max-width:900px){
  .dash-top{grid-template-columns:repeat(2,1fr)}
  .dash-main{grid-template-columns:1fr;align-items:start}
  .dash-bottom{grid-template-columns:1fr}
  .fc-horiz-layout{flex-direction:column}
  .fc-horiz-city{flex:0 0 auto;height:120px;width:100%}
}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:120}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .header-hamburger{display:flex}
  .content{padding:14px 16px 24px}
  .dash-top{grid-template-columns:repeat(2,1fr)}
  .cal-day{min-height:44px}
  /* On small screens show fewer details but still wrap */
  .cal-evt-card{font-size:.58rem;padding:2px 4px}
  .cal-evt-meta{display:none}
  .lecture-controls{flex-direction:column}
  .search-input{min-width:100%}
}
@media(max-width:480px){
  .dash-top{grid-template-columns:1fr 1fr}
  .quick-actions{gap:6px}
  .qa-btn{padding:6px 10px;font-size:.78rem}
}

  if(!S.unlockedCourses)S.unlockedCourses=[];
  if(!S.unlockedCourses.includes('finals-2y'))S.unlockedCourses.push('finals-2y');
  if(!S.customCourses)S.customCourses=[];
  if(!S.courseOverrides)S.courseOverrides={};
  if(!S.lectureStore)S.lectureStore={};
  if(!S.extraSubjects)S.extraSubjects={};
  if(!S.courseDivisions)S.courseDivisions={};
  if(!Array.isArray(S.studyRounds))S.studyRounds=[];
  if(!S.courseSchedules||typeof S.courseSchedules!=='object')S.courseSchedules={};
  if(!S.knowledgeHub||typeof S.knowledgeHub!=='object')S.knowledgeHub={folders:[],activeNoteId:null,name:'Knowledge Hub'};
  if(!Array.isArray(S.knowledgeHub.folders))S.knowledgeHub.folders=[];
  if(!S.publicLibrary||typeof S.publicLibrary!=='object')S.publicLibrary={entries:[],seeded:false,myRatings:{},myImports:{}};
  if(!Array.isArray(S.publicLibrary.entries))S.publicLibrary.entries=[];
  if(!S.publicLibrary.myRatings)S.publicLibrary.myRatings={};
  if(!S.publicLibrary.myImports)S.publicLibrary.myImports={};
  if(!S.publicLibrary.seeded){plSeedExamples();S.publicLibrary.seeded=true;}
  // Normalize settings
  if(!S.settings||typeof S.settings!=='object')S.settings={};
  if(S.settings.showFocusBuilder===undefined)S.settings.showFocusBuilder=true;
  // Normalize any legacy study round data
  S.studyRounds.forEach(r=>{
    if(!r.id)r.id=gid();
    if(!Array.isArray(r.days))r.days=[];
    r.days.forEach(d=>{ if(!Array.isArray(d.tasks))d.tasks=[]; });
  });
  // Register custom courses into COURSES_LECTURES if missing
  S.customCourses.forEach(c=>{
    if(!COURSES_LECTURES[c.id])COURSES_LECTURES[c.id]=[];

function fmtShort(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtDay(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function daysUntil(d){const n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(d+'T00:00:00')-n)/864e5)}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return dStr(d)}
function isUnlocked(id){return S.unlockedCourses.includes(id)}
function getAllCoursesMeta(){
  // Apply overrides to built-in COURSES_META, then append custom
  const base=COURSES_META.map(c=>{
    const ov=(S.courseOverrides||{})[c.id]||{};
    return {...c,...ov};
  });
  const custom=(S.customCourses||[]).map(c=>({...c}));
  return [...base,...custom];
}
function getMeta(id){
  const ov=(S.courseOverrides||{})[id];
  const base=COURSES_META.find(c=>c.id===id);
  if(base)return ov?{...base,...ov}:base;
  return (S.customCourses||[]).find(c=>c.id===id);
}
function getLecs(id){
  if(S.lectureStore&&S.lectureStore[id])return S.lectureStore[id];
  return COURSES_LECTURES[id]||[];
}
function ensureLectureStore(cid){
  if(!S.lectureStore)S.lectureStore={};
  if(!S.lectureStore[cid]){
    const base=COURSES_LECTURES[cid]||[];
    S.lectureStore[cid]=JSON.parse(JSON.stringify(base));
  }
  return S.lectureStore[cid];
}
function getCourseSubjects(cid){
  const fromLecs=[...new Set(getLecs(cid).map(l=>l.subject).filter(Boolean))];
  const extras=(S.extraSubjects&&S.extraSubjects[cid])||[];
  return [...new Set([...fromLecs,...extras])].sort();
}
function courseHasWeeks(cid){
  return getLecs(cid).some(l=>l.week);
}
function getDivisions(cid){return (S.courseDivisions&&S.courseDivisions[cid])||[];}
function ensureDivisions(cid){
  if(!S.courseDivisions)S.courseDivisions={};
  if(!S.courseDivisions[cid])S.courseDivisions[cid]=[];
  return S.courseDivisions[cid];
}
function getLecDivision(lec,divId){
  return lec.divisions&&lec.divisions[divId]?lec.divisions[divId]:'';
}
function getRevs(lid){return S.revisions[lid]||[]}
function maxRev(lid){const r=getRevs(lid);return r.length?Math.max(...r.map(x=>x.revisionNum)):0}
function latestMastery(lid){const r=getRevs(lid);if(!r.length)return null;return[...r].sort((a,b)=>b.revisionNum-a.revisionNum)[0].mastery}
function eventsOn(d,cid){return S.events.filter(e=>e.date===d&&(!cid||e.courseId===cid))}
function allEventsOn(d){return S.events.filter(e=>e.date===d)}
function evColor(e){
  if(e&&e.fromStudyRound)return STUDY_ROUND_COLOR;
  if(e&&e.courseId)return COURSE_COLORS[e.courseId]||'#718096';
  return '#718096';
}
function getCountdowns(){
  const items=[];
  S.countdowns.forEach(c=>{items.push({...c,daysLeft:daysUntil(c.date),src:'cd'})});
  S.events.filter(e=>e.showInCountdown).forEach(e=>{items.push({id:e.id,title:e.title,date:e.date,daysLeft:daysUntil(e.date),src:'ev',courseId:e.courseId})});
  return items.filter(i=>i.daysLeft>=0).sort((a,b)=>a.daysLeft-b.daysLeft);
}
function findLec(lid){const ids=new Set([...Object.keys(COURSES_LECTURES),...Object.keys(S.lectureStore||{})]);for(const cid of ids){const l=getLecs(cid).find(x=>x.id===lid);if(l)return l;}return null}
function findLecCourse(lid){const ids=new Set([...Object.keys(COURSES_LECTURES),...Object.keys(S.lectureStore||{})]);for(const cid of ids){if(getLecs(cid).find(x=>x.id===lid))return cid;}return null}
function ord(n){const s=['th','st','nd','rd'];const v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}

function calSelectDayInPlace(ds){
  // ── 1. Update shared state ──────────────────────────────────────────
  selDate=ds;
  todoDate=ds;  // always sync — both panels share one selected date

  // ── 2. Update calendar: toggle selected class, keep today class intact ──
  var prev=document.querySelector('.cal-day-dnd.selected');
  if(prev)prev.classList.remove('selected');
  var next=document.querySelector('.cal-day-dnd[data-date="'+ds+'"]');
  if(next)next.classList.add('selected');

  // Update Add button date reference in calendar header
  var addBtn=document.querySelector('#dash-cal-panel .panel-header .btn-accent');
  if(addBtn)addBtn.setAttribute('onclick','openAddEventModal(\''+ds+'\')');

  // ── 3. Surgically re-render Daily Planner panel (no page scroll impact) ──
  updatePlannerPanel();
}

// Re-renders only the Daily Planner panel in place — no scroll, no layout shift
function updatePlannerPanel(){
  var planner=document.getElementById('dash-planner-panel');
  if(!planner)return; // not on dashboard or panel not found
  planner.outerHTML=renderTodayAgendaPanel();
  // After outerHTML replace, re-query and re-attach (outerHTML creates a new node)
  // Nothing more needed — event handlers are inline onclick attributes
}

function renderCalendarInPlace(){
  // Find the scroll container (parent of cal-dnd-grid)
  var grid=document.getElementById('cal-dnd-grid');
  var scrollBody=grid?grid.parentElement:null;

  var panel=document.getElementById('dash-cal-panel');
  if(!panel||!grid){render();return;}

  // Save scroll position BEFORE any DOM mutation
  var savedScroll=scrollBody?scrollBody.scrollTop:0;

  // Replace panel contents (month change, goToday, etc.)
  panel.style.display='flex';
  panel.style.flexDirection='column';
  panel.style.overflow='hidden';
  panel.innerHTML=renderCalendarPanel();

  // Restore scroll position SYNCHRONOUSLY — before browser paints
  var newGrid=document.getElementById('cal-dnd-grid');
  var newScrollBody=newGrid?newGrid.parentElement:null;
  if(newScrollBody)newScrollBody.scrollTop=savedScroll;

  // Re-sync fixed height — use rAF but do NOT clear height before measurement
  // to avoid triggering a layout that resets scrollTop
  var right=document.getElementById('dash-right-col');
  if(panel&&right){
    var rh=right.offsetHeight;
    if(rh>200)panel.style.height=rh+'px';
  }
}

  if(!todoDate)todoDate=today();

  const todayEvents=allEventsOn(t);
  const cds=getCountdowns();
  const thisWeekTasks=S.events.filter(e=>{const dl=daysUntil(e.date);return dl>=0&&dl<7;}).length;
  const totalRevs=Object.values(S.revisions).reduce((a,r)=>a+r.length,0);
  const allLecs=S.unlockedCourses.reduce((a,cid)=>a+getLecs(cid).length,0);
  const startedLecs=S.unlockedCourses.reduce((a,cid)=>{return a+getLecs(cid).filter(l=>getRevs(l.id).length>0).length},0);
  const completionRate=allLecs?Math.round(startedLecs/allLecs*100):0;

  if(S.settings.showFocusBuilder){
    h+='<div style="margin-top:4px">';
    h+=renderFocusCityWidget();
    h+='</div>';
  }

  return h;
}

// ============ CALENDAR PANEL (fixed outer height, internal scroll only) ============
function renderCalendarPanel(){
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DN=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const fd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const pdim=new Date(calY,calM,0).getDate();
  const t=today();

  // ── Fixed header section (never scrolls) ─────────────────────────────
  let h=`<div style="flex-shrink:0">`;

  // Title + Add button row
  h+=`<div class="panel-header">
    <div class="panel-title">${I.cal} Master Calendar</div>
    <div class="panel-actions"><button class="btn btn-xs btn-accent" onclick="openAddEventModal(selDate)">${I.plus} Add</button></div>
  </div>`;

  // Month nav + day-name header — inside padding wrapper, not scrollable
  h+=`<div style="padding:10px 14px 0;overflow:hidden">`;
  h+=`<div class="cal-header" style="margin-bottom:8px">
    <div class="cal-nav">
      <button onclick="chgMonth(-1)">${I.chevL}</button>
      <span class="cal-month">${MN[calM]} ${calY}</span>
      <button onclick="chgMonth(1)">${I.chevR}</button>
    </div>
    <button class="btn btn-xs btn-outline" onclick="goToday()">Today</button>
  </div>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;margin-bottom:3px">`;
  DN.forEach(d=>h+=`<div class="cal-day-name-dnd">${d}</div>`);
  h+=`</div>`;
  h+=`</div>`; // end nav/day-name padding wrapper

  h+=`</div>`; // end fixed header section

  // ── Scrollable body (flex:1, takes all remaining height) ─────────────
  h+=`<div style="flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:0 14px 14px">`;
  h+=`<div class="cal-dnd-grid" id="cal-dnd-grid">`;

  const tc=Math.ceil((fd+dim)/7)*7;
  for(let i=0;i<tc;i++){
    let day,ds,ot=false;
    if(i<fd){day=pdim-fd+i+1;const m=calM===0?11:calM-1,y=calM===0?calY-1:calY;ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');ot=true;}
    else if(i>=fd+dim){day=i-fd-dim+1;const m=calM===11?0:calM+1,y=calM===11?calY+1:calY;ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');ot=true;}
    else{day=i-fd+1;ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');}

    const evts=allEventsOn(ds);
    const isToday=ds===t;
    const isSel=ds===selDate;

    h+=`<div class="cal-day-dnd${ot?' other-month':''}${isToday?' today':''}${isSel?' selected':''}"
      data-date="${ds}"
      onclick="calDayClick(event,'${ds}')"
      ondragover="calDragOver(event,'${ds}')"
      ondragleave="calDragLeave(event)"
      ondrop="calDrop(event,'${ds}')">`;

    h+=`<div class="cal-day-num-dnd">${day}</div>`;

    // ALL events shown — no collapsing
    evts.forEach(e=>{
      const cl=evColor(e);
      const cm=e.courseId?getMeta(e.courseId):null;
      const courseName=cm?cm.name:'General';
      let subj=e.subject||'';
      let wk=e.week?'Wk '+e.week:'';
      if(e.lectureId){
        const lec=findLec(e.lectureId);
        if(lec){
          if(lec.subject&&!subj)subj=lec.subject;
          if(lec.week&&!wk)wk='Wk '+lec.week;
        }
      }
      const metaParts=[courseName,subj,wk].filter(Boolean);
      const baseTitle=e.title.replace(/ — \d+(st|nd|rd|th) review$/i,'');
      h+=`<div class="cal-evt-card"
        style="background:${cl}18;border-left-color:${cl};color:${cl}"
        draggable="true"
        data-eid="${e.id}"
        onclick="event.stopPropagation();openCalItemEditModal('${e.id}')"
        ondragstart="calDragStart(event,'${e.id}')"
        ondragend="calDragEnd(event)"
        title="${escHtml(e.title)}">
        <div class="cal-evt-name">${escHtml(baseTitle)}</div>
        <div class="cal-evt-meta">${escHtml(metaParts.join(' · '))}</div>
      </div>`;
    });

    h+=`</div>`; // end day cell
  }

  h+=`</div>`; // end cal-dnd-grid
  h+=`</div>`; // end scrollable body
  return h;
}

// ============ DRAG-AND-DROP STATE ============
let _dndEid=null; // ID of event being dragged

function calDragStart(ev,eid){
  _dndEid=eid;
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain',eid);
  // Add dragging class after a brief delay so card shows faded
  setTimeout(()=>{
    const card=document.querySelector(`.cal-evt-card[data-eid="${eid}"]`);
    if(card)card.classList.add('dragging');
  },0);
}

function calDragEnd(ev){
  // Remove dragging styles from all cards
  document.querySelectorAll('.cal-evt-card.dragging').forEach(c=>c.classList.remove('dragging'));
  document.querySelectorAll('.cal-day-dnd.drag-over').forEach(c=>c.classList.remove('drag-over'));
  _dndEid=null;
}

function calDragOver(ev,ds){
  ev.preventDefault();
  ev.dataTransfer.dropEffect='move';
  // Highlight the cell
  const cell=ev.currentTarget;
  if(!cell.classList.contains('drag-over'))cell.classList.add('drag-over');
}

function calDragLeave(ev){
  // Only remove highlight when truly leaving the cell (not entering a child)
  const cell=ev.currentTarget;
  if(!cell.contains(ev.relatedTarget)){
    cell.classList.remove('drag-over');
  }
}

function calDrop(ev,ds){
  ev.preventDefault();
  const eid=_dndEid||ev.dataTransfer.getData('text/plain');
  if(!eid||!ds)return;
  // Remove drag-over styles
  document.querySelectorAll('.cal-day-dnd.drag-over').forEach(c=>c.classList.remove('drag-over'));
  // Update the event's date in the data model
  const event=S.events.find(e=>e.id===eid);
  if(event&&event.date!==ds){
    event.date=ds;
    // Also update the lecture date in lectureStore if this is a lecture-based event
    if(event.lectureId){
      const cid=findLecCourse(event.lectureId);
      if(cid){
        ensureLectureStore(cid);
        const lec=S.lectureStore[cid].find(l=>l.id===event.lectureId);
        if(lec)lec.date=ds;
      }
    }
    save();
    // Surgically refresh calendar — preserves page scroll position
    selDate=ds;
    renderCalendarInPlace();
    // Animate dropped card after DOM rebuild (grid is replaced so need a tick)
    setTimeout(()=>{
      const dropped=document.querySelector(`.cal-evt-card[data-eid="${eid}"]`);
      if(dropped){
        dropped.classList.add('just-dropped');
        setTimeout(()=>dropped.classList.remove('just-dropped'),350);
      }
    },30);
  }
}

function calDayClick(ev,ds){
  // Only fire when clicking the bare cell or day number — not a card
  if(!ev.target.classList.contains('cal-day-dnd')&&!ev.target.classList.contains('cal-day-num-dnd'))return;
  ev.preventDefault();
  ev.stopPropagation();
  // Zero-rerender selection: only toggle CSS classes on existing DOM nodes.
  // No innerHTML replacement, no scroll container destruction, no scroll jump.
  calSelectDayInPlace(ds);
}

function saveCalItemEdit(eid){
  const ev=S.events.find(e=>e.id===eid);
  if(!ev)return;
  const title=document.getElementById('ceim-title').value.trim();
  const date=document.getElementById('ceim-date').value;
  if(!title||!date)return alert('Title and date are required');
  ev.title=title;
  ev.date=date;
  const courseEl=document.getElementById('ceim-course');
  if(courseEl)ev.courseId=courseEl.value||null;
  const cdEl=document.getElementById('ceim-cd');
  if(cdEl)ev.showInCountdown=cdEl.checked;
  // If linked lecture, update lecture fields too (lecture store = source of truth)
  if(ev.lectureId){
    const cid=findLecCourse(ev.lectureId);
    if(cid){
      ensureLectureStore(cid);
      const lec=S.lectureStore[cid].find(l=>l.id===ev.lectureId);
      if(lec){
        lec.title=title;
        lec.date=date;
        const subjEl=document.getElementById('ceim-subj');
        if(subjEl)lec.subject=subjEl.value||lec.subject;
        const wkEl=document.getElementById('ceim-week');
        if(wkEl&&wkEl.value)lec.week=parseInt(wkEl.value,10)||lec.week;
      }
    }
  }
  save();
  closeCalItemModal();
  selDate=date;
  render();
}

function delCalItem(eid){
  if(!confirm('Delete this item from your calendar?'))return;
  S.events=S.events.filter(e=>e.id!==eid);
  delete S.todoCompleted[eid];
  save();
  closeCalItemModal();
  render();
}

function findStudyRound(rid){return (S.studyRounds||[]).find(r=>r.id===rid);}
function findDay(round,idx){return round&&round.days&&round.days[idx];}
function taskDisplay(t){
  if(t.kind==='lecture'){
    const lec=findLec(t.lectureId);
    const cid=t.courseId||findLecCourse(t.lectureId);
    const cm=cid?getMeta(cid):null;
    const title=lec?lec.title:(t.title||'(missing lecture)');
    const extra=[];
    if(cm)extra.push(cm.name);
    if(t.subject||(lec&&lec.subject))extra.push(t.subject||lec.subject);
    if(t.week||(lec&&lec.week))extra.push('Week '+(t.week||lec.week));
    return {title,extra:extra.join(' · '),color:cm?cm.color:'#718096'};
  }
  return {title:t.title||'Custom task',extra:'Custom',color:'#64748b'};
}

  h+='<div style="font-size:.82rem;color:var(--text-light);margin-top:2px">Plan multi-day study rounds from lectures and custom tasks, then ship a full day to your calendar in one click.</div></div>';
  h+=`<button class="btn btn-sm btn-accent" onclick="openNewRoundModal()">${I.plus} New Study Round</button></div>`;
  if(!rounds.length){
    h+='<div class="panel"><div class="empty-state" style="padding:40px;text-align:center">';
    h+='<div style="font-size:2rem;margin-bottom:6px">📚</div>';
    h+='<p style="margin-bottom:14px">No study rounds yet. Create one to start planning your days.</p>';
    h+=`<button class="btn btn-sm btn-primary" onclick="openNewRoundModal()">${I.plus} Create First Round</button>`;
    h+='</div></div>';
    return h;
  }
  rounds.forEach((r,ridx)=>{
    const totalTasks=r.days.reduce((a,d)=>a+d.tasks.length,0);
    h+=`<div class="panel" style="margin-bottom:18px;border-top:3px solid ${STUDY_ROUND_COLOR}">`;
    h+=`<div class="panel-header" style="flex-wrap:wrap;gap:10px;align-items:center">`;
    h+=`<div class="panel-title" style="gap:10px;align-items:center;flex-wrap:wrap">`;
    h+=`<span style="font-weight:700;font-size:1rem;color:var(--primary)">${escHtml(r.title)}</span>`;
    h+=`<span class="todo-badge" style="background:${STUDY_ROUND_COLOR}18;color:${STUDY_ROUND_COLOR}">${r.days.length} day${r.days.length===1?'':'s'}</span>`;
    h+=`<span class="todo-badge" style="background:var(--border-light);color:var(--text-light)">${totalTasks} task${totalTasks===1?'':'s'}</span>`;
    h+='</div>';
    h+='<div class="panel-actions" style="flex-wrap:wrap;gap:6px">';
    if(ridx>0)h+=`<button class="btn btn-xs btn-ghost" title="Move up" onclick="moveStudyRound('${r.id}',-1)">${I.chevL}</button>`;
    if(ridx<rounds.length-1)h+=`<button class="btn btn-xs btn-ghost" title="Move down" onclick="moveStudyRound('${r.id}',1)">${I.chevR}</button>`;
    h+=`<button class="btn btn-xs btn-outline" onclick="openEditRoundModal('${r.id}')">${I.edit} Edit</button>`;
    h+=`<button class="btn btn-xs btn-outline" onclick="delStudyRound('${r.id}')" style="color:var(--danger)">${I.trash} Delete</button>`;
    h+='</div></div>';
    h+='<div class="panel-body">';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">';
    r.days.forEach((d,di)=>{
      h+=`<div style="border:1px solid var(--border);border-radius:var(--radius);background:var(--card);display:flex;flex-direction:column;overflow:hidden">`;
      h+=`<div style="padding:10px 12px;background:linear-gradient(135deg,${STUDY_ROUND_COLOR}15,${STUDY_ROUND_COLOR}06);border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;gap:6px">`;
      h+=`<span style="font-weight:700;color:var(--primary);font-size:.95rem">Day ${di+1}</span>`;
      h+=`<span style="font-size:.72rem;color:var(--text-light)">${d.tasks.length} task${d.tasks.length===1?'':'s'}</span>`;
      h+='</div>';
      h+='<div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px;min-height:60px;flex:1">';
      if(!d.tasks.length){
        h+='<div style="font-size:.8rem;color:var(--text-lighter);text-align:center;padding:16px 0">No tasks yet</div>';
      } else {
        d.tasks.forEach((t,ti)=>{
          const info=taskDisplay(t);
          h+=`<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 8px;background:var(--border-light);border-radius:8px">`;
          h+=`<span style="width:6px;height:6px;border-radius:50%;background:${info.color};margin-top:7px;flex-shrink:0"></span>`;
          h+=`<div style="flex:1;min-width:0">`;
          h+=`<div style="font-size:.82rem;font-weight:600;color:var(--text);line-height:1.35;word-break:break-word">${escHtml(info.title)}</div>`;
          if(info.extra)h+=`<div style="font-size:.68rem;color:var(--text-light);margin-top:1px">${escHtml(info.extra)}</div>`;
          h+='</div>';
          h+=`<div style="display:flex;flex-direction:column;gap:2px">`;
          if(t.kind==='custom')h+=`<button class="btn btn-xs btn-ghost" title="Edit" onclick="openEditTaskModal('${r.id}',${di},${ti})">${I.edit}</button>`;
          h+=`<button class="btn btn-xs btn-ghost" title="Remove" onclick="delRoundTask('${r.id}',${di},${ti})" style="color:var(--danger)">×</button>`;
          h+='</div></div>';
        });
      }
      h+=`<button class="btn btn-xs btn-outline" style="margin-top:6px" onclick="openAddTaskModal('${r.id}',${di})">${I.plus} Add Task</button>`;
      if(d.tasks.length){
        h+=`<button class="btn btn-xs btn-primary" style="margin-top:2px;background:${STUDY_ROUND_COLOR};color:#fff" onclick="openSendDayModal('${r.id}',${di})">📅 Send Day to Calendar</button>`;
      }
      h+='</div></div>';
    });
    h+='</div></div></div>';
  });
  return h;
}

// ---- Round CRUD ----
function openNewRoundModal(){
  openModal(`<div class="modal-header"><span class="modal-title">New Study Round</span><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Title</label><input class="form-control" id="sr-title" placeholder="e.g. October Revision Sprint" autofocus></div>
      <div class="form-group"><label class="form-label">Number of days</label><input class="form-control" id="sr-days" type="number" min="1" max="60" value="7"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="createStudyRound()">Create</button></div>
    </div>`);
}
function createStudyRound(){
  const t=(document.getElementById('sr-title').value||'').trim();
  const n=Math.max(1,Math.min(60,parseInt(document.getElementById('sr-days').value||'1',10)));
  if(!t)return alert('Please enter a title');
  const days=[];for(let i=0;i<n;i++)days.push({tasks:[]});
  S.studyRounds.push({id:gid(),title:t,days});
  save();closeModal();render();
}
function openEditRoundModal(rid){
  const r=findStudyRound(rid);if(!r)return;
  openModal(`<div class="modal-header"><span class="modal-title">Edit Study Round</span><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Title</label><input class="form-control" id="sr-title" value="${escHtml(r.title).replace(/"/g,'&quot;')}"></div>
      <div class="form-group"><label class="form-label">Number of days</label><input class="form-control" id="sr-days" type="number" min="1" max="60" value="${r.days.length}">
      <div style="font-size:.75rem;color:var(--text-light);margin-top:4px">Increasing adds empty days. Decreasing removes the last days (tasks on removed days are lost).</div></div>
      <div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveStudyRoundEdit('${rid}')">Save</button></div>
    </div>`);
}
function saveStudyRoundEdit(rid){
  const r=findStudyRound(rid);if(!r)return;
  const t=(document.getElementById('sr-title').value||'').trim();
  const n=Math.max(1,Math.min(60,parseInt(document.getElementById('sr-days').value||'1',10)));
  if(!t)return alert('Title required');
  r.title=t;
  if(n>r.days.length){
    for(let i=r.days.length;i<n;i++)r.days.push({tasks:[]});
  } else if(n<r.days.length){
    const lost=r.days.slice(n).reduce((a,d)=>a+d.tasks.length,0);
    if(lost>0 && !confirm(`Removing ${r.days.length-n} day(s) will delete ${lost} task(s). Continue?`))return;
    r.days=r.days.slice(0,n);
  }
  save();closeModal();render();
}
function delStudyRound(rid){
  const r=findStudyRound(rid);if(!r)return;
  if(!confirm(`Delete study round "${r.title}"? This cannot be undone.`))return;
  S.studyRounds=S.studyRounds.filter(x=>x.id!==rid);
  save();render();
}
function moveStudyRound(rid,dir){
  const i=S.studyRounds.findIndex(x=>x.id===rid);if(i<0)return;
  const j=i+dir;if(j<0||j>=S.studyRounds.length)return;
  const [it]=S.studyRounds.splice(i,1);S.studyRounds.splice(j,0,it);
  save();render();
}
function delRoundTask(rid,di,ti){
  const r=findStudyRound(rid);if(!r||!r.days[di])return;
  r.days[di].tasks.splice(ti,1);save();render();
}

// ---- Add / Edit Task Modal ----
let _srPicker={rid:null,di:null,cid:'',subj:'',week:''};
function openAddTaskModal(rid,di){
  _srPicker={rid,di,cid:'',subj:'',week:''};
  const courses=getAllCoursesMeta().filter(c=>isUnlocked(c.id));

    <div class="modal-body">
      <div style="display:flex;gap:6px;margin-bottom:14px">

      </div>

          <select class="form-control" id="sr-course" onchange="srOnCourseChange()">

            <div style="color:var(--text-lighter);font-size:.82rem;text-align:center;padding:18px 0">Pick a course and subject to see lectures.</div>
          </div>
        </div>
      </div>
      <div id="sr-custom-pane" style="display:none">
        <div class="form-group"><label class="form-label">Task title</label><input class="form-control" id="sr-custom-title" placeholder="e.g. Review mnemonics sheet"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:6px"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="sr-add-btn" onclick="srSubmitTask()">Add</button></div>
    </div>`;
