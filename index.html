// -- Lecture CRUD --
function buildLectureForm(cid,lec,preselectSubject){
  const subjects=getCourseSubjects(cid);
  const curSubj=lec?lec.subject:(preselectSubject||subjects[0]||'');
  const subjOpts=subjects.map(s=>`<option value="${escHtml(s)}"${s===curSubj?' selected':''}>${escHtml(s)}</option>`).join('')+'<option value="__new__">+ New Subject…</option>';
  const existingWeeks=[...new Set(getLecs(cid).map(l=>l.week).filter(Boolean))].sort((a,b)=>a-b);
  const wkOpts=['<option value="">— None —</option>',...existingWeeks.map(w=>`<option value="${w}"${lec&&lec.week==w?' selected':''}>Week ${w}</option>`)].join('');
  const curExam=lec&&lec.exam||'';
  const examOpts=['','Mid','Final'].map(e=>`<option value="${e}"${curExam===e?' selected':''}>${e||'— None —'}</option>`).join('');
  const hasExamField=getLecs(cid).some(l=>l.exam);
  let h=`<div class="form-group"><label class="form-label">Lecture Name</label><input class="form-input" id="lf-title" value="${lec?escHtml(lec.title):''}" placeholder="Lecture title"></div>
    <div class="form-group"><label class="form-label">Subject</label>
      <select class="form-select" id="lf-subj" onchange="if(this.value==='__new__'){var nm=prompt('New subject name');if(nm){var opt=document.createElement('option');opt.value=nm;opt.textContent=nm;opt.selected=true;this.insertBefore(opt,this.options[this.options.length-1]);}else{this.value='${escHtml(curSubj)}';}}">${subjOpts}</select></div>`;
  // Week is now ALWAYS available as an optional field
  h+=`<div class="form-group"><label class="form-label">Week (optional)</label>
    <select class="form-select" id="lf-week">${wkOpts}<option value="__custom__">+ Custom week number…</option></select>
    <div style="font-size:.74rem;color:var(--text-light);margin-top:4px">Assigning a week activates the "By Week" view automatically.</div></div>`;
  if(hasExamField){
    h+=`<div class="form-group"><label class="form-label">Exam (optional)</label><select class="form-select" id="lf-exam">${examOpts}</select></div>`;
  }
  // Custom divisions
  const divs=getDivisions(cid);
  divs.forEach(d=>{
    const cur=lec?getLecDivision(lec,d.id):'';
    const opts=['<option value="">— None —</option>',...d.categories.map(c=>`<option value="${escHtml(c)}"${cur===c?' selected':''}>${escHtml(c)}</option>`),'<option value="__newcat__">+ New Category…</option>'].join('');
    h+=`<div class="form-group"><label class="form-label">${escHtml(d.name)} (optional)</label>
      <select class="form-select" data-div="${d.id}" onchange="if(this.value==='__newcat__'){var nm=prompt('New ${escHtml(d.name)} category');if(nm){var opt=document.createElement('option');opt.value=nm;opt.textContent=nm;opt.selected=true;this.insertBefore(opt,this.options[this.options.length-1]);}else{this.value='${escHtml(cur)}';}}">${opts}</select></div>`;
  });
  h+=`<div class="form-group"><label class="form-label">Date (optional) — lecture-taking date, not added to calendar</label><input class="form-input" id="lf-date" type="date" value="${lec&&lec.date?lec.date:''}"></div>`;
  return h;
}
function resolveLectureForm(cid){
  var subjEl=document.getElementById('lf-subj');
  var subject=subjEl?subjEl.value:'';
  if(subject==='__new__'||!subject)return {err:'Please choose a subject'};
  var title=document.getElementById('lf-title').value.trim();
  if(!title)return {err:'Lecture name required'};
  var wkEl=document.getElementById('lf-week');
  var week=null;
  if(wkEl){
    var v=wkEl.value;
    if(v==='__custom__'){var w=prompt('Week number (integer)');if(w&&!isNaN(parseInt(w,10)))week=parseInt(w,10);}
    else if(v!=='')week=parseInt(v,10)||null;
  }
  var examEl=document.getElementById('lf-exam');
  var exam=examEl&&examEl.value?examEl.value:null;
  var date=document.getElementById('lf-date').value||'';
  // Custom divisions
  var divisions={};
  var divEls=document.querySelectorAll('select[data-div]');
  divEls.forEach(function(el){
    var did=el.getAttribute('data-div');
    var val=el.value;
    if(val&&val!=='__newcat__')divisions[did]=val;
  });
  return {title,subject,week,exam,date,divisions};
}
function openAddLectureModal(cid,preselectSubject){
  if(!getCourseSubjects(cid).length)return alert('Add a subject first');
  openModal(`<div class="modal-header"><span class="modal-title">Add Lecture</span><button class="modal-close" onclick="closeModal()">&times;</button></div>

function addLecture(cid){
  const r=resolveLectureForm(cid);if(r.err)return alert(r.err);
  ensureLectureStore(cid);
  const prefix=cid.replace(/[^a-z0-9]/gi,'').slice(0,6)||'c';
  const id=prefix+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).substr(2,4);
  const lec={id,title:r.title,subject:r.subject,date:r.date};
  if(r.week)lec.week=r.week;
  if(r.exam)lec.exam=r.exam;
  if(r.divisions&&Object.keys(r.divisions).length){lec.divisions=r.divisions;persistNewCategories(cid,r.divisions);}
  S.lectureStore[cid].push(lec);
  // If subject was in extraSubjects, it now has a lecture — can stay in extras (harmless) or remove
  if(S.extraSubjects&&S.extraSubjects[cid])S.extraSubjects[cid]=S.extraSubjects[cid].filter(s=>s!==r.subject);
  save();closeModal();render();
}

function saveLectureEdit(cid,lid){
  const r=resolveLectureForm(cid);if(r.err)return alert(r.err);
  ensureLectureStore(cid);
  const lec=S.lectureStore[cid].find(l=>l.id===lid);
  if(!lec)return;
  lec.title=r.title;lec.subject=r.subject;lec.date=r.date;
  if(r.week)lec.week=r.week;else delete lec.week;
  if(r.exam)lec.exam=r.exam;else delete lec.exam;
  if(r.divisions&&Object.keys(r.divisions).length){lec.divisions=r.divisions;persistNewCategories(cid,r.divisions);}
  else delete lec.divisions;
  save();closeModal();render();

function delLecture(cid,lid){

  S.events=S.events.filter(e=>e.lectureId!==lid);

function persistNewCategories(cid,divs){
  const list=ensureDivisions(cid);
  Object.keys(divs).forEach(did=>{
    const d=list.find(x=>x.id===did);
    if(d&&!d.categories.includes(divs[did]))d.categories.push(divs[did]);
  });
}

      h+='</div></div>';
    });
  }
  h+=`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border-light)">
    <button class="btn btn-primary" style="width:100%" onclick="addDivision('${cid}')">${I.plus} New Division</button>
  </div></div>`;

}
function addDivision(cid){
  const name=prompt('Division name (e.g., Book, Resource, Difficulty)');
  if(!name||!name.trim())return;
  const list=ensureDivisions(cid);
  if(list.some(d=>d.name.toLowerCase()===name.trim().toLowerCase()))return alert('A division with this name already exists.');
  list.push({id:'div_'+Date.now().toString(36)+'_'+Math.random().toString(36).substr(2,4),name:name.trim(),categories:[]});
  save();openDivisionsModal(cid);
}
function renameDivision(cid,did){
  const list=ensureDivisions(cid);
  const d=list.find(x=>x.id===did);if(!d)return;
  const nv=prompt('Rename division',d.name);
  if(!nv||!nv.trim())return;
  d.name=nv.trim();save();openDivisionsModal(cid);
}
function delDivision(cid,did){
  if(!confirm('Delete this division? The division assignments on lectures will also be removed.'))return;
  const list=ensureDivisions(cid);
  S.courseDivisions[cid]=list.filter(x=>x.id!==did);
  // Clean lecture assignments
  ensureLectureStore(cid);
  S.lectureStore[cid].forEach(l=>{if(l.divisions&&l.divisions[did]){delete l.divisions[did];if(!Object.keys(l.divisions).length)delete l.divisions;}});
  save();openDivisionsModal(cid);
}
function addDivCategory(cid,did){
  const name=prompt('Category name');
  if(!name||!name.trim())return;
  const d=ensureDivisions(cid).find(x=>x.id===did);if(!d)return;
  if(d.categories.includes(name.trim()))return alert('Category already exists.');
  d.categories.push(name.trim());save();openDivisionsModal(cid);
}
function renameDivCategory(cid,did,oldName){
  const nv=prompt('Rename category',oldName);
  if(!nv||!nv.trim()||nv===oldName)return;
  const d=ensureDivisions(cid).find(x=>x.id===did);if(!d)return;
  d.categories=d.categories.map(c=>c===oldName?nv.trim():c);
  d.categories=[...new Set(d.categories)];
  ensureLectureStore(cid);
  S.lectureStore[cid].forEach(l=>{if(l.divisions&&l.divisions[did]===oldName)l.divisions[did]=nv.trim();});
  save();openDivisionsModal(cid);
}
function delDivCategory(cid,did,name){
  if(!confirm(`Delete category "${name}"? Lectures assigned to it will become unclassified for this division.`))return;
  const d=ensureDivisions(cid).find(x=>x.id===did);if(!d)return;
  d.categories=d.categories.filter(c=>c!==name);
  ensureLectureStore(cid);
  S.lectureStore[cid].forEach(l=>{if(l.divisions&&l.divisions[did]===name){delete l.divisions[did];if(!Object.keys(l.divisions).length)delete l.divisions;}});
  save();openDivisionsModal(cid);
}

  if(!S.revisions[lid].length)delete S.revisions[lid];
  save();render();

}

// Determine which week we're currently in
function autoDetectWeek(){
  const t=today();
  for(let i=TIMETABLE_WEEKS.length-1;i>=0;i--){
    if(t>=TIMETABLE_WEEKS[i].startDate)return TIMETABLE_WEEKS[i].num;
  }
  return 1;
}

function autoDetect24Week(){
  const t=today();
  for(let i=TIMETABLE_24_WEEKS.length-1;i>=0;i--){
    if(t>=TIMETABLE_24_WEEKS[i].startDate)return TIMETABLE_24_WEEKS[i].num;
  }
  return 1;
}

function get24Slots(week){
  return week<=2 ? TIMETABLE_24_SLOTS_W12 : TIMETABLE_24_SLOTS;
}

function get24SlotLabels(week){
  return week<=2 ? SLOT_24_LABELS_W12 : SLOT_24_LABELS;
}

function getFiltered24Entries(week){
  let entries = TIMETABLE_24_DATA.filter(e=>e.w===week);
  if(us24Gender!=='All') entries=entries.filter(e=>e.gender===us24Gender);
  if(us24Group!=='All') entries=entries.filter(e=>!e.group||e.group===us24Group);
  if(us24Search){const q=us24Search.toLowerCase();entries=entries.filter(e=>e.title.toLowerCase().includes(q));}
  return entries;
}

function getFilteredEntries(week){
  let entries = TIMETABLE_DATA.filter(e=>e.w===week);
  if(usGender!=='All') entries=entries.filter(e=>e.gender===usGender);
  if(usGroup!=='All') entries=entries.filter(e=>!e.group||e.group===usGroup);
  if(usSearch){const q=usSearch.toLowerCase();entries=entries.filter(e=>e.title.toLowerCase().includes(q));}
  return entries;
}

function entryTypeClass(type){
  const map={lecture:'lecture',practical:'practical',workshop:'workshop',tutor:'tutor',exam:'exam',pd2:'pd2',research:'research',response:'response',patient:'patient',holiday:'holiday',sdl:'sdl',orientation:'orientation',clinical_reasoning:'lecture'};
  return map[type]||'other';
}
function entryTypeLabel(type){
  const map={lecture:'Lecture',practical:'Practical',workshop:'Workshop',tutor:'Tutor Group',exam:'Exam',pd2:'PD2',research:'Research',response:'Response',patient:'Patient Lecture',holiday:'Holiday',sdl:'SDL',orientation:'Orientation',clinical_reasoning:'Clinical Reasoning'};
  return map[type]||'Other';
}

function isSessionAdded(entry){
  return S.events.some(e=>e.uniSession && e.uniSessionKey===uniKey(entry));
}
function uniKey(e){return e.date+'_'+e.slot+'_'+e.gender+'_'+e.title.substring(0,30);}

function addUniSessionToCalendar(entry){
  if(isSessionAdded(entry))return;
  const eid=gid();
  const courseId=schedBlock==='2.4'?'block-2.4':'block-2.1';
  const slotArray=schedBlock==='2.4'?get24Slots(entry.w):TIMETABLE_SLOTS;
  S.events.push({
    id:eid,title:entry.title,date:entry.date,courseId:courseId,type:'task',
    showInCountdown:false,completed:false,uniSession:true,
    uniSessionKey:uniKey(entry),
    uniType:entry.type,uniGender:entry.gender,uniGroup:entry.group||null,
    uniSlot:slotArray[entry.slot]||''
  });
  save();render();
}

function addAllVisibleToCalendar(){
  const entries=getFilteredEntries(usWeek).filter(e=>e.type!=='holiday'&&!isSessionAdded(e));
  entries.forEach(e=>{
    const eid=gid();
    S.events.push({
      id:eid,title:e.title,date:e.date,courseId:'block-2.1',type:'task',
      showInCountdown:false,completed:false,uniSession:true,
      uniSessionKey:uniKey(e),
      uniType:e.type,uniGender:e.gender,uniGroup:e.group||null,
      uniSlot:TIMETABLE_SLOTS[e.slot]||''
    });
  });
  if(entries.length){save();render();}
}

function renderScheduleGrid(entries,dates,t){
  let h='<div class="us-grid">';
  // Header row
  h+='<div class="us-grid-header">Day / Time</div>';
  SLOT_LABELS.forEach((s,i)=>{
    if(i===4) h+=`<div class="us-grid-header" style="background:#4a5568;font-size:.6rem">Break</div>`;
    else h+=`<div class="us-grid-header">${TIMETABLE_SLOTS[i]}</div>`;
  });

  // Rows
  const genders = usGender==='All'?['Males','Females']:[usGender];
  TIMETABLE_DAYS.forEach((day,di)=>{
    const dateStr=dates[di];
    const isToday=dateStr===t;
    genders.forEach(gen=>{
      // Day cell
      h+=`<div class="us-grid-day${isToday?' today-row':''}">
        <div class="us-day-name">${day.substring(0,3)}</div>
        <div class="us-day-date">${fmtShort(dateStr)}</div>
        ${usGender==='All'?`<div class="us-day-gender ${gen==='Males'?'us-gender-m':'us-gender-f'}">${gen.substring(0,1)}</div>`:''}
      </div>`;

      // Slot cells
      for(let si=0;si<9;si++){
        if(si===4){
          h+='<div class="us-cell break-cell"></div>';
          continue;
        }
        const slotEntries=entries.filter(e=>e.day===day&&e.date===dateStr&&e.gender===gen&&e.slot===si);
        // Check for holiday spanning
        const holidayEntry=entries.find(e=>e.day===day&&e.date===dateStr&&e.gender===gen&&e.type==='holiday');
        if(holidayEntry && si===0){
          h+='<div class="us-cell" style="grid-column:span 9;display:flex;align-items:center;justify-content:center">';
          h+=`<div class="us-entry us-entry-holiday" style="width:100%;text-align:center;padding:12px">${holidayEntry.title}</div>`;
          h+='</div>';
          break; // skip remaining slots
        }
        if(holidayEntry) continue;

        h+='<div class="us-cell">';
        slotEntries.forEach(e=>{
          const added=isSessionAdded(e);
          h+=`<div class="us-entry us-entry-${entryTypeClass(e.type)}" onclick="openUniSessionModal(${TIMETABLE_DATA.indexOf(e)})" title="${e.title}${e.group?' (Group '+e.group+')':''}">
            ${added?`<div class="us-added-badge">${I.check}</div>`:''}
            <div class="us-entry-title">${e.title.length>28?e.title.substring(0,28)+'...':e.title}</div>
            ${e.group?`<div class="us-entry-meta">Group ${e.group}</div>`:''}
          </div>`;
        });
        h+='</div>';
      }
    });
  });
  h+='</div>';
  return h;
}

function renderScheduleList(entries,dates,t){
  let h='<div class="us-list-view">';
  const genders = usGender==='All'?['Males','Females']:[usGender];

  TIMETABLE_DAYS.forEach((day,di)=>{

      const dayEntries=entries.filter(e=>e.day===day&&e.date===dateStr&&e.gender===gen).sort((a,b)=>a.slot-b.slot);
      if(!dayEntries.length) return;

      h+=`<div class="us-list-day">
        <div class="us-list-day-header${isToday?' today-header':''}">
          <span>${day} — ${fmtShort(dateStr)} ${usGender==='All'?'('+gen+')':''}</span>

      h+='</div></div>';

  h+='</div>';
  return h;

  h+='<div class="us-filter-group" style="margin-left:auto">';
  h+=`<button class="us-chip${us24ViewMode==='grid'?' active':''}" onclick="us24ViewMode='grid';render()">Grid</button>`;
  h+=`<button class="us-chip${us24ViewMode==='list'?' active':''}" onclick="us24ViewMode='list';render()">List</button>`;

    <button class="btn btn-xs btn-outline" onclick="if(us24Week>1){us24Week--;save24SchedulePrefs();render()}" ${us24Week<=1?'disabled':''}>${I.chevL}</button>

  </div>`;

  h+=`<button class="btn btn-xs btn-accent" onclick="us24Week=autoDetect24Week();save24SchedulePrefs();render()">Current Week</button>`;
  h+='</div>';

  h+='<div class="us-legend">';
  [{t:'lecture',c:'#3182ce',l:'Lecture'},{t:'practical',c:'#38a169',l:'Practical'},{t:'workshop',c:'#d69e2e',l:'Workshop'},{t:'tutor',c:'#805ad5',l:'Tutor Group'},{t:'exam',c:'#e53e3e',l:'Exam'},{t:'pd2',c:'#319795',l:'PD2'},{t:'sdl',c:'#a0aec0',l:'SDL'},{t:'response',c:'#dd6b20',l:'Response'},{t:'patient',c:'#b7791f',l:'Patient Lecture'},{t:'orientation',c:'#2b6cb0',l:'Orientation'}].forEach(x=>{
    h+=`<div class="us-legend-item"><div class="us-legend-dot" style="background:${x.c}"></div>${x.l}</div>`;
  });

  });
  h+='</div>';

  // Render view
  if(us24ViewMode==='grid') h+=render24ScheduleGrid(entries,dates,t,wk);
  else h+=render24ScheduleList(entries,dates,t);

  return h;
}

function render24ScheduleGrid(entries,dates,t,wk){
  let h='<div class="us-grid">';
  const slotLabels=get24SlotLabels(wk.num);
  // Header row
  h+='<div class="us-grid-header">Day / Time</div>';
  slotLabels.forEach((s,i)=>{
    const slotArray=get24Slots(wk.num);
    if(i===4) h+=`<div class="us-grid-header" style="background:#4a5568;font-size:.6rem">Break</div>`;
    else h+=`<div class="us-grid-header">${slotArray[i]}</div>`;
  });

  // Rows
  const genders = us24Gender==='All'?['Males','Females']:[us24Gender];
  TIMETABLE_DAYS.forEach((day,di)=>{
    const dateStr=dates[di];
    const isToday=dateStr===t;
    genders.forEach(gen=>{
      // Day cell
      h+=`<div class="us-grid-day${isToday?' today-row':''}">
        <div class="us-day-name">${day.substring(0,3)}</div>
        <div class="us-day-date">${fmtShort(dateStr)}</div>
        ${us24Gender==='All'?`<div class="us-day-gender ${gen==='Males'?'us-gender-m':'us-gender-f'}">${gen.substring(0,1)}</div>`:''}
      </div>`;

      // Slot cells
      const slotArray=get24Slots(wk.num);
      for(let si=0;si<slotArray.length;si++){
        if(si===4){
          h+='<div class="us-cell break-cell"></div>';
          continue;
        }
        const slotEntries=entries.filter(e=>e.day===day&&e.date===dateStr&&e.gender===gen&&e.slot===si);
        // Check for holiday spanning
        const holidayEntry=entries.find(e=>e.day===day&&e.date===dateStr&&e.gender===gen&&e.type==='holiday');
        if(holidayEntry && si===0){
          h+='<div class="us-cell" style="grid-column:span 9;display:flex;align-items:center;justify-content:center">';
          h+=`<div class="us-entry us-entry-holiday" style="width:100%;text-align:center;padding:12px">${holidayEntry.title}</div>`;
          h+='</div>';
          break; // skip remaining slots
        }
        if(holidayEntry) continue;

        h+='<div class="us-cell">';
        slotEntries.forEach(e=>{
          const added=isSessionAdded(e);
          h+=`<div class="us-entry us-entry-${entryTypeClass(e.type)}" onclick="openUni24SessionModal(${TIMETABLE_24_DATA.indexOf(e)})" title="${e.title}${e.group?' (Group '+e.group+')':''}">
            ${added?`<div class="us-added-badge">${I.check}</div>`:''}
            <div class="us-entry-title">${e.title.length>28?e.title.substring(0,28)+'...':e.title}</div>
            ${e.group?`<div class="us-entry-meta">Group ${e.group}</div>`:''}
          </div>`;
        });
        h+='</div>';
      }
    });
  });
  h+='</div>';
  return h;
}

function render24ScheduleList(entries,dates,t){
  let h='<div class="us-list-view">';
  const genders = us24Gender==='All'?['Males','Females']:[us24Gender];

  TIMETABLE_DAYS.forEach((day,di)=>{
    const dateStr=dates[di];
    const isToday=dateStr===t;
    genders.forEach(gen=>{
      const dayEntries=entries.filter(e=>e.day===day&&e.date===dateStr&&e.gender===gen).sort((a,b)=>a.slot-b.slot);
      if(!dayEntries.length) return;

      h+=`<div class="us-list-day">
        <div class="us-list-day-header${isToday?' today-header':''}">
          <span>${day} — ${fmtShort(dateStr)} ${us24Gender==='All'?'('+gen+')':''}</span>
          ${isToday?'<span class="badge badge-green">Today</span>':''}
        </div><div class="us-list-sessions">`;

      dayEntries.forEach((e,idx)=>{
        if(e.type==='holiday'){
          h+=`<div class="us-list-item" style="justify-content:center;padding:16px"><span style="font-weight:700;color:var(--danger)">${e.title}</span></div>`;
          return;
        }
        const added=isSessionAdded(e);
        const tc=entryTypeClass(e.type);
        const week=e.w;
        const slotArray=get24Slots(week);
        const eIdx24=TIMETABLE_24_DATA.indexOf(e);
        h+=`<div class="us-list-item" onclick="openUni24SessionModal(${eIdx24})" style="cursor:pointer">
          <span class="us-list-time">${slotArray[e.slot]||''}</span>
          <span class="us-list-badge us-entry-${tc}">${entryTypeLabel(e.type)}</span>
          <span class="us-list-title">${e.title}</span>
          ${e.group?`<span class="us-list-group">Group ${e.group}</span>`:''}
          <div class="us-list-add">
            ${added?`<span class="badge badge-green" style="font-size:.7rem">Added</span>`
            :`<button class="btn btn-xs btn-accent" onclick="event.stopPropagation();addUniSessionToCalendar(TIMETABLE_24_DATA[${eIdx24}])">${I.plus}</button>`}
          </div></div>`;
      });
      h+='</div></div>';
    });
  });
  h+='</div>';
  return h;
}

function openUni24SessionModal(idx){
  openEditTTSessionModal('2.4', idx);
}

function addAllVisible24ToCalendar(){
  const entries=getFiltered24Entries(us24Week);
  let added=0;
  entries.forEach(e=>{
    if(e.type!=='holiday'&&!isSessionAdded(e)){
      addUniSessionToCalendar(e);
      added++;
    }
  });
  if(added)alert(`Added ${added} session${added!==1?'s':''} to your calendar`);
}

// ============ MANUAL TIMETABLE EDITING SYSTEM ============

function saveTTEdit(block, idx){
  const data = block==='2.1' ? TIMETABLE_DATA : TIMETABLE_24_DATA;
  const e = data[idx];
  if(!e) return;

  e.title = document.getElementById('ttEditTitle').value.trim();
  e.type = document.getElementById('ttEditType').value;
  e.gender = document.getElementById('ttEditGender').value;
  e.group = document.getElementById('ttEditGroup').value || null;
  e.w = parseInt(document.getElementById('ttEditWeek').value);
  e.day = document.getElementById('ttEditDay').value;
  e.date = document.getElementById('ttEditDate').value;
  e.slot = parseInt(document.getElementById('ttEditSlot').value);
  e.notes = document.getElementById('ttEditNotes').value.trim() || null;

  saveTimetableEdits();
  closeModal();
  render();
}

function dupTTSession(block, idx){
  const data = block==='2.1' ? TIMETABLE_DATA : TIMETABLE_24_DATA;
  const e = data[idx];
  if(!e) return;
  const copy = JSON.parse(JSON.stringify(e));
  copy.title = copy.title + ' (copy)';
  data.push(copy);
  saveTimetableEdits();
  closeModal();
  render();
}

function delTTSession(block, idx){
  if(!confirm('Delete this session?')) return;
  const data = block==='2.1' ? TIMETABLE_DATA : TIMETABLE_24_DATA;
  data.splice(idx, 1);
  saveTimetableEdits();
  closeModal();
  render();
}

function ttAddWeekChanged(block){
  // Update slot options when week changes (Block 2.4 has different slots for weeks 1-2)
  if(block!=='2.4') return;
  var wk=parseInt(document.getElementById('ttAddWeek').value);
  var slots=wk<=2?TIMETABLE_24_SLOTS_W12:TIMETABLE_24_SLOTS;
  var sel=document.getElementById('ttAddSlot');
  if(!sel)return;
  sel.innerHTML='';
  slots.forEach(function(s,i){
    var opt=document.createElement('option');
    opt.value=i;
    if(i===4){opt.disabled=true;opt.textContent='— Break —';}
    else opt.textContent=s;
    sel.appendChild(opt);
  });
}

function saveNewTTSession(block){
  const title = document.getElementById('ttAddTitle').value.trim();
  if(!title){alert('Please enter a session title.');return;}

  const type = document.getElementById('ttAddType').value;
  const genderVal = document.getElementById('ttAddGender').value;
  const group = document.getElementById('ttAddGroup').value || null;
  const week = parseInt(document.getElementById('ttAddWeek').value);
  const day = document.getElementById('ttAddDay').value;
  const date = document.getElementById('ttAddDate').value;
  const slot = parseInt(document.getElementById('ttAddSlot').value);
  const notes = document.getElementById('ttAddNotes').value.trim() || null;

  const data = block==='2.1' ? TIMETABLE_DATA : TIMETABLE_24_DATA;

  // If gender is "both", create two entries
  const genders = genderVal==='both' ? ['Males','Females'] : [genderVal];
  genders.forEach(function(gen){
    data.push({w:week, day:day, date:date, gender:gen, slot:slot, title:title, type:type, group:group, notes:notes});
  });

  saveTimetableEdits();
  closeModal();
  render();
}

  const weeks = block==='2.1' ? TIMETABLE_WEEKS : TIMETABLE_24_WEEKS;

}

function saveNewTTWeek(block){
  const num = parseInt(document.getElementById('ttWeekNum').value);
  const title = document.getElementById('ttWeekTitle').value.trim() || 'Week ' + num;
  const startDate = document.getElementById('ttWeekStart').value;
  const dates = document.getElementById('ttWeekDates').value.trim() || '';

  if(!startDate){alert('Please enter a start date.');return;}

  const weeks = block==='2.1' ? TIMETABLE_WEEKS : TIMETABLE_24_WEEKS;

  // Check if week number already exists
  if(weeks.some(w=>w.num===num)){alert('Week '+num+' already exists. Use a different number.');return;}

  weeks.push({num:num, title:title, dates:dates, startDate:startDate});
  weeks.sort((a,b) => a.num - b.num);

  saveTimetableEdits();
  closeModal();
  render();
}

function resetTimetableEdits(block){
  if(!confirm('Reset all manual edits for Block '+block+'? This will restore the original timetable data.')) return;
  try{
    const d=localStorage.getItem('medschedule_tt_edits');
    if(d){
      const o=JSON.parse(d);
      if(block==='2.1'){delete o.data21;delete o.weeks21;}
      else{delete o.data24;delete o.weeks24;}
      localStorage.setItem('medschedule_tt_edits',JSON.stringify(o));
    }
  }catch(e){}
  alert('Please reload the page to restore defaults.');
  location.reload();
}

// ============ FOCUS CITY INTEGRATION (SHARED STATE) ============
const FC_TASK_KEY='medschedule_fc_task';
const FC_SAVE_KEY='cityfocus_save';
const FC_STORE_KEY='cityfocus_store';
const FC_SESSION_KEY='medschedule_fc_session';
let fcTimerInterval=null;
let fcLastSessionStatus=null;

// --- Shared session state read/write ---
function getFCSession(){try{const r=localStorage.getItem(FC_SESSION_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function setFCSession(obj){try{localStorage.setItem(FC_SESSION_KEY,JSON.stringify(obj));}catch(e){}}
function clearFCSession(){try{localStorage.removeItem(FC_SESSION_KEY);}catch(e){}}

// --- Legacy data readers ---
function getFCData(){try{const r=localStorage.getItem(FC_SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function getFCStoreData(){try{const r=localStorage.getItem(FC_STORE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function fcBuildingCount(){const d=getFCData();return d&&d.buildings?d.buildings.length:0;}
function fcTotalMinutes(){const d=getFCData();if(!d||!d.history)return 0;return d.history.filter(h=>h.result!=='failed').reduce((a,h)=>a+h.duration,0);}
function fcIsFireActive(){const d=getFCData();return d?!!d.fireActive:false;}
function fcCoins(){const d=getFCStoreData();return d?d.coins||0:0;}
function fcSessionsToday(){
  const d=getFCData();if(!d||!d.history)return 0;
  const now=new Date(),start=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  return d.history.filter(h=>h.timestamp>=start&&h.timestamp<start+86400000&&h.result==='completed').length;
}
function setFCTask(name){try{localStorage.setItem(FC_TASK_KEY,name);}catch(e){}}

// --- Session time helpers ---
function fcRemainingMs(){
  const s=getFCSession();
  if(!s||s.status!=='active')return 0;
  return Math.max(0,s.endTime-Date.now());
}
function fcFormatMs(ms){
  const totalSec=Math.ceil(ms/1000);
  const m=Math.floor(totalSec/60),sec=totalSec%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function fcProgressPct(){
  const s=getFCSession();
  if(!s||s.status!=='active')return 0;
  const total=s.endTime-s.startTime;
  if(total<=0)return 100;
  const elapsed=Date.now()-s.startTime;
  return Math.min(100,Math.max(0,(elapsed/total)*100));
}

const FC_ALARM_KEY='cityfocus_alarm';
const FC_ALARM_MODES=[
  {id:'both',label:'Sound + Notification',desc:'Play a sound and send a browser notification',icon:'🔔'},
  {id:'sound',label:'Sound Only',desc:'Play a sound alert when timer finishes',icon:'🔊'},
  {id:'notif',label:'Notification Only',desc:'Send a browser notification silently',icon:'💬'},
  {id:'silent',label:'Silent Mode',desc:'Visual alert only — no sound or notification',icon:'🔇'},
];

  {id:'chime',label:'Chime',desc:'Bright ascending notes'},
  {id:'bell',label:'Bell',desc:'Warm resonant bell tone'},
  {id:'soft',label:'Soft Tone',desc:'Gentle calming hum'},

  {id:'zen',label:'Zen Bowl',desc:'Deep singing bowl'},
];

function fcLoadAlarmPrefs(){try{const r=localStorage.getItem(FC_ALARM_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function fcSaveAlarmPrefs(prefs){try{localStorage.setItem(FC_ALARM_KEY,JSON.stringify(prefs));}catch(e){}}
function fcGetAlarmMode(){return fcLoadAlarmPrefs()?.mode||'both';}
function fcGetAlarmSound(){return fcLoadAlarmPrefs()?.sound||'chime';}

function fcSynthesizeSound(soundId){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended')ctx.resume();
    const now=ctx.currentTime;
    if(soundId==='chime'){
      [523.25,659.25,783.99,1046.5].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,now+i*.15);g.gain.exponentialRampToValueAtTime(.001,now+i*.15+.45);o.connect(g).connect(ctx.destination);o.start(now+i*.15);o.stop(now+i*.15+.5);});
    }else if(soundId==='bell'){
      [440,554.37,659.25].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.18,now+i*.25);g.gain.exponentialRampToValueAtTime(.001,now+i*.25+.8);o.connect(g).connect(ctx.destination);o.start(now+i*.25);o.stop(now+i*.25+.9);});
    }else if(soundId==='soft'){
      const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=396;g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.12,now+.3);g.gain.exponentialRampToValueAtTime(.001,now+1.5);o.connect(g).connect(ctx.destination);o.start(now);o.stop(now+1.6);
    }else if(soundId==='triumph'){
      [392,523.25,659.25,783.99,1046.5].forEach((f,i)=>{const o=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=f;o2.type='sine';o2.frequency.value=f*2;g.gain.setValueAtTime(.08,now+i*.12);g.gain.exponentialRampToValueAtTime(.001,now+i*.12+.4);o.connect(g);o2.connect(g);g.connect(ctx.destination);o.start(now+i*.12);o.stop(now+i*.12+.45);o2.start(now+i*.12);o2.stop(now+i*.12+.45);});
    }else if(soundId==='zen'){
      [174.61,261.63].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;o.frequency.exponentialRampToValueAtTime(f*1.003,now+2);g.gain.setValueAtTime(0,now+i*.4);g.gain.linearRampToValueAtTime(.14,now+i*.4+.5);g.gain.exponentialRampToValueAtTime(.001,now+i*.4+2.2);o.connect(g).connect(ctx.destination);o.start(now+i*.4);o.stop(now+i*.4+2.5);});
    }
  }catch(e){}
}

function fcFireAlarm(title,body){
  const mode=fcGetAlarmMode(),sid=fcGetAlarmSound();
  if(mode==='sound'||mode==='both')fcSynthesizeSound(sid);
  if(mode==='notif'||mode==='both'){
    if('Notification' in window&&Notification.permission==='granted'){
      try{new Notification(title,{body:body,icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙</text></svg>"});}catch(e){}
    }else if(mode==='notif'){fcSynthesizeSound(sid);}
  }
  // Visual flash overlay
  let fl=document.getElementById('fc-flash-overlay');
  if(fl)fl.remove();
  fl=document.createElement('div');fl.id='fc-flash-overlay';fl.className='fc-flash-overlay';
  document.body.appendChild(fl);
  setTimeout(()=>{if(fl.parentNode)fl.remove();},1500);
}

}

  // Notification permission banner

// --- Start session from main app dashboard ---
function startFocusCityFromDashboard(durationMin){
  const sel=document.getElementById('fc-task-sel');
  const task=sel&&sel.value?sel.value:'';
  const dur=durationMin||25;
  const now=Date.now();
  const session={status:'active',startTime:now,endTime:now+dur*60*1000,duration:dur,task:task,type:'focus',completed:false};
  setFCSession(session);
  setFCTask(task);
  nav('focuscity');
}

// --- Cancel session from main app ---
function cancelFCSessionFromMain(){
  const s=getFCSession();
  if(!s||s.status!=='active')return;
  setFCSession({...s,status:'cancelled',completed:false});
  // CityFocus.html will detect this on next poll and handle fire/failure logic
  renderFCSessionUI();
}

// --- Check for session completion from main app ---
function fcCheckSessionEnd(){
  const s=getFCSession();
  if(!s)return;
  // Active session that has run out of time
  if(s.status==='active'&&Date.now()>=s.endTime){
    setFCSession({...s,status:'completed_pending',completed:true});
    // Fire alarm immediately — works from any page
    // Only fire from main app when NOT on Focus Builder page (iframe fires its own)
    if(view!=='focuscity'){
      const typeLabel=s.type==='break'?'Break Over!':'Focus Complete!';
      const bodyLabel=s.type==='break'?'Time to get back to focus.':(s.task?'Session complete: '+s.task:'Great work! A new building has been earned.');
      fcFireAlarm(typeLabel,bodyLabel);
      fcShowCompletionNotification(s);
    }
  }
  // Track status transitions for UI updates
  if(s.status!==fcLastSessionStatus){
    fcLastSessionStatus=s.status;
    renderFCSessionUI();
  }
}

function fcShowCompletionNotification(session){
  // Show a brief toast/notification that session is complete
  let toast=document.getElementById('fc-toast');
  if(!toast){
    toast=document.createElement('div');
    toast.id='fc-toast';
    toast.style.cssText='position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:14px 20px;border-radius:var(--radius);font-size:.88rem;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(26,54,93,.25);cursor:pointer;transition:opacity .3s,transform .3s;transform:translateY(10px);opacity:0';
    document.body.appendChild(toast);
  }
  const taskStr=session.task?' &mdash; '+session.task.substring(0,30):'';
  toast.innerHTML='Session complete!'+taskStr+'<br><span style="font-size:.75rem;opacity:.85">Click to view your progress</span>';
  toast.onclick=()=>{toast.style.opacity='0';toast.style.transform='translateY(10px)';nav('focuscity');};
  requestAnimationFrame(()=>{toast.style.opacity='1';toast.style.transform='translateY(0)';});
  setTimeout(()=>{toast.style.opacity='0';toast.style.transform='translateY(10px)';},8000);
}

// --- Render active session UI in header mini-timer ---
function renderFCMiniTimer(){
  const hdr=document.querySelector('.header-right');
  if(!hdr)return;
  let el=document.getElementById('fc-mini-timer');
  const s=getFCSession();
  if(!s||s.status!=='active'){
    if(el)el.remove();
    return;
  }
  const rem=fcRemainingMs();
  const pct=fcProgressPct();
  if(rem<=0){
    if(el)el.remove();
    return;
  }
  const taskLabel=s.task?s.task.substring(0,20):'Focus';
  if(!el){
    el=document.createElement('div');
    el.id='fc-mini-timer';
    el.className='fc-mini-timer';
    el.onclick=()=>nav('focuscity');
    hdr.insertBefore(el,hdr.firstChild);
  }
  el.innerHTML='<div class="fc-mini-dot"></div><span class="fc-mini-time">'+fcFormatMs(rem)+'</span><span class="fc-mini-task">'+taskLabel+'</span><div class="fc-mini-progress"><div class="fc-mini-progress-bar" style="width:'+pct+'%"></div></div>';
}

// --- Update live timers without full re-render ---
function fcTickUI(){
  const s=getFCSession();
  if(!s||s.status!=='active'){renderFCMiniTimer();return;}
  const rem=fcRemainingMs();
  const pct=fcProgressPct();

function getRange(viewMode, viewDate) {
  const date = new Date(viewDate);
  const year = date.getFullYear();
  const month = date.getMonth();
  const day = date.getDate();
  const dayOfWeek = date.getDay();

  if (viewMode === "day") {
    const start = new Date(year, month, day, 0, 0, 0, 0);
    const end = new Date(year, month, day, 23, 59, 59, 999);
    return { start: start.getTime(), end: end.getTime() };
  } else if (viewMode === "week") {
    const offset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const monday = new Date(year, month, day - offset);
    const sunday = new Date(year, month, day - offset + 6);
    sunday.setHours(23, 59, 59, 999);
    return { start: monday.getTime(), end: sunday.getTime() };
  } else if (viewMode === "month") {
    const start = new Date(year, month, 1, 0, 0, 0, 0);
    const end = new Date(year, month + 1, 0, 23, 59, 59, 999);
    return { start: start.getTime(), end: end.getTime() };
  } else if (viewMode === "year") {
    const start = new Date(year, 0, 1, 0, 0, 0, 0);
    const end = new Date(year, 11, 31, 23, 59, 59, 999);
    return { start: start.getTime(), end: end.getTime() };
  }
}

function fmt(ms) {
  const totalSecs = Math.floor(ms / 1000);
  const m = Math.floor(totalSecs / 60);
  const sec = totalSecs % 60;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

function formatPeriodLabel(viewMode, viewDate) {
  const date = new Date(viewDate);
  const opts = { weekday: "long", month: "short", day: "numeric", year: "numeric" };

  if (viewMode === "day") {
    return date.toLocaleDateString("en-US", opts);
  } else if (viewMode === "week") {
    const dayOfWeek = date.getDay();
    const offset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const monday = new Date(date);
    monday.setDate(date.getDate() - offset);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);

    const monStr = monday.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    const sunStr = sunday.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    return `${monStr} – ${sunStr}`;
  } else if (viewMode === "month") {
    return date.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  } else if (viewMode === "year") {
    return date.getFullYear().toString();
  }
}

function synthesizeSound(soundId, context) {
  const t = context || "complete";
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const now = ctx.currentTime;

    if (soundId === "chime") {

        g.gain.setValueAtTime(.15, now+i*.15);
        g.gain.exponentialRampToValueAtTime(.001, now+i*.15+.45);
        o.connect(g).connect(ctx.destination);
        o.start(now+i*.15); o.stop(now+i*.15+.5);
      });
    } else if (soundId === "bell") {
      [440, 554.37, 659.25].forEach((f,i) => {

        g.gain.setValueAtTime(.18, now+i*.25);

        o.start(now+i*.25); o.stop(now+i*.25+.9);

      o.type="sine"; o.frequency.value=396;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(.12, now+.3);
      g.gain.exponentialRampToValueAtTime(.001, now+1.5);
      o.connect(g).connect(ctx.destination);
      o.start(now); o.stop(now+1.6);
    } else if (soundId === "triumph") {
      [392,523.25,659.25,783.99,1046.5].forEach((f,i) => {
        const o = ctx.createOscillator(), o2 = ctx.createOscillator(), g = ctx.createGain();
        o.type="square"; o.frequency.value=f;
        o2.type="sine"; o2.frequency.value=f*2;
        g.gain.setValueAtTime(.08, now+i*.12);
        g.gain.exponentialRampToValueAtTime(.001, now+i*.12+.4);
        o.connect(g); o2.connect(g); g.connect(ctx.destination);
        o.start(now+i*.12); o.stop(now+i*.12+.45);
        o2.start(now+i*.12); o2.stop(now+i*.12+.45);
      });
    } else if (soundId === "zen") {
      [174.61, 261.63].forEach((f,i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type="sine"; o.frequency.value=f;
        o.frequency.exponentialRampToValueAtTime(f*1.003, now+2);
        g.gain.setValueAtTime(0, now+i*.4);
        g.gain.linearRampToValueAtTime(.14, now+i*.4+.5);
        g.gain.exponentialRampToValueAtTime(.001, now+i*.4+2.2);
        o.connect(g).connect(ctx.destination);
        o.start(now+i*.4); o.stop(now+i*.4+2.5);
      });
    }
  } catch(e){}
}

// ─── Day/Night cycle helpers ─────────────────────────────────────────────────
function getTimeOfDay() {
  const h = new Date().getHours();
  const m = new Date().getMinutes();
  const t = h + m / 60; // decimal hour
  // 6-8 sunrise, 8-17 day, 17-19 sunset, 19-6 night
  if (t >= 6 && t < 8) return { phase: "sunrise", blend: (t - 6) / 2 };
  if (t >= 8 && t < 17) return { phase: "day", blend: 1 };
  if (t >= 17 && t < 19) return { phase: "sunset", blend: (t - 17) / 2 };
  return { phase: "night", blend: 1 };
}

function getSkyColors(tod) {
  const colors = {
    day:     { top: "#4a9edd", mid: "#87CEEB", bot: "#B8E4F8" },
    sunrise: { top: "#6b8ccc", mid: "#f0a870", bot: "#fcd4a0" },
    sunset:  { top: "#3a4a7a", mid: "#e07850", bot: "#f5b070" },
    night:   { top: "#0a1628", mid: "#152040", bot: "#1e3058" },
  };
  function lerp(a, b, t) {
    const ah = parseInt(a.slice(1),16), bh = parseInt(b.slice(1),16);
    const r = Math.round(((ah>>16)&255)*(1-t) + ((bh>>16)&255)*t);
    const g = Math.round(((ah>>8)&255)*(1-t) + ((bh>>8)&255)*t);
    const bl = Math.round((ah&255)*(1-t) + (bh&255)*t);
    return `rgb(${r},${g},${bl})`;
  }
  if (tod.phase === "day") return colors.day;
  if (tod.phase === "night") return colors.night;
  if (tod.phase === "sunrise") {
    return {
      top: lerp(colors.night.top, colors.day.top, tod.blend),
      mid: lerp(colors.sunrise.mid, colors.day.mid, tod.blend),
      bot: lerp(colors.sunrise.bot, colors.day.bot, tod.blend),
    };
  }
  // sunset
  return {
    top: lerp(colors.day.top, colors.night.top, tod.blend),
    mid: lerp(colors.sunset.mid, colors.night.mid, tod.blend),
    bot: lerp(colors.sunset.bot, colors.night.bot, tod.blend),
  };
}

function getGrassColors(tod) {
  if (tod.phase === "night") return { top: "#2a5a30", bot: "#1e4025" };
  if (tod.phase === "sunset") return {
    top: `rgb(${Math.round(126*(1-tod.blend*.4))},${Math.round(200*(1-tod.blend*.35))},${Math.round(126*(1-tod.blend*.4))})`,
    bot: `rgb(${Math.round(90*(1-tod.blend*.4))},${Math.round(173*(1-tod.blend*.35))},${Math.round(90*(1-tod.blend*.4))})`,
  };
  return { top: "#7ec87e", bot: "#5aad5a" };
}

function isNightish(tod) {
  return tod.phase === "night" || (tod.phase === "sunset" && tod.blend > 0.5);
}

function Building({ def, x, groundY, isNewest, onFire, scale, night }) {
  const sw = def.w * scale, sh = def.h * scale;
  const bx = x - sw/2, by = groundY - sh;
  const ws = 6*scale, wg = 4*scale;
  const winColor = night ? "#ffd866" : "#fff";
  const winOp = night ? 1 : .85;
  const winGlow = night ? "drop-shadow(0 0 3px rgba(255,216,100,.7))" : "none";
  return (
    <g>
      <ellipse cx={x} cy={groundY+2} rx={sw/2.2} ry={3*scale} fill="#00000012"/>
      <rect x={bx} y={by} width={sw} height={sh} rx={3*scale}
        fill={def.color} stroke={def.roof} strokeWidth={.5}
        style={{ animation: isNewest ? "buildRise .6s ease-out" : "none", transformOrigin:`${x}px ${groundY}px` }}/>
      {def.type==="cathedral"||def.type==="monument" ? (
        <polygon points={`${bx},${by} ${x},${by-20*scale} ${bx+sw},${by}`} fill={def.roof}/>
      ) : def.type==="castle" ? (
        <React.Fragment>
          <rect x={bx} y={by-8*scale} width={8*scale} height={8*scale} fill={def.roof} rx={1}/>
          <rect x={bx+sw-8*scale} y={by-8*scale} width={8*scale} height={8*scale} fill={def.roof} rx={1}/>
          <rect x={x-4*scale} y={by-12*scale} width={8*scale} height={12*scale} fill={def.roof} rx={1}/>
        </React.Fragment>
      ) : (
        <rect x={bx-2*scale} y={by-5*scale} width={sw+4*scale} height={6*scale} rx={2*scale} fill={def.roof}/>
      )}
      {Array.from({length:def.win}).map((_,wi)=>{
        const col=wi%2, row=Math.floor(wi/2);
        const wx=bx+(sw/2-ws-wg/2)+col*(ws+wg), wy=by+10*scale+row*(ws+wg);
        if(wy+ws>groundY-4*scale) return null;
        return <rect key={wi} x={wx} y={wy} width={ws} height={ws} rx={1*scale}
          fill={winColor} stroke="#00000012" strokeWidth={.5} opacity={winOp}
          style={{ filter: winGlow }}/>;
      })}
      <rect x={x-5*scale} y={groundY-12*scale} width={10*scale} height={12*scale} rx={2*scale} fill={def.roof} opacity={.8}/>
      {onFire && (
        <g>
          {[0,-8,8,-4,4].map((ox,fi)=>(
            <ellipse key={fi} cx={x+ox*scale} cy={by+5*scale+fi*2*scale} rx={(6+fi*1.5)*scale} ry={(10+fi*2)*scale}
              fill={fi%2===0?"#ff6b35":"#ffd32a"} opacity={.8}
              style={{ animation:`fireFlicker ${.3+fi*.1}s ease-in-out infinite alternate`, transformOrigin:`${x+ox*scale}px ${by+15*scale}px` }}/>
          ))}
          {[0,-6,6].map((ox,si)=>(
            <circle key={`s${si}`} cx={x+ox*scale} cy={by-10*scale-si*8*scale} r={(5+si*2)*scale} fill="#888" opacity={.25}
              style={{ animation:`smokeRise ${1.5+si*.3}s ease-out infinite` }}/>
          ))}
        </g>
      )}
    </g>
  );
}

function CityScene({ buildings, fireActive, fireIndex }) {
  const W = 900, H = 460, gY = H - 40;

  const [tod, setTod] = useState(getTimeOfDay);
  useEffect(() => {
    const iv = setInterval(() => setTod(getTimeOfDay()), 60000);
    return () => clearInterval(iv);
  }, []);

  const sky = getSkyColors(tod);
  const grass = getGrassColors(tod);
  const night = isNightish(tod);
  const skyId = `sky_${tod.phase}`;
  const grassId = `grass_${tod.phase}`;

  // Dynamic building layout: spread across full width
  const n = buildings.length;
  const padding = 35;
  const usableW = W - padding * 2;
  // Scale buildings to fill available space
  const baseSpacing = 55;
  const naturalW = n * baseSpacing;
  const scale = n === 0 ? 1.3 : Math.min(1.6, Math.max(0.7, usableW / Math.max(naturalW, 1)));
  const spacing = n <= 1 ? 0 : Math.min(baseSpacing * scale, usableW / (n - 1 || 1));
  const totalSpan = n <= 1 ? 0 : spacing * (n - 1);
  const startX = padding + (usableW - totalSpan) / 2;

  const cloudsRef = useRef(Array.from({length:7},(_,i)=>({
    x:30+i*125+Math.random()*50, y:20+Math.random()*60,
    sc:.5+Math.random()*.6, d:Math.random()*8
  })));

  const starsRef = useRef(Array.from({length:40},()=>({
    x:Math.random()*W, y:Math.random()*(gY-60),
    r:.5+Math.random()*1.5, o:.3+Math.random()*.7, d:Math.random()*4
  })));

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:"100%", display:"block", borderRadius:16 }}
         preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id={skyId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={sky.top}/>
          <stop offset="50%" stopColor={sky.mid}/>
          <stop offset="100%" stopColor={sky.bot}/>
        </linearGradient>
        <linearGradient id={grassId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={grass.top}/>
          <stop offset="100%" stopColor={grass.bot}/>
        </linearGradient>
        <radialGradient id="sun" cx=".5" cy=".5" r=".5">
          <stop offset="0%" stopColor="#fff7b0"/><stop offset="40%" stopColor="#ffe066" stopOpacity=".5"/><stop offset="100%" stopColor="#ffe066" stopOpacity="0"/>
        </radialGradient>
        <radialGradient id="moon" cx=".35" cy=".35" r=".5">
          <stop offset="0%" stopColor="#f0f0e8"/><stop offset="100%" stopColor="#d8d8c8"/>
        </radialGradient>
      </defs>

      {/* Sky */}
      <rect width={W} height={H} fill={`url(#${skyId})`}/>

      {/* Stars (night/late sunset) */}
      {night && starsRef.current.map((s,i)=>(
        <circle key={`star${i}`} cx={s.x} cy={s.y} r={s.r} fill="#fff" opacity={s.o}
          style={{ animation:`breathe ${2+s.d}s ease-in-out infinite` }}/>
      ))}

      {/* Sun or Moon */}
      {!night ? (
        <React.Fragment>
          <circle cx={W-100} cy={65} r={55} fill="url(#sun)"/>
          <circle cx={W-100} cy={65} r={24} fill="#FFD93D"/>
        </React.Fragment>
      ) : (
        <React.Fragment>
          <circle cx={W-100} cy={65} r={28} fill="url(#moon)"/>
          <circle cx={W-88} cy={55} r={22} fill={sky.top} opacity={.85}/>
        </React.Fragment>
      )}

      {/* Clouds (dimmer at night) */}
      {cloudsRef.current.map((c,i)=>(
        <g key={i} transform={`translate(${c.x},${c.y}) scale(${c.sc})`}
           style={{ animation:`cloudDrift ${20+i*5}s ease-in-out ${c.d}s infinite alternate` }}
           opacity={night ? .2 : .85}>
          <ellipse cx={0} cy={0} rx={30} ry={12} fill="white"/>
          <ellipse cx={-15} cy={-4} rx={18} ry={10} fill="white"/>
          <ellipse cx={15} cy={-3} rx={20} ry={11} fill="white"/>
          <ellipse cx={5} cy={-8} rx={16} ry={9} fill="white"/>
        </g>
      ))}

      {/* Background hills */}
      <ellipse cx={180} cy={gY+5} rx={220} ry={35} fill={night?"#1a3520":"#a8dda0"} opacity={.4}/>
      <ellipse cx={600} cy={gY+8} rx={280} ry={30} fill={night?"#183818":"#90d088"} opacity={.35}/>

      {/* Ground */}
      <rect x={0} y={gY} width={W} height={H-gY} fill={`url(#${grassId})`}/>
      <line x1={0} y1={gY} x2={W} y2={gY} stroke={night?"#2a5a30":"#68b868"} strokeWidth={1.5}/>

      {/* Road */}
      <rect x={0} y={gY+10} width={W} height={10} fill={night?"#3a3a30":"#d4c8a0"} rx={2} opacity={.7}/>
      {Array.from({length:Math.ceil(W/48)}).map((_,i)=>(
        <rect key={i} x={10+i*48} y={gY+14} width={22} height={2.5} fill={night?"#555540":"#c0b488"} rx={1} opacity={.6}/>
      ))}

      {/* Trees when few buildings */}
      {n<5 && [140,480,700].map((tx,ti)=>(
        <g key={`t${ti}`}>
          <rect x={tx-4} y={gY-28} width={8} height={28} fill={night?"#5a4010":"#8B6914"} rx={2}/>
          <circle cx={tx} cy={gY-38} r={16} fill={night?"#2a6030":"#4CAF50"} opacity={.7}/>
          <circle cx={tx-9} cy={gY-30} r={10} fill={night?"#306838":"#66BB6A"} opacity={.6}/>
          <circle cx={tx+9} cy={gY-32} r={12} fill={night?"#286028":"#43A047"} opacity={.65}/>
        </g>
      ))}

      {/* Empty state text */}
      {n===0 && (
        <text x={W/2} y={gY-100} textAnchor="middle" fill={night?"#6a8ab0":"#6a9fb0"} fontSize={15} fontFamily="Inter,system-ui">
          Complete your first focus session to start building
        </text>
      )}

      {/* Buildings */}
      {buildings.map((bIdx,i)=>{
        const def=BUILDING_DEFS[bIdx%BUILDING_DEFS.length];
        const bx = n===1 ? W/2 : startX + i * spacing;
        return <Building key={i} def={def} x={bx} groundY={gY}
          isNewest={i===n-1} onFire={fireActive&&i===fireIndex} scale={scale} night={night}/>;
      })}

      {/* Night overlay for atmosphere */}
      {night && <rect width={W} height={H} fill="#000020" opacity={.12}/>}
    </svg>
  );
}

function CircularTimer({ remaining, total, label, accent }) {
  const r=110, circ=2*Math.PI*r, progress=total>0?remaining/total:1;
  const off = circ*(1-progress);
  const gradId = accent==="break" ? "tgBreak" : "tgFocus";
  return (
    <div style={{ position:"relative", width:240, height:240 }}>
      <svg viewBox="0 0 260 260" style={{ width:"100%", height:"100%", transform:"rotate(-90deg)" }}>
        <circle cx={130} cy={130} r={r} fill="none" stroke="#e8ecf2" strokeWidth={8}/>
        <circle cx={130} cy={130} r={r} fill="none"
          stroke={`url(#${gradId})`} strokeWidth={8} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={off}
          style={{ transition:"stroke-dashoffset 250ms linear" }}/>
        <defs>
          <linearGradient id="tgFocus" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#1a365d"/><stop offset="100%" stopColor="#38bdf8"/>
          </linearGradient>
          <linearGradient id="tgBreak" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#f59e0b"/><stop offset="100%" stopColor="#fb923c"/>
          </linearGradient>
        </defs>
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
        <div style={{ fontSize:44, fontWeight:700, color:"#1e293b", fontVariantNumeric:"tabular-nums", letterSpacing:2 }}>
          {fmt(remaining)}
        </div>
        <div style={{ fontSize:12, color:"#94a3b8", marginTop:4, textTransform:"uppercase", letterSpacing:1 }}>
          {label}
        </div>
      </div>
    </div>
  );
}

function DurationInput({ value, onChange, presets, error, label }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:12 }}>
      <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
        <input
          type="number" className={`time-input ${error?"error":""}`}
          value={value} min={1} max={999}
          onChange={e=>onChange(e.target.value)}
        />
        <span style={{ fontSize:16, color:"#94a3b8", fontWeight:500 }}>min</span>
      </div>
      <div className="input-error">{error||""}</div>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", justifyContent:"center" }}>
        {presets.map(p=>(
          <button key={p} className={`chip ${String(value)===String(p)?"active":""}`}
            onClick={()=>onChange(String(p))}>{p}m</button>
        ))}
      </div>
    </div>
  );
}

function App() {
  const saved = useRef(loadSave());

  const [phase, setPhase] = useState("setup");
  const [focusInput, setFocusInput] = useState("25");
  const [breakInput, setBreakInput] = useState("5");
  const [remaining, setRemaining] = useState(0);
  const [totalSec, setTotalSec] = useState(0);
  const [buildings, setBuildings] = useState(()=> saved.current?.buildings || []);
  const [fireActive, setFireActive] = useState(()=> saved.current?.fireActive || false);
  const [fireIndex, setFireIndex] = useState(()=> saved.current?.fireIndex ?? -1);
  const [history, setHistory] = useState(()=> saved.current?.history || []);
  const [flash, setFlash] = useState(false);
  const [inputErr, setInputErr] = useState("");
  const [breakErr, setBreakErr] = useState("");
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [showInstructions, setShowInstructions] = useState(false);
  const [showAlarmSettings, setShowAlarmSettings] = useState(false);
  const [alarmMode, setAlarmMode] = useState(()=> loadAlarmPrefs()?.mode || "both");
  const [alarmSound, setAlarmSound] = useState(()=> loadAlarmPrefs()?.sound || "chime");
  const [viewMode, setViewMode] = useState("day");
  const [viewDate, setViewDate] = useState(new Date());
  const [coins, setCoins] = useState(()=> loadStoreData()?.coins || 0);
  const [unlockedBuildings, setUnlockedBuildings] = useState(()=> loadStoreData()?.unlocked || []);
  const [selectedBuilding, setSelectedBuilding] = useState(()=> {
    const saved = loadStoreData()?.selectedBuilding;
    return saved !== undefined && saved !== null ? saved : null;
  });
  const [showStore, setShowStore] = useState(false);
  const [coinAnim, setCoinAnim] = useState(false);
  const [coinFloatText, setCoinFloatText] = useState(null);
  const [lastUnlocked, setLastUnlocked] = useState(null);
  const intervalRef = useRef(null);
  const endTimeRef = useRef(null);
  const completedRef = useRef(false);

  useEffect(()=>{ requestNotifPermission(); },[]);

  useEffect(()=>{
    saveAlarmPrefs({ mode: alarmMode, sound: alarmSound });
  },[alarmMode, alarmSound]);

  useEffect(()=>{
    writeSave({ buildings, fireActive, fireIndex, history });
  },[buildings, fireActive, fireIndex, history]);

  // ── Persist store data ──
  useEffect(()=>{
    saveStoreData({ coins, unlocked: unlockedBuildings, selectedBuilding });
  },[coins, unlockedBuildings, selectedBuilding]);

  // ── Clear shared session when returning to idle phases ──
  useEffect(()=>{
    if (phase === "setup" || phase === "break_setup" || phase === "break_done" || phase === "failed") {
      const s = getFCSession();
      if (s && s.status === "active") {
        // Don't clear if still active — only clear stale sessions
      } else if (s) {
        setFCSession({...s, status:"idle"});
      }
    }
  },[phase]);

  // ── Restore active session from shared state on mount ──
  useEffect(()=>{
    const s = getFCSession();
    if (!s) return;

    // Handle completed_pending: session finished while user was on another page
    if (s.status === "completed_pending" && s.type === "focus") {
      // Process rewards now
      setFocusInput(String(s.duration));
      const earnedCoins = calcCoins(s.duration);
      if (fireActive) {
        setFireActive(false); setFireIndex(-1);
        awardCoins(earnedCoins);
        setHistory(h=>[{result:"extinguished",duration:s.duration,time:timeNow(),building:null,timestamp:Date.now(),coinsEarned:earnedCoins},...h]);
      } else {
        const idx = pickNextBuilding(buildings.length);
        setBuildings(b=>[...b,idx]);
        awardCoins(earnedCoins);
        setHistory(h=>[{result:"completed",duration:s.duration,time:timeNow(),building:BUILDING_DEFS[idx].label,timestamp:Date.now(),buildingIdx:idx,coinsEarned:earnedCoins},...h]);
      }
      setPhase("focus_done_modal");
      setFCSession({...s, status:"idle", completed:true});
      return;
    }

    if (s.status !== "active") return;
    const now = Date.now();
    const rem = s.endTime - now;
    if (rem <= 0) {
      // Session expired — let the timer effect handle completion naturally
      setFocusInput(String(s.duration));
      setRemaining(0);
      setTotalSec(s.endTime - s.startTime);
      endTimeRef.current = s.endTime;
      completedRef.current = false;
      setPhase(s.type === "break" ? "break_active" : "focus");
      return;
    }
    // Restore in-progress session
    setFocusInput(String(s.duration));
    setRemaining(rem);
    setTotalSec(s.endTime - s.startTime);
    endTimeRef.current = s.endTime;
    completedRef.current = false;
    setPhase(s.type === "break" ? "break_active" : "focus");
  },[]);

  // ── Poll for parent-initiated cancellation ──
  useEffect(()=>{
    if (phase !== "focus" && phase !== "break_active") return;
    const pollId = setInterval(()=>{
      const s = getFCSession();
      if (s && s.status === "cancelled") {
        // Parent cancelled the session
        clearInterval(intervalRef.current);
        playFailSound();
        if (buildings.length > 0 && !fireActive) {
          setFireActive(true); setFireIndex(buildings.length - 1);
        } else if (buildings.length === 0 && !fireActive) {
          setFireActive(true); setFireIndex(-1);
        }
        setHistory(h => [{result:"failed",duration:Number(focusInput),time:timeNow(),building:null,timestamp:Date.now()}, ...h]);
        setPhase("failed");
        setFCSession({...s, status:"idle", completed:false});
      }
    }, 1000);
    return ()=> clearInterval(pollId);
  },[phase, buildings, fireActive, focusInput]);

  // ── Get available building pool (starters + unlocked) ──
  function getAvailablePool() {
    const starterIndices = Array.from({length: STARTER_COUNT}, (_,i) => i);
    return [...starterIndices, ...unlockedBuildings];
  }

  // ── Pick next building — use selected building if set, otherwise rotate pool ──
  function pickNextBuilding(buildCount) {
    if (selectedBuilding !== null) {
      // Verify the selected building is still in the available pool
      const pool = getAvailablePool();
      if (pool.includes(selectedBuilding)) return selectedBuilding;
    }
    const pool = getAvailablePool();
    return pool[buildCount % pool.length];
  }

  // ── Select a building as preferred ──
  function selectBuilding(idx) {
    setSelectedBuilding(prev => prev === idx ? null : idx);
  }

  // ── Award coins with animation ──
  function awardCoins(amount) {
    setCoins(c => c + amount);
    setCoinAnim(true);
    setCoinFloatText(`+${amount}`);
    setTimeout(() => setCoinAnim(false), 600);
    setTimeout(() => setCoinFloatText(null), 1300);
  }

  // ── Buy building from store ──
  function buyBuilding(storeItem) {
    if (coins < storeItem.cost) return;
    if (unlockedBuildings.includes(storeItem.idx)) return;
    setCoins(c => c - storeItem.cost);
    setUnlockedBuildings(u => [...u, storeItem.idx]);
    setLastUnlocked(storeItem.idx);
    setTimeout(() => setLastUnlocked(null), 600);
  }

  const resetProgress = useCallback(()=>{
    clearSave();
    clearFCSession();
    try { localStorage.removeItem(STORE_STORAGE_KEY); } catch(e){}
    setBuildings([]);
    setFireActive(false);
    setFireIndex(-1);
    setHistory([]);
    setCoins(0);
    setUnlockedBuildings([]);
    setSelectedBuilding(null);
    setPhase("setup");
    setShowResetConfirm(false);
  },[]);

  const timeNow = () => new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

  function validateMin(v) {
    if (v===""||v===undefined) return "Enter a duration";
    const n = Number(v);
    if (isNaN(n)) return "Must be a number";
    if (n <= 0) return "Must be greater than 0";
    if (!Number.isInteger(n)) return "Must be a whole number";
    if (n > 999) return "Maximum 999 minutes";
    return "";
  }

  const startFocus = useCallback(()=>{
    const err = validateMin(focusInput);
    if (err) { setInputErr(err); return; }
    setInputErr("");
    const durationMs = Number(focusInput)*60*1000;
    const now = Date.now();
    setRemaining(durationMs);
    setTotalSec(durationMs);
    endTimeRef.current = now + durationMs;
    completedRef.current = false;
    setPhase("focus");
    // Write shared session state
    const task = localStorage.getItem("medschedule_fc_task") || "";
    setFCSession({status:"active",startTime:now,endTime:now+durationMs,duration:Number(focusInput),task:task,type:"focus",completed:false});
  },[focusInput]);

  const cancelFocus = useCallback(()=>{
    clearInterval(intervalRef.current);
    playFailSound();
    if (buildings.length>0 && !fireActive) {
      setFireActive(true); setFireIndex(buildings.length-1);
    } else if (buildings.length===0 && !fireActive) {
      setFireActive(true); setFireIndex(-1);
    }
    setHistory(h=>[{result:"failed",duration:Number(focusInput),time:timeNow(),building:null,timestamp:Date.now()},...h]);
    setPhase("failed");
    // Update shared session state
    const s=getFCSession();
    if(s)setFCSession({...s,status:"idle",completed:false});
  },[buildings,fireActive,focusInput]);

  const completeFocus = useCallback(()=>{
    fireAlarm("Focus Complete!",
      fireActive ? "Time to extinguish the fire. Take a break or keep going!" : "A new building awaits. Take a break or keep going!",
      alarmMode, alarmSound);
    setFlash(true); setTimeout(()=>setFlash(false),1500);

    const earnedCoins = calcCoins(Number(focusInput));

    if (fireActive) {
      setFireActive(false); setFireIndex(-1);
      awardCoins(earnedCoins);
      setHistory(h=>[{result:"extinguished",duration:Number(focusInput),time:timeNow(),building:null,timestamp:Date.now(),coinsEarned:earnedCoins},...h]);
    } else {
      const idx = pickNextBuilding(buildings.length);
      setBuildings(b=>[...b,idx]);
      awardCoins(earnedCoins);
      setHistory(h=>[{result:"completed",duration:Number(focusInput),time:timeNow(),building:BUILDING_DEFS[idx].label,timestamp:Date.now(),buildingIdx:idx,coinsEarned:earnedCoins},...h]);
    }
    setPhase("focus_done_modal");
    // Update shared session state
    const s=getFCSession();
    if(s)setFCSession({...s,status:"idle",completed:true});
  },[fireActive,buildings,focusInput,alarmMode,alarmSound,unlockedBuildings,selectedBuilding]);

  const startBreak = useCallback(()=>{
    const err = validateMin(breakInput);
    if (err) { setBreakErr(err); return; }
    setBreakErr("");
    const durationMs = Number(breakInput)*60*1000;
    const now = Date.now();
    setRemaining(durationMs);
    setTotalSec(durationMs);
    endTimeRef.current = now + durationMs;
    completedRef.current = false;
    setPhase("break_active");
    // Write shared session state for break
    const task = localStorage.getItem("medschedule_fc_task") || "";
    setFCSession({status:"active",startTime:now,endTime:now+durationMs,duration:Number(breakInput),task:task,type:"break",completed:false});
  },[breakInput]);

  const completeBreak = useCallback(()=>{
    fireAlarm("Break Over!", "Time to get back to focus.", alarmMode, alarmSound);
    setPhase("break_done");
    // Update shared session state
    const s=getFCSession();
    if(s)setFCSession({...s,status:"idle",completed:true});
  },[alarmMode, alarmSound]);

  useEffect(()=>{
    if (phase!=="focus" && phase!=="break_active") return;

    const completeFn = phase==="focus" ? completeFocus : completeBreak;

    intervalRef.current = setInterval(()=>{
      if (!endTimeRef.current) return;

      const now = Date.now();
      const newRemaining = Math.max(0, endTimeRef.current - now);
      setRemaining(newRemaining);

      if (newRemaining === 0 && !completedRef.current) {
        completedRef.current = true;
        clearInterval(intervalRef.current);
        completeFn();
      }
    }, 250);

    return ()=>clearInterval(intervalRef.current);
  },[phase,completeFocus,completeBreak]);

  const range = getRange(viewMode, viewDate);
  const filteredHistory = history.filter(h => h.timestamp >= range.start && h.timestamp <= range.end);

  const filteredBuildings = filteredHistory
    .filter(h => h.result === "completed")
    .map(h => h.buildingIdx !== undefined ? h.buildingIdx : (buildings.length % BUILDING_DEFS.length));

  const lastFilteredEntry = filteredHistory[0];
  const shouldShowFireInView = fireActive && lastFilteredEntry && lastFilteredEntry.result === "failed";

  const totalMin = history.filter(h=>h.result!=="failed").reduce((a,h)=>a+h.duration,0);
  const periodTotalMin = filteredHistory.filter(h=>h.result!=="failed").reduce((a,h)=>a+h.duration,0);

  function fmtTime(mins) {
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    if (h === 0) return `${m}m`;
    if (m === 0) return `${h}h`;
    return `${h}h ${m}m`;
  }
  const periodBuildings = filteredBuildings.length;
  const periodSessions = filteredHistory.filter(h=>h.result==="completed").length;

  const navLeft = useCallback(()=>{
    setViewDate(prev=>{
      const d = new Date(prev);
      if (viewMode==="day") d.setDate(d.getDate()-1);
      else if (viewMode==="week") d.setDate(d.getDate()-7);
      else if (viewMode==="month") d.setMonth(d.getMonth()-1);
      else if (viewMode==="year") d.setFullYear(d.getFullYear()-1);
      return d;
    });
  },[viewMode]);

  const navRight = useCallback(()=>{
    setViewDate(prev=>{
      const d = new Date(prev);
      if (viewMode==="day") d.setDate(d.getDate()+1);
      else if (viewMode==="week") d.setDate(d.getDate()+7);
      else if (viewMode==="month") d.setMonth(d.getMonth()+1);
      else if (viewMode==="year") d.setFullYear(d.getFullYear()+1);
      return d;
    });
  },[viewMode]);

  const goToday = useCallback(()=>{
    setViewDate(new Date());
  },[]);

  return (
    <React.Fragment>
      {flash && <div className="flash-overlay"/>}

      <header style={{ padding:"20px 36px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{
            width:40, height:40, borderRadius:12,
            background:"linear-gradient(135deg,#1a365d,#38bdf8)",
            display:"flex", alignItems:"center", justifyContent:"center", fontSize:20,
            boxShadow:"0 2px 12px rgba(26,54,93,.25)"
          }}>🏙</div>
          <span style={{ fontSize:22, fontWeight:800, letterSpacing:-.5 }}>Focus Builder</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:16, fontSize:13, color:"#94a3b8" }}>
          <div className={`coin-display ${coinAnim?"coin-earn-anim":""}`}>
            <span className="coin-icon">C</span>
            {coins}
          </div>
          <span>{buildings.length} building{buildings.length!==1?"s":""}</span>

                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                  {SOUND_DEFS.map(s=>(
                    <div key={s.id} className={`sound-row ${alarmSound===s.id?"active":""}`}
                      onClick={()=>setAlarmSound(s.id)}>
                      <div className="sr-dot"></div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{s.label}</div>
                        <div style={{ fontSize:11, color:"#94a3b8" }}>{s.desc}</div>
                      </div>
                      <button className="btn-preview" onClick={e=>{e.stopPropagation();synthesizeSound(s.id)}}>
                        ▶ Preview
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div style={{
              marginTop:20, padding:"10px 14px", borderRadius:10,
              background:"#f8fafc", border:"1px solid #f1f5f9",
              fontSize:12, color:"#64748b", textAlign:"center",
            }}>
              Current: <strong style={{ color:"#1e293b" }}>
                {ALARM_MODES.find(m=>m.id===alarmMode)?.label}
              </strong>
              {(alarmMode==="sound"||alarmMode==="both") && (
                <span> · <strong style={{ color:"#1e293b" }}>{SOUND_DEFS.find(s=>s.id===alarmSound)?.label}</strong></span>
              )}
              <span style={{ marginLeft:6, fontSize:11, color:"#94a3b8" }}>· saved automatically</span>
            </div>

            <button className="btn-primary" onClick={()=>setShowAlarmSettings(false)}
              style={{ width:"100%", marginTop:16 }}>
              Done
            </button>
          </div>
        </div>
      )}

      {showInstructions && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowInstructions(false)}}>
          <div className="modal-card" style={{ maxWidth:520, padding:"32px 36px", textAlign:"left" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
              <div style={{ fontSize:20, fontWeight:800, color:"#1e293b", display:"flex", alignItems:"center", gap:8 }}>
                <span style={{
                  width:32, height:32, borderRadius:10,
                  background:"linear-gradient(135deg,#1a365d,#38bdf8)",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:16, color:"#fff"
                }}>📖</span>
                How Focus Builder Works
              </div>
              <button onClick={()=>setShowInstructions(false)} style={{
                width:32, height:32, borderRadius:8, border:"none",
                background:"#f1f5f9", color:"#64748b", fontSize:18,
                cursor:"pointer", display:"flex", alignItems:"center",
                justifyContent:"center", transition:"all .2s",
              }}
              onMouseEnter={e=>{e.target.style.background="#e2e8f0"}}
              onMouseLeave={e=>{e.target.style.background="#f1f5f9"}}
              >✕</button>
            </div>

            <div className="instructions-body">

              <div className="instr-section">
                <div className="instr-heading">
                  <span className="instr-icon" style={{ background:"rgba(26,54,93,.1)", color:"#1a365d" }}>🎯</span>
                  Focus Sessions
                </div>
                <div className="instr-text">
                  Set any duration you like and start a focus session. If you complete the full session without giving up, <strong>a new building will be added</strong> to your campus. Each building represents real, focused effort.
                </div>
              </div>

              <div className="instr-section">
                <div className="instr-heading">
                  <span className="instr-icon" style={{ background:"rgba(239,68,68,.08)", color:"#ef4444" }}>⛔</span>
                  Canceling a Session
                </div>
                <div className="instr-text">
                  If you stop or cancel the timer before it finishes, <strong>no building will be added</strong>. Instead, a
                  <span className="instr-highlight" style={{ background:"#fff7ed", color:"#c2410c" }}>🔥 fire</span>
                  will appear on your most recent building, representing a broken focus streak.
                </div>
              </div>

              <div className="instr-section">
                <div className="instr-heading">
                  <span className="instr-icon" style={{ background:"rgba(245,158,11,.1)", color:"#f59e0b" }}>🔥</span>
                  The Fire System
                </div>
                <div className="instr-text">
                  Fire stays active until you complete a full focus session. That recovery session will <strong>only extinguish the fire</strong> — it will not build anything new. After the fire is out, your next successful session returns to normal progress.
                </div>
              </div>

              <div className="instr-section">
                <div className="instr-heading">
                  <span className="instr-icon" style={{ background:"rgba(245,158,11,.1)", color:"#d97706" }}>☕</span>
                  Break System
                </div>
                <div className="instr-text">
                  After each successful focus session, you can take a timed break or skip it. Breaks are for rest only — they <strong>do not build anything</strong> and <strong>do not extinguish fire</strong>. Only focus sessions affect your progress.
                </div>
              </div>

              <div className="instr-section">
                <div className="instr-heading">
                  <span className="instr-icon" style={{ background:"rgba(34,197,94,.1)", color:"#22c55e" }}>🏙</span>
                  Campus Growth
                </div>
                <div className="instr-text">
                  Your campus grows one building at a time. The more consistently you study, the larger and more impressive it becomes — from small cottages all the way to castles. Each building is a monument to your discipline.
                </div>
              </div>

              <div className="instr-section" style={{ marginBottom:0 }}>
                <div className="instr-heading">
                  <span className="instr-icon" style={{ background:"rgba(56,189,248,.1)", color:"#38bdf8" }}>💾</span>
                  Progress Saving
                </div>
                <div className="instr-text">
                  Your campus, fire state, and session history are <strong>automatically saved</strong> in your browser. When you reopen the app, everything will be exactly as you left it. Use the <strong>Reset Progress</strong> button in Campus Stats if you ever want a fresh start.
                </div>
              </div>

            </div>

            <button className="btn-primary" onClick={()=>setShowInstructions(false)}
              style={{ width:"100%", marginTop:20 }}>
              Got It
            </button>
          </div>
        </div>
      )}

      {showResetConfirm && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowResetConfirm(false)}}>
          <div className="modal-card">
            <div style={{ fontSize:48, marginBottom:12 }}>⚠️</div>
            <div style={{ fontSize:20, fontWeight:700, marginBottom:8 }}>Reset All Progress?</div>
            <div style={{ fontSize:14, color:"#64748b", marginBottom:24, lineHeight:1.6 }}>
              This will permanently delete your entire campus, session history, and fire state. This cannot be undone.
            </div>
            <div style={{ display:"flex", gap:12 }}>
              <button className="btn-danger" onClick={resetProgress} style={{ flex:1, fontWeight:700 }}>
                Yes, Reset Everything
              </button>
              <button className="btn-secondary" onClick={()=>setShowResetConfirm(false)} style={{ flex:1 }}>
                Cancel
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Footer ─────────────────────────────────────── */}
      <footer className="app-footer">
        <span className="app-footer-text">&copy; Focus Builder &mdash; All rights reserved</span>
      </footer>

    </React.Fragment>
  );
}

window.__mountFocusCity = function(){
  const el = document.getElementById("fc-app-root");
  if(!el) return;
  if(window.__fcReactRoot){ try { window.__fcReactRoot.unmount(); } catch(e){} }
  window.__fcReactRoot = ReactDOM.createRoot(el);
  window.__fcReactRoot.render(<App/>);
};

})();

</script>
</body>
</html>
