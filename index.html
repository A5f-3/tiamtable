function srTaskTab(m){
  const lp=document.getElementById('sr-lec-pane'),cp=document.getElementById('sr-custom-pane');
  const bl=document.getElementById('sr-tab-lec'),bc=document.getElementById('sr-tab-custom');
  if(m==='lec'){lp.style.display='';cp.style.display='none';bl.classList.remove('btn-outline');bl.classList.add('btn-primary');bc.classList.remove('btn-primary');bc.classList.add('btn-outline');}
  else{lp.style.display='none';cp.style.display='';bc.classList.remove('btn-outline');bc.classList.add('btn-primary');bl.classList.remove('btn-primary');bl.classList.add('btn-outline');}
}
function srOnCourseChange(){
  _srPicker.cid=document.getElementById('sr-course').value;
  _srPicker.subj='';_srPicker.week='';
  const subjSel=document.getElementById('sr-subject');
  if(!_srPicker.cid){subjSel.innerHTML='<option value="">— Pick a course first —</option>';subjSel.disabled=true;document.getElementById('sr-week-wrap').style.display='none';srRenderLecList();return;}
  subjSel.disabled=false;
  const subjects=getCourseSubjects(_srPicker.cid);
  subjSel.innerHTML='<option value="">— Select a subject —</option>'+subjects.map(s=>`<option value="${escHtml(s).replace(/"/g,'&quot;')}">${escHtml(s)}</option>`).join('');
  document.getElementById('sr-week-wrap').style.display='none';
  srRenderLecList();
}
function srOnSubjectChange(){
  _srPicker.subj=document.getElementById('sr-subject').value;
  _srPicker.week='';
  const weeks=[...new Set(getLecs(_srPicker.cid).filter(l=>l.subject===_srPicker.subj&&l.week).map(l=>l.week))].sort((a,b)=>a-b);
  const wrap=document.getElementById('sr-week-wrap');
  const wSel=document.getElementById('sr-week');
  if(weeks.length){
    wrap.style.display='';
    wSel.innerHTML='<option value="">All weeks</option>'+weeks.map(w=>`<option value="${w}">Week ${w}</option>`).join('');
  } else {
    wrap.style.display='none';
  }
  srRenderLecList();
}
function srOnWeekChange(){_srPicker.week=document.getElementById('sr-week').value;srRenderLecList();}
function srRenderLecList(){
  const box=document.getElementById('sr-lec-list');if(!box)return;
  if(!_srPicker.cid||!_srPicker.subj){box.innerHTML='<div style="color:var(--text-lighter);font-size:.82rem;text-align:center;padding:18px 0">Pick a course and subject to see lectures.</div>';return;}
  let lecs=getLecs(_srPicker.cid).filter(l=>l.subject===_srPicker.subj);
  if(_srPicker.week!=='')lecs=lecs.filter(l=>String(l.week)===String(_srPicker.week));
  if(!lecs.length){box.innerHTML='<div style="color:var(--text-lighter);font-size:.82rem;text-align:center;padding:18px 0">No lectures match.</div>';return;}
  let h='';
  lecs.forEach(l=>{
    const revs=getRevs(l.id);
    const nextRev=(revs.length?maxRev(l.id)+1:1);
    h+=`<label style="display:flex;align-items:center;gap:8px;padding:6px 6px;border-bottom:1px solid var(--border-light);cursor:pointer">
      <input type="checkbox" class="sr-lec-cb" value="${l.id}">
      <span style="flex:1;font-size:.85rem">${escHtml(l.title)}${l.week?` <span style="color:var(--text-lighter);font-size:.72rem">· Week ${l.week}</span>`:''}</span>
      <span style="font-size:.7rem;color:var(--text-light)">Next: ${ord(nextRev)} rev</span>
    </label>`;
  });
  box.innerHTML=h;
}
function srSubmitTask(){
  const r=findStudyRound(_srPicker.rid);if(!r||!r.days[_srPicker.di])return;
  const day=r.days[_srPicker.di];
  const customPane=document.getElementById('sr-custom-pane');
  if(customPane&&customPane.style.display!=='none'){
    const title=(document.getElementById('sr-custom-title').value||'').trim();
    if(!title)return alert('Please enter a task title.');
    day.tasks.push({id:gid(),kind:'custom',title});
  } else {
    const cbs=Array.from(document.querySelectorAll('.sr-lec-cb:checked'));
    if(!cbs.length)return alert('Select at least one lecture, or switch to the Custom tab.');
    cbs.forEach(cb=>{
      const lid=cb.value;const lec=findLec(lid);if(!lec)return;
      const cid=findLecCourse(lid);
      day.tasks.push({id:gid(),kind:'lecture',lectureId:lid,courseId:cid,title:lec.title,subject:lec.subject||'',week:lec.week||''});
    });
  }
  save();closeModal();render();
}

function openEditTaskModal(rid,di,ti){
  const r=findStudyRound(rid);if(!r||!r.days[di]||!r.days[di].tasks[ti])return;
  const t=r.days[di].tasks[ti];
  if(t.kind!=='custom')return;
  openModal(`<div class="modal-header"><span class="modal-title">Edit Custom Task</span><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Task title</label><input class="form-control" id="sr-et-title" value="${escHtml(t.title).replace(/"/g,'&quot;')}"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEditTask('${rid}',${di},${ti})">Save</button></div>
    </div>`);
}
function saveEditTask(rid,di,ti){
  const r=findStudyRound(rid);if(!r)return;
  const t=r.days[di].tasks[ti];
  const v=(document.getElementById('sr-et-title').value||'').trim();
  if(!v)return alert('Title required');
  t.title=v;save();closeModal();render();
}

// ---- Send day to calendar ----
function openSendDayModal(rid,di){
  const r=findStudyRound(rid);if(!r||!r.days[di])return;
  const day=r.days[di];
  if(!day.tasks.length)return;
  const def=today();
  let h=`<div class="modal-header"><span class="modal-title">Send Day ${di+1} to Calendar</span><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div style="font-size:.85rem;color:var(--text-light);margin-bottom:10px">Pick which tasks to schedule. Lectures automatically become the next revision in their course history.</div>
      <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label class="form-label">Date</label><input class="form-control" type="date" id="sr-send-date" value="${def}"></div>
        <div><label class="form-label">Time (optional)</label><input class="form-control" type="time" id="sr-send-time"></div>
      </div>
      <div class="form-group"><label class="form-label" style="display:flex;justify-content:space-between;align-items:center">Tasks <span style="font-weight:400;font-size:.75rem;color:var(--text-light)"><a style="cursor:pointer" onclick="srToggleAll(true)">All</a> · <a style="cursor:pointer" onclick="srToggleAll(false)">None</a></span></label>
        <div style="border:1px solid var(--border);border-radius:8px;max-height:260px;overflow-y:auto;background:var(--card)">`;
  day.tasks.forEach((t,i)=>{
    const info=taskDisplay(t);
    let nextHint='';
    if(t.kind==='lecture'){const nextRev=(getRevs(t.lectureId).length?maxRev(t.lectureId)+1:1);nextHint=` <span style="font-size:.7rem;color:var(--text-light)">→ ${ord(nextRev)} review</span>`;}
    h+=`<label style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border-light);cursor:pointer">
      <input type="checkbox" class="sr-send-cb" data-idx="${i}" checked style="margin-top:3px">
      <span style="flex:1;min-width:0"><span style="font-size:.85rem;font-weight:600;color:var(--text)">${escHtml(info.title)}</span>${nextHint}<div style="font-size:.7rem;color:var(--text-light);margin-top:1px">${escHtml(info.extra)}</div></span>
    </label>`;
  });
  h+=`</div></div>
      <div class="form-group"><label style="display:flex;align-items:center;gap:6px;font-size:.85rem;cursor:pointer"><input type="checkbox" id="sr-send-cd"> Add to countdown</label></div>
      <div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" style="background:${STUDY_ROUND_COLOR}" onclick="sendDayToCalendar('${rid}',${di})">Schedule</button></div>
    </div>`;
  openModal(h);
}
function srToggleAll(v){document.querySelectorAll('.sr-send-cb').forEach(cb=>{cb.checked=!!v;});}
function sendDayToCalendar(rid,di){
  const r=findStudyRound(rid);if(!r||!r.days[di])return;
  const day=r.days[di];
  const date=document.getElementById('sr-send-date').value;
  const time=document.getElementById('sr-send-time').value||'';
  const cd=document.getElementById('sr-send-cd').checked;
  if(!date)return alert('Pick a date.');
  const sel=Array.from(document.querySelectorAll('.sr-send-cb:checked')).map(cb=>parseInt(cb.getAttribute('data-idx'),10));
  if(!sel.length)return alert('Select at least one task.');
  let added=0;
  sel.forEach(idx=>{
    const t=day.tasks[idx];if(!t)return;
    const eid=gid();
    if(t.kind==='lecture'){
      const lec=findLec(t.lectureId);
      const cid=t.courseId||findLecCourse(t.lectureId);
      const existing=getRevs(t.lectureId);
      const n=existing.length?maxRev(t.lectureId)+1:1;
      const baseTitle=(lec?lec.title:(t.title||'Lecture'));
      const ev={id:eid,title:baseTitle+' — '+ord(n)+' review',date:date,courseId:cid,lectureId:t.lectureId,revisionNum:n,type:'revision',showInCountdown:cd,completed:false,mastery:null,fromStudyRound:true,studyRoundId:rid,studyRoundDay:di};
      if(time)ev.time=time;
      S.events.push(ev);
      if(!S.revisions[t.lectureId])S.revisions[t.lectureId]=[];
      S.revisions[t.lectureId].push({revisionNum:n,date:date,mastery:null,eventId:eid});
    } else {
      const ev={id:eid,title:t.title,date:date,type:'task',showInCountdown:cd,completed:false,fromStudyRound:true,studyRoundId:rid,studyRoundDay:di};
      if(time)ev.time=time;
      S.events.push(ev);
    }
    added++;
  });
  save();closeModal();
  selDate=date;
  alert('Scheduled '+added+' task'+(added===1?'':'s')+' on '+fmtDate(date)+'.');
  render();
}

function renderAnalyticsPage(){
  let h='<h2 style="font-size:1.2rem;font-weight:700;color:var(--primary);margin-bottom:16px">Analytics Overview</h2>';
  let totalL=0,startedL=0,totalR=0,mG=0,mY=0,mR=0;
  S.unlockedCourses.forEach(cid=>{
    getLecs(cid).forEach(l=>{
      totalL++;const r=getRevs(l.id);if(r.length){startedL++;totalR+=r.length;const m=latestMastery(l.id);if(m==='green')mG++;else if(m==='yellow')mY++;else if(m==='red')mR++;}
    });
  });
  const comp=totalL?Math.round(mG/totalL*100):0;
  h+='<div class="stats-grid">';
  h+=statC(totalL,'Total Lectures','var(--primary)');
  h+=statC(startedL,'Started','var(--accent)');
  h+=statC(totalL-startedL,'Not Revised','var(--text-light)');
  h+=statC(totalR,'Total Revisions','#319795');
  h+=statC(mG,'Mastered','var(--success)');
  h+=statC(mY,'Moderate','var(--warning)');
  h+=statC(mR,'Weak','var(--danger)');
  h+=statC(comp+'%','Mastery Rate','var(--primary)');
  h+='</div>';
  // Per-course breakdown
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  S.unlockedCourses.forEach(cid=>{
    const m=getMeta(cid);const lecs=getLecs(cid);
    if(!lecs.length)return;
    const st=lecs.filter(l=>getRevs(l.id).length>0).length;
    const pct=Math.round(st/lecs.length*100);
    h+=`<div class="panel"><div class="panel-header"><div class="panel-title"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${m.color}"></span> ${m.name}</div>
      <span style="font-size:.82rem;color:var(--text-light)">${pct}% started</span></div><div class="panel-body">
      <div class="progress-bar" style="height:10px;margin-bottom:12px"><div class="progress-fill" style="width:${pct}%;background:${m.color}"></div></div>`;
    const subjects={};
    lecs.forEach(l=>{if(!subjects[l.subject])subjects[l.subject]={t:0,s:0};subjects[l.subject].t++;if(getRevs(l.id).length)subjects[l.subject].s++;});
    Object.keys(subjects).sort().forEach(subj=>{
      const sp=subjects[subj];const p2=Math.round(sp.s/sp.t*100);
      h+=`<div class="chart-bar-group"><div class="chart-bar-label">${subj} (${sp.s}/${sp.t})</div><div class="chart-bar"><div class="chart-bar-fill" style="width:${p2}%;background:${m.color}"></div></div></div>`;
    });
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

function statC(n,l,c){return `<div class="stat-card"><div class="stat-num" style="color:${c}">${n}</div><div class="stat-label">${l}</div></div>`}

    <span class="badge badge-blue">${m.desc||''}</span>

}

// ============ COURSE CALENDAR TAB ============
function renderCourseCalTab(){
  if(!ccM&&ccM!==0){const d=new Date();ccM=d.getMonth();ccY=d.getFullYear();}
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DN=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const fd=new Date(ccY,ccM,1).getDay();
  const dim=new Date(ccY,ccM+1,0).getDate();
  const pdim=new Date(ccY,ccM,0).getDate();
  const t=today();const cl=COURSE_COLORS[courseId]||'#718096';

  let h='<div class="panel"><div class="panel-header"><div class="panel-title">Course Calendar</div>';
  h+=`<button class="btn btn-xs btn-accent" onclick="openAddEventModal(null,'${courseId}')">${I.plus} Add Event</button></div>`;
  h+='<div class="panel-body" style="padding:10px 14px">';
  h+=`<div class="cal-header"><div class="cal-nav"><button onclick="ccM--;if(ccM<0){ccM=11;ccY--;}render()">${I.chevL}</button><span class="cal-month">${MN[ccM]} ${ccY}</span><button onclick="ccM++;if(ccM>11){ccM=0;ccY++;}render()">${I.chevR}</button></div></div>`;
  h+='<div class="cal-grid">';
  DN.forEach(d=>h+=`<div class="cal-day-name">${d}</div>`);
  const tc=Math.ceil((fd+dim)/7)*7;
  for(let i=0;i<tc;i++){
    let day,ds,ot=false;
    if(i<fd){day=pdim-fd+i+1;const m2=ccM===0?11:ccM-1,y2=ccM===0?ccY-1:ccY;ds=y2+'-'+String(m2+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');ot=true;}
    else if(i>=fd+dim){day=i-fd-dim+1;const m2=ccM===11?0:ccM+1,y2=ccM===11?ccY+1:ccY;ds=y2+'-'+String(m2+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');ot=true;}
    else{day=i-fd+1;ds=ccY+'-'+String(ccM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');}
    const evts=eventsOn(ds,courseId);
    h+=`<div class="cal-day${ot?' other-month':''}${ds===t?' today':''}" onclick="showCourseDayEvents('${ds}')">`;
    h+=`<div class="cal-day-num">${day}</div>`;
    evts.slice(0,2).forEach(e=>{h+=`<div class="cal-dot" style="background:${cl}20;color:${cl}">${e.title.length>14?e.title.slice(0,14)+'…':e.title}</div>`;});
    if(evts.length>2)h+=`<div class="cal-dots-more">+${evts.length-2}</div>`;
    h+='</div>';
  }
  h+='</div></div></div>';
  return h;
}

function showCourseDayEvents(ds){
  const evts=eventsOn(ds,courseId);if(!evts.length)return;
  const cl=COURSE_COLORS[courseId]||'#718096';
  openModal(`<div class="modal-header"><span class="modal-title">${fmtDate(ds)}</span><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">${evts.map(e=>`<div class="agenda-item"><div class="agenda-dot" style="background:${cl}"></div><div class="agenda-info"><div class="agenda-title">${e.title}${e.revisionNum?' — Rev '+e.revisionNum:''}</div></div>${e.mastery?`<span class="badge badge-${e.mastery}">${e.mastery}</span>`:''}
      <button class="btn btn-xs btn-ghost" onclick="closeModal();openEditEventModal('${e.id}')">${I.edit}</button>
      <button class="btn btn-xs btn-ghost" onclick="delEvent('${e.id}');closeModal()" style="color:var(--danger)">${I.trash}</button></div>`).join('')}</div>`);
}

// ============ COURSE LECTURES TAB ============
function renderCourseLecTab(){
  const lecs=getLecs(courseId);
  const allSubjects=getCourseSubjects(courseId);
  // Toolbar — Add Subject / Add Lecture (always available)
  let toolbar=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
    <button class="btn btn-sm btn-outline" onclick="openAddSubjectModal('${courseId}')">${I.plus} Add Subject</button>
    <button class="btn btn-sm btn-accent" onclick="openAddLectureModal('${courseId}')" ${allSubjects.length?'':'disabled title="Add a subject first"'}>${I.plus} Add Lecture</button>
    <button class="btn btn-sm btn-outline" onclick="openDivisionsModal('${courseId}')" title="Manage custom divisions (e.g., Book, Resource)">${I.plus} Division</button>
  </div>`;
  // Empty state — new course with no subjects yet
  if(!allSubjects.length){
    return toolbar+'<div class="panel"><div class="empty-state" style="padding:30px">'+I.book+'<p>No subjects yet.</p><p style="font-size:.82rem;color:var(--text-light);margin-top:6px">Start by adding your first subject, then you can add lectures under it.</p><button class="btn btn-sm btn-accent" style="margin-top:12px" onclick="openAddSubjectModal(\''+courseId+'\')">'+I.plus+' Add First Subject</button></div></div>';
  }
  const subjects=allSubjects;
  const hasWeekField=lecs.some(l=>l.week);
  const weeks=hasWeekField?[...new Set(lecs.map(l=>l.week).filter(Boolean))].sort((a,b)=>a-b):[];
  const hasExamField=lecs.some(l=>l.exam);
  const divisions=getDivisions(courseId);
  // If current group isn't available for this course, fall back to 'subject'
  if(lecGroup==='week'&&!hasWeekField)lecGroup='subject';
  if(lecGroup==='exam'&&!hasExamField)lecGroup='subject';
  if(lecGroup&&lecGroup.indexOf('div:')===0){
    const did=lecGroup.slice(4);
    if(!divisions.some(d=>d.id===did))lecGroup='subject';
  }

  let h=toolbar;
  h+='<div class="lecture-controls">';
  h+=`<input class="search-input" type="text" placeholder="Search lectures..." value="${lecSearch}" oninput="lecSearch=this.value;render()">`;
  h+=`<select class="filter-select" id="flt-lec-subj" onchange="applyLecFilter()"><option value="">All Subjects</option>${subjects.map(s=>`<option value="${s}"${lecSubj===s?' selected':''}>${s}</option>`).join('')}</select>`;
  if(hasWeekField){
    h+=`<select class="filter-select" id="flt-lec-week" onchange="applyLecFilter()"><option value="">All Weeks</option>${weeks.map(w=>`<option value="${w}"${String(lecWeek)===String(w)?' selected':''}">Week ${w}</option>`).join('')}</select>`;
  }
  h+=`<select class="filter-select" id="flt-lec-rev" onchange="applyLecFilter()"><option value="">All Status</option><option value="ns"${lecRev==='ns'?' selected':''}>Not Started</option><option value="ip"${lecRev==='ip'?' selected':''}>In Progress</option><option value="m"${lecRev==='m'?' selected':''}>Mastered</option></select>`;
  // Exam filter for Block 2.4
  if(hasExamField){
    const exams=[...new Set(lecs.map(l=>l.exam).filter(Boolean))].sort();
    h+=`<select class="filter-select" id="flt-lec-exam" onchange="applyLecExamFilter()"><option value="">All Exams</option>${exams.map(e=>`<option value="${e}"${lecExam===e?' selected':''}>${e}</option>`).join('')}</select>`;
  }
  // Per-division filters
  divisions.forEach(d=>{
    const cur=lecDivFilters[d.id]||'';
    h+=`<select class="filter-select" data-divf="${d.id}" onchange="lecDivFilters[this.getAttribute('data-divf')]=this.value;render()"><option value="">All ${escHtml(d.name)}</option>${d.categories.map(c=>`<option value="${escHtml(c)}"${cur===c?' selected':''}>${escHtml(c)}</option>`).join('')}<option value="__un__"${cur==='__un__'?' selected':''}>— Unclassified —</option></select>`;
  });
  h+='</div>';
  h+='<div class="tabs" style="flex-wrap:wrap;max-width:100%;margin-bottom:14px">';
  h+=`<div class="tab${lecGroup==='subject'?' active':''}" onclick="lecGroup='subject';render()">By Subject</div>`;
  if(hasWeekField) h+=`<div class="tab${lecGroup==='week'?' active':''}" onclick="lecGroup='week';render()">By Week</div>`;
  if(hasExamField) h+=`<div class="tab${lecGroup==='exam'?' active':''}" onclick="lecGroup='exam';render()">By Exam</div>`;
  divisions.forEach(d=>{
    const key='div:'+d.id;
    h+=`<div class="tab${lecGroup===key?' active':''}" onclick="lecGroup='${key}';render()">By ${escHtml(d.name)}</div>`;
  });
  h+='</div>';
  h+='<div class="mastery-legend"><span><span class="ml-dot" style="background:var(--success)"></span> Strong</span><span><span class="ml-dot" style="background:var(--warning)"></span> Moderate</span><span><span class="ml-dot" style="background:var(--danger)"></span> Weak</span></div>';

  let filtered=[...lecs];
  if(lecSearch){const q=lecSearch.toLowerCase();filtered=filtered.filter(l=>l.title.toLowerCase().includes(q)||l.subject.toLowerCase().includes(q));}
  if(lecSubj!=='')filtered=filtered.filter(l=>l.subject===lecSubj);
  if(lecWeek!=='')filtered=filtered.filter(l=>String(l.week)===String(lecWeek));
  if(lecExam!=='')filtered=filtered.filter(l=>l.exam===lecExam);
  if(lecRev!==''){filtered=filtered.filter(l=>{const r=getRevs(l.id);if(lecRev==='ns')return!r.length;if(lecRev==='ip')return r.length>0&&latestMastery(l.id)!=='green';if(lecRev==='m')return latestMastery(l.id)==='green';return true;});}
  // Apply per-division filters
  Object.keys(lecDivFilters).forEach(did=>{
    const v=lecDivFilters[did];if(!v)return;
    if(v==='__un__')filtered=filtered.filter(l=>!getLecDivision(l,did));
    else filtered=filtered.filter(l=>getLecDivision(l,did)===v);
  });

  const groups={};
  const divMode=lecGroup&&lecGroup.indexOf('div:')===0;
  const groupDivId=divMode?lecGroup.slice(4):null;
  if(lecGroup==='subject'){
    // Seed groups with every subject (even empty) so new/empty subjects show up with their own Add button
    subjects.forEach(s=>{groups[s]=[];});
    filtered.forEach(l=>{if(!groups[l.subject])groups[l.subject]=[];groups[l.subject].push(l);});
  }
  else if(lecGroup==='exam')filtered.forEach(l=>{const k=l.exam?l.exam+' Exam':'Unclassified';if(!groups[k])groups[k]=[];groups[k].push(l);});
  else if(divMode){
    const d=divisions.find(x=>x.id===groupDivId);
    if(d)d.categories.forEach(c=>{groups[c]=[];});
    filtered.forEach(l=>{const k=getLecDivision(l,groupDivId)||'Unclassified';if(!groups[k])groups[k]=[];groups[k].push(l);});
  }
  else filtered.forEach(l=>{const k='Week '+l.week;if(!groups[k])groups[k]=[];groups[k].push(l);});

  if(!Object.keys(groups).length){h+='<div class="empty-state">'+I.search+'<p>No matches</p></div>';return h;}

  Object.keys(groups).sort().forEach(g=>{
    const isSubj=lecGroup==='subject';
    h+=`<div class="lecture-group"><div class="lecture-group-title" style="display:flex;align-items:center;justify-content:space-between;gap:8px"><span>${g} (${groups[g].length})</span>`;
    if(isSubj){
      h+=`<span style="display:flex;gap:4px">
        <button class="btn btn-xs btn-ghost" title="Add lecture" onclick="openAddLectureModal('${courseId}','${g.replace(/'/g,"\\'")}')">${I.plus}</button>
        <button class="btn btn-xs btn-ghost" title="Rename subject" onclick="openRenameSubjectModal('${courseId}','${g.replace(/'/g,"\\'")}')">${I.edit||'Edit'}</button>
        <button class="btn btn-xs btn-ghost" title="Delete subject" onclick="delSubject('${courseId}','${g.replace(/'/g,"\\'")}')" style="color:var(--danger)">${I.trash||'Del'}</button>
      </span>`;
    }
    h+=`</div>`;
    if(isSubj&&!groups[g].length){
      h+=`<div style="font-size:.82rem;color:var(--text-light);padding:10px 4px">No lectures in this subject yet.</div>`;
    }
    groups[g].forEach(lec=>{
      const revs=getRevs(lec.id);const mast=latestMastery(lec.id);
      let mc='';if(mast==='green')mc='mastery-green';else if(mast==='yellow')mc='mastery-yellow';else if(mast==='red')mc='mastery-red';else if(revs.length)mc='mastery-started';
      const weekSpan=lec.week?`<span>Week ${lec.week}</span>`:'';
      let extra;
      if(lecGroup==='subject')extra=weekSpan;
      else if(lecGroup==='exam')extra=`<span>${lec.subject}</span>${weekSpan}`;
      else if(divMode)extra=`<span>${lec.subject}</span>${weekSpan}`;
      else extra=`<span>${lec.subject}</span>`;
      // Append tags for each custom division assignment
      divisions.forEach(d=>{const v=getLecDivision(lec,d.id);if(v&&(!divMode||groupDivId!==d.id))extra+=`<span style="background:var(--primary-lighter);color:var(--primary);padding:1px 6px;border-radius:10px;font-size:.7rem">${escHtml(d.name)}: ${escHtml(v)}</span>`;});
      h+=`<div class="lecture-item ${mc}"><div class="lec-info" style="cursor:pointer" onclick="openEditLectureModal('${lec.id}')"><div class="lec-title">${lec.title}</div><div class="lec-meta">${extra}<span>${fmtShort(lec.date)}</span>${revs.length?`<span style="color:var(--accent);font-weight:600">${revs.length} rev</span>`:''}</div></div>
        <div class="lec-actions"><button class="btn btn-xs btn-accent" onclick="openSchedRevModal('${lec.id}')">${I.cal} Schedule</button><button class="btn btn-xs btn-outline" onclick="togRevHist('${lec.id}')">${I.history} History</button><button class="btn btn-xs btn-ghost" onclick="openEditLectureModal('${lec.id}')" title="Edit">${I.edit||'Edit'}</button></div>
      </div>`;
      h+=`<div class="rev-history" id="rh-${lec.id}" style="display:none">`;
      if(!revs.length)h+='<div style="font-size:.82rem;color:var(--text-light);text-align:center;padding:8px">No revisions yet</div>';
      else revs.sort((a,b)=>a.revisionNum-b.revisionNum).forEach(r=>{
        const mc2=r.mastery==='green'?'#48bb78':r.mastery==='yellow'?'#ecc94b':r.mastery==='red'?'#f56565':'#cbd5e0';
        h+=`<div class="rev-row"><div class="rev-dot" style="background:${mc2}"></div><div style="flex:1"><strong>Revision ${r.revisionNum}</strong></div><div style="font-size:.8rem;color:var(--text-light)">${fmtDate(r.date)}</div><span class="badge badge-${r.mastery||'gray'}">${r.mastery||'pending'}</span>${!r.mastery?`<button class="btn btn-xs btn-outline" onclick="openMarkMastery('${lec.id}',${r.revisionNum})">Mark</button>`:''}<button class="btn btn-xs btn-ghost" onclick="delRevision('${lec.id}',${r.revisionNum})" style="color:var(--danger);margin-left:4px" title="Remove revision">${I.trash}</button></div>`;
      });
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}

// ============ COURSE STATS TAB ============
function renderCourseStatsTab(){
  const lecs=getLecs(courseId);
  if(!lecs.length)return '<div class="panel"><div class="empty-state" style="padding:30px">'+I.bar+'<p>No data yet.</p></div></div>';
  let tL=lecs.length,sL=0,tR=0,mG=0,mY=0,mR=0;
  const subjP={},wkP={};const t=today();let upcoming=[],overdue=[];
  lecs.forEach(l=>{
    const r=getRevs(l.id);if(r.length){sL++;tR+=r.length;const m=latestMastery(l.id);if(m==='green')mG++;else if(m==='yellow')mY++;else if(m==='red')mR++;}
    if(!subjP[l.subject])subjP[l.subject]={t:0,s:0,g:0};subjP[l.subject].t++;if(r.length){subjP[l.subject].s++;if(latestMastery(l.id)==='green')subjP[l.subject].g++;}
    if(l.week){const wk='Week '+l.week;if(!wkP[wk])wkP[wk]={t:0,s:0,g:0};wkP[wk].t++;if(r.length){wkP[wk].s++;if(latestMastery(l.id)==='green')wkP[wk].g++;}}
  });
  S.events.filter(e=>e.courseId===courseId&&e.type==='revision'&&e.date>=t&&!S.todoCompleted[e.id]).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5).forEach(e=>upcoming.push(e));
  S.events.filter(e=>e.courseId===courseId&&e.type==='revision'&&e.date<t&&!S.todoCompleted[e.id]).sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>overdue.push(e));
  const comp=tL?Math.round(mG/tL*100):0;const sp=tL?Math.round(sL/tL*100):0;

  let h='<div class="stats-grid">';
  h+=statC(tL,'Total','var(--primary)');h+=statC(sL,'Started','var(--accent)');h+=statC(tL-sL,'Not Revised','var(--text-light)');h+=statC(tR,'Revisions','#319795');
  h+=statC(mG,'Mastered','var(--success)');h+=statC(mY,'Moderate','var(--warning)');h+=statC(mR,'Weak','var(--danger)');h+=statC(comp+'%','Mastery','var(--primary)');
  h+='</div>';
  h+=`<div class="panel" style="margin-bottom:14px"><div class="panel-body"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:.88rem;font-weight:600">Overall Progress</span><span style="font-size:.82rem;color:var(--text-light)">${sp}%</span></div><div class="progress-bar" style="height:12px"><div class="progress-fill" style="width:${sp}%;background:linear-gradient(90deg,var(--accent),var(--primary))"></div></div></div></div>`;
  const mT=mG+mY+mR;
  if(mT){
    h+=`<div class="panel" style="margin-bottom:14px"><div class="panel-body"><div style="font-size:.88rem;font-weight:600;margin-bottom:8px">Mastery Distribution</div><div style="display:flex;height:20px;border-radius:6px;overflow:hidden">`;
    if(mG)h+=`<div style="width:${mG/mT*100}%;background:var(--success);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.72rem;font-weight:700">${mG}</div>`;
    if(mY)h+=`<div style="width:${mY/mT*100}%;background:var(--warning);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.72rem;font-weight:700">${mY}</div>`;
    if(mR)h+=`<div style="width:${mR/mT*100}%;background:var(--danger);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.72rem;font-weight:700">${mR}</div>`;
    h+='</div></div></div>';
  }
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
  h+='<div class="panel"><div class="panel-header"><div class="panel-title">By Subject</div></div><div class="panel-body">';
  Object.keys(subjP).sort().forEach(s=>{const p=subjP[s];const pc=Math.round(p.s/p.t*100);h+=`<div class="chart-bar-group"><div class="chart-bar-label">${s} (${p.s}/${p.t})</div><div class="chart-bar"><div class="chart-bar-fill" style="width:${pc}%;background:var(--primary-light)"></div></div></div>`;});
  h+='</div></div>';
  h+='<div class="panel"><div class="panel-header"><div class="panel-title">By Week</div></div><div class="panel-body">';
  Object.keys(wkP).sort().forEach(w=>{const p=wkP[w];const pc=Math.round(p.s/p.t*100);h+=`<div class="chart-bar-group"><div class="chart-bar-label">${w} (${p.s}/${p.t})</div><div class="chart-bar"><div class="chart-bar-fill" style="width:${pc}%;background:var(--accent)"></div></div></div>`;});
  h+='</div></div></div>';
  if(overdue.length){
    h+=`<div class="panel" style="margin-top:14px;border-left:3px solid var(--danger)"><div class="panel-header"><div class="panel-title" style="color:var(--danger)">Overdue (${overdue.length})</div></div><div class="panel-body-compact">`;
    overdue.slice(0,6).forEach(e=>{h+=`<div class="agenda-item"><div class="agenda-dot" style="background:var(--danger)"></div><div class="agenda-info"><div class="agenda-title">${e.title}</div><div class="agenda-meta">${fmtShort(e.date)}</div></div></div>`;});
    h+='</div></div>';
  }
  if(upcoming.length){
    h+=`<div class="panel" style="margin-top:14px"><div class="panel-header"><div class="panel-title">Upcoming</div></div><div class="panel-body-compact">`;
    upcoming.forEach(e=>{h+=`<div class="agenda-item"><div class="agenda-dot" style="background:var(--accent)"></div><div class="agenda-info"><div class="agenda-title">${e.title}</div><div class="agenda-meta">${fmtShort(e.date)} · ${daysUntil(e.date)} days</div></div></div>`;});
    h+='</div></div>';
  }
  return h;
}

// ============ COURSE SCHEDULE (per-course timetable) ============
const CS_DAY_NAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const CS_DAY_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let _csCurrentWeek={};   // courseId -> weekId for UI state
let _csFilters={};       // courseId -> {gender:[], group:[], custom:{ccId:[]}}
let _csOpenDropdown=null;// id of currently open multi-select dropdown

// Filter accessor with lazy init
function getCSFilters(cid){
  if(!_csFilters[cid])_csFilters[cid]={gender:[],group:[],custom:{}};
  return _csFilters[cid];
}
function csFilterMatch(s,e){
  const f=getCSFilters(courseId);
  const c=s.classifications||{};
  // Gender OR logic
  if(c.gender&&f.gender&&f.gender.length){
    if(!f.gender.includes((e.classValues&&e.classValues.gender)||''))return false;
  }
  if(c.groups&&c.groups.length&&f.group&&f.group.length){
    if(!f.group.includes((e.classValues&&e.classValues.group)||''))return false;
  }
  const customs=c.custom||[];
  for(let i=0;i<customs.length;i++){
    const cc=customs[i];
    const sel=(f.custom||{})[cc.id]||[];
    if(sel.length){
      if(!sel.includes((e.classValues&&e.classValues[cc.id])||''))return false;
    }
  }
  return true;
}
function csActiveChips(s){
  const f=getCSFilters(courseId);const chips=[];
  const c=s.classifications||{};
  if(c.gender)(f.gender||[]).forEach(v=>chips.push({cat:'Gender',val:v||'—',k:'gender',raw:v}));
  if(c.groups&&c.groups.length)(f.group||[]).forEach(v=>chips.push({cat:'Group',val:v||'—',k:'group',raw:v}));
  (c.custom||[]).forEach(cc=>{
    const vs=(f.custom&&f.custom[cc.id])||[];
    vs.forEach(v=>chips.push({cat:cc.name,val:v||'—',k:'custom:'+cc.id,raw:v}));
  });
  return chips;
}
function csRemoveChip(cid,k,raw){
  const f=getCSFilters(cid);
  if(k==='gender')f.gender=(f.gender||[]).filter(x=>x!==raw);
  else if(k==='group')f.group=(f.group||[]).filter(x=>x!==raw);
  else if(k.startsWith('custom:')){const ccId=k.slice(7);if(f.custom&&f.custom[ccId])f.custom[ccId]=f.custom[ccId].filter(x=>x!==raw);}
  render();
}
function csClearFilters(cid){_csFilters[cid]={gender:[],group:[],custom:{}};render();}
function csToggleFilter(cid,k,raw){
  const f=getCSFilters(cid);
  let arr;
  if(k==='gender')arr=f.gender=f.gender||[];
  else if(k==='group')arr=f.group=f.group||[];
  else if(k.startsWith('custom:')){const ccId=k.slice(7);if(!f.custom)f.custom={};arr=f.custom[ccId]=f.custom[ccId]||[];}
  else return;
  const i=arr.indexOf(raw);
  if(i>=0)arr.splice(i,1);else arr.push(raw);
  render();
}
function csToggleDropdown(id){
  if(_csOpenDropdown===id){_csOpenDropdown=null;} else {_csOpenDropdown=id;}
  render();
}
function csSetOrientation(cid,o){
  const s=getCourseSchedule(cid);if(!s)return;
  s.orientation=o;save();render();
}
function csMsSearch(id,val){
  const panel=document.querySelector(`[data-msid="${id}"] .cs-ms-list`);if(!panel)return;
  const q=(val||'').trim().toLowerCase();
  panel.querySelectorAll('.cs-ms-opt').forEach(el=>{
    const lbl=(el.getAttribute('data-lbl')||'').toLowerCase();
    el.style.display=(!q||lbl.includes(q))?'':'none';
  });
}

// Build modern multi-select dropdown HTML
function csMultiSelect(id,label,options,selected,onToggleFn,opts){
  opts=opts||{};
  const isOpen=_csOpenDropdown===id;
  const selCount=(selected||[]).length;
  let btnLabel=label;
  if(selCount===1){const opt=options.find(o=>o.value===selected[0]);btnLabel=opt?opt.label:selected[0];}
  else if(selCount>1)btnLabel=label;
  let h=`<div class="cs-ms ${isOpen?'open':''}" data-msid="${id}"><button type="button" class="cs-ms-btn ${selCount?'active':''}" onclick="csToggleDropdown('${id}')">
    <span class="cs-ms-lbl">${escHtml(btnLabel)}</span>
    ${selCount>1?`<span class="cs-ms-count">${selCount}</span>`:''}
    <span class="cs-ms-caret">▼</span>
  </button><div class="cs-ms-panel" onclick="event.stopPropagation()">`;
  if(options.length>6){
    h+=`<input class="cs-ms-search" placeholder="Search..." oninput="csMsSearch('${id}',this.value)" autocomplete="off">`;
  }
  h+='<div class="cs-ms-list">';
  if(!options.length){h+='<div class="cs-ms-empty">No options</div>';}
  options.forEach(o=>{
    const checked=(selected||[]).includes(o.value);
    h+=`<label class="cs-ms-opt" data-lbl="${escHtml(o.label).replace(/"/g,'&quot;')}">
      <input type="checkbox" ${checked?'checked':''} onchange="${onToggleFn}('${escJs(o.value)}')">
      <span>${escHtml(o.label)}</span>
    </label>`;
  });
  h+='</div>';
  if(selCount){h+=`<div class="cs-ms-footer"><span></span><button class="cs-ms-clear" onclick="${onToggleFn}('__clear__')">Clear</button></div>`;}
  h+='</div></div>';
  return h;
}
function escJs(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function getCourseSchedule(cid){return (S.courseSchedules||{})[cid]||null;}
function hasCourseSchedule(cid){const s=getCourseSchedule(cid);return !!(s&&s.timeSlots&&s.timeSlots.length);}
function activeCourseSlots(cid,weekId){
  const s=getCourseSchedule(cid);if(!s)return [];
  if(s.type==='multi'&&weekId){const w=(s.weeks||[]).find(x=>x.id===weekId);if(w&&w.slotsOverride&&w.slotsOverride.length)return w.slotsOverride;}
  return s.timeSlots||[];
}
function t2m(t){if(!t||!/^\d{1,2}:\d{2}$/.test(t))return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}
function fmtSlot(s){return s.start+' – '+s.end;}

function renderCourseScheduleTab(){
  const cid=courseId;
  if(!hasCourseSchedule(cid)){
    return `<div class="panel"><div class="empty-state" style="padding:40px;text-align:center">
      <div style="font-size:2rem;margin-bottom:8px">🗓️</div>
      <p style="margin-bottom:14px;color:var(--text-sec)">This course doesn't have a schedule yet.</p>
      <button class="btn btn-sm btn-accent" onclick="openCourseScheduleSetup('${cid}')">${I.plus} Add University Schedule</button>
    </div></div>`;
  }
  const s=getCourseSchedule(cid);
  const orientation=s.orientation||'days-cols';
  let weekId=null;
  if(s.type==='multi'){
    weekId=_csCurrentWeek[cid];
    if(!weekId&&s.weeks&&s.weeks.length)weekId=_csCurrentWeek[cid]=s.weeks[0].id;
  }
  const slots=activeCourseSlots(cid,weekId);
  const c=s.classifications||{};

  // Top toolbar (week selector + orientation toggle + actions)
  let h='<div class="cs-toolbar">';
  if(s.type==='multi'&&s.weeks&&s.weeks.length){
    const weekOpts=s.weeks.map(w=>({value:w.id,label:(w.label||('Week '+fmtShort(w.startDate||'')))+(w.startDate?` · ${fmtShort(w.startDate)}`:'')}));
    h+=`<div class="cs-ms ${_csOpenDropdown==='cs-week'?'open':''}" data-msid="cs-week"><button type="button" class="cs-ms-btn active" onclick="csToggleDropdown('cs-week')">
      <span style="font-size:.7rem;color:var(--text-light);margin-right:4px">WEEK</span>
      <span class="cs-ms-lbl">${escHtml((weekOpts.find(o=>o.value===weekId)||{label:'—'}).label)}</span>
      <span class="cs-ms-caret">▼</span>
    </button><div class="cs-ms-panel" onclick="event.stopPropagation()"><div class="cs-ms-list">${weekOpts.map(o=>`<label class="cs-ms-opt cs-ms-radio" data-lbl="${escHtml(o.label).replace(/"/g,'&quot;')}">
      <input type="radio" name="cs-week-r" ${o.value===weekId?'checked':''} onchange="csSetWeek('${cid}','${escJs(o.value)}')">
      <span>${escHtml(o.label)}</span>
    </label>`).join('')}</div></div></div>`;
  }
  // Orientation toggle
  h+=`<div class="cs-orient-toggle" title="Switch orientation">
    <button class="${orientation==='days-cols'?'active':''}" onclick="csSetOrientation('${cid}','days-cols')" title="Days as columns">▦ Days ↕</button>
    <button class="${orientation==='time-cols'?'active':''}" onclick="csSetOrientation('${cid}','time-cols')" title="Time as columns">▤ Time ↕</button>
  </div>`;
  h+='<div style="flex:1"></div>';
  h+=`<button class="btn btn-xs btn-accent" onclick="openCSEntryModal('${cid}',null)">${I.plus} Add Entry</button>`;
  h+=`<button class="btn btn-xs btn-outline" onclick="openCourseScheduleSetup('${cid}')">${I.edit||'Edit'} Settings</button>`;
  h+=`<button class="btn btn-xs btn-ghost" onclick="resetCourseSchedule('${cid}')" style="color:var(--danger)">${I.trash||'Del'} Reset</button>`;
  h+='</div>';

  // Filter bar (only if any classification is configured)
  const hasAnyClass=!!(c.gender||(c.groups&&c.groups.length)||(c.custom&&c.custom.length));
  if(hasAnyClass){
    const f=getCSFilters(cid);
    h+='<div class="cs-filterbar">';
    h+='<span class="cs-filterbar-label">Filter</span>';
    if(c.gender){
      const opts=[{value:'Male',label:'Male'},{value:'Female',label:'Female'}];
      h+=csMultiSelect('cs-f-gender','Gender',opts,f.gender||[],'csOnFilterGender');
    }
    if(c.groups&&c.groups.length){
      const opts=c.groups.map(g=>({value:g,label:'Group '+g}));
      h+=csMultiSelect('cs-f-group','Groups',opts,f.group||[],'csOnFilterGroup');
    }
    (c.custom||[]).forEach(cc=>{
      const opts=(cc.options||[]).map(o=>({value:o,label:o}));
      h+=csMultiSelect('cs-f-c-'+cc.id,cc.name,opts,((f.custom||{})[cc.id])||[],`(v)=>csOnFilterCustom('${cc.id}',v)`);
    });
    // Chips row
    const chips=csActiveChips(s);
    if(chips.length){
      h+='<div style="flex-basis:100%;height:1px;background:var(--border-light);margin:4px 0"></div>';
      h+='<span class="cs-filterbar-label">Active</span>';
      chips.forEach(ch=>{
        h+=`<span class="cs-chip"><span class="cs-chip-cat">${escHtml(ch.cat)}:</span>${escHtml(ch.val)}<button class="cs-chip-x" onclick="csRemoveChip('${cid}','${ch.k}','${escJs(ch.raw)}')" title="Remove">×</button></span>`;
      });
      h+=`<button class="cs-chip-clear" onclick="csClearFilters('${cid}')">Clear all</button>`;
    }
    h+='</div>';
  }

  if(!slots.length){
    h+='<div class="panel"><div class="empty-state" style="padding:30px">No time slots defined. Edit settings to add some.</div></div>';
    return h;
  }

  const days=s.days||[0,1,2,3,4];
  const entries=(s.entries||[])
    .filter(e=>s.type!=='multi'||e.weekId===weekId)
    .filter(e=>csFilterMatch(s,e));

  // Helper: cell renderer
  const renderCell=(dIdx,sIdx,isLastCol,isLastRow)=>{
    const slot=slots[sIdx];
    const cellEntries=entries.filter(e=>e.day===dIdx&&e.startSlot===sIdx);
    let ch=`<div style="padding:4px;min-height:64px;display:flex;flex-direction:column;gap:4px;${isLastCol?'':'border-right:1px solid var(--border);'}${isLastRow?'':'border-bottom:1px solid var(--border);'}position:relative" ondblclick="openCSEntryModal('${cid}',null,${dIdx},${sIdx})">`;
    cellEntries.forEach(e=>{
      const span=Math.max(1,(e.endSlot??sIdx)-sIdx+1);
      const cls=csClassSummary(s,e);
      ch+=`<div onclick="openCSEntryModal('${cid}','${e.id}')" title="${escHtml(e.title)}" style="cursor:pointer;border-radius:6px;padding:6px 8px;background:${csEntryColor(e)}20;border-left:3px solid ${csEntryColor(e)};font-size:.78rem;line-height:1.25;${span>1?`align-self:stretch`:''}">
        <div style="font-weight:700;color:${csEntryColor(e)};word-break:break-word">${escHtml(e.title||'Untitled')}</div>
        <div style="font-size:.68rem;color:var(--text-sec)">${csEntryTime(slot,e,slots)}${e.sessionType?' · '+escHtml(e.sessionType):''}</div>
        ${cls?`<div style="font-size:.66rem;color:var(--text-light);margin-top:1px">${escHtml(cls)}</div>`:''}
        ${e.notes?`<div style="font-size:.66rem;color:var(--text-light);margin-top:1px;font-style:italic">${escHtml(e.notes).slice(0,60)}</div>`:''}
      </div>`;
    });
    ch+='</div>';
    return ch;
  };

  h+='<div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--card)">';
  if(orientation==='days-cols'){
    // Days=cols, Time=rows
    h+=`<div class="cs-grid" style="display:grid;grid-template-columns:90px repeat(${days.length},minmax(150px,1fr));min-width:${90+days.length*150}px">`;
    h+='<div class="cs-corner" style="padding:10px 8px;background:var(--border-light);font-size:.72rem;font-weight:700;color:var(--text-light);text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)">Time</div>';
    days.forEach((dIdx,i)=>{
      const isLast=(i===days.length-1);
      h+=`<div style="padding:10px 8px;background:var(--border-light);font-size:.78rem;font-weight:700;color:var(--primary);text-align:center;${isLast?'':'border-right:1px solid var(--border);'}border-bottom:1px solid var(--border)">${CS_DAY_NAMES[dIdx]}</div>`;
    });
    slots.forEach((slot,sIdx)=>{
      const isLastRow=(sIdx===slots.length-1);
      h+=`<div style="padding:8px;font-size:.72rem;color:var(--text-sec);text-align:center;border-right:1px solid var(--border);${isLastRow?'':'border-bottom:1px solid var(--border);'}background:var(--border-light);display:flex;flex-direction:column;justify-content:center;min-height:64px"><div style="font-weight:700">${slot.start}</div><div style="color:var(--text-lighter);font-size:.68rem">${slot.end}</div></div>`;
      days.forEach((dIdx,di)=>{
        h+=renderCell(dIdx,sIdx,di===days.length-1,isLastRow);
      });
    });
    h+='</div>';
  } else {
    // Time=cols, Days=rows
    h+=`<div class="cs-grid" style="display:grid;grid-template-columns:110px repeat(${slots.length},minmax(140px,1fr));min-width:${110+slots.length*140}px">`;
    h+='<div class="cs-corner" style="padding:10px 8px;background:var(--border-light);font-size:.72rem;font-weight:700;color:var(--text-light);text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)">Day</div>';
    slots.forEach((slot,sIdx)=>{
      const isLast=(sIdx===slots.length-1);
      h+=`<div style="padding:10px 8px;background:var(--border-light);font-size:.72rem;font-weight:700;color:var(--primary);text-align:center;${isLast?'':'border-right:1px solid var(--border);'}border-bottom:1px solid var(--border)"><div>${slot.start}</div><div style="color:var(--text-light);font-size:.66rem;font-weight:500">${slot.end}</div></div>`;
    });
    days.forEach((dIdx,di)=>{
      const isLastRow=(di===days.length-1);
      h+=`<div style="padding:10px 8px;background:var(--border-light);font-size:.82rem;font-weight:700;color:var(--primary);text-align:center;border-right:1px solid var(--border);${isLastRow?'':'border-bottom:1px solid var(--border);'}display:flex;align-items:center;justify-content:center;min-height:64px">${CS_DAY_NAMES[dIdx]}</div>`;
      slots.forEach((slot,sIdx)=>{
        h+=renderCell(dIdx,sIdx,sIdx===slots.length-1,isLastRow);
      });
    });
    h+='</div>';
  }
  h+='</div>';
  h+='<div style="margin-top:10px;font-size:.75rem;color:var(--text-light)">Double-click any cell to add an entry at that time.</div>';
  return h;
}

// Filter toggle handlers (called from generated HTML)
function csOnFilterGender(v){
  if(v==='__clear__'){const f=getCSFilters(courseId);f.gender=[];render();return;}
  csToggleFilter(courseId,'gender',v);
}
function csOnFilterGroup(v){
  if(v==='__clear__'){const f=getCSFilters(courseId);f.group=[];render();return;}
  csToggleFilter(courseId,'group',v);
}
function csOnFilterCustom(ccId,v){
  if(v==='__clear__'){const f=getCSFilters(courseId);if(f.custom)f.custom[ccId]=[];render();return;}
  csToggleFilter(courseId,'custom:'+ccId,v);
}

function csSetWeek(cid,wid){_csCurrentWeek[cid]=wid;render();}

function csEntryColor(e){
  // Consistent palette based on session type
  const map={'Lecture':'#2b6cb0','Lab':'#38a169','Tutorial':'#805ad5','Seminar':'#d69e2e','Clinical':'#dd6b20','Exam':'#e53e3e','Holiday':'#718096'};
  if(e.sessionType&&map[e.sessionType])return map[e.sessionType];
  return '#2b6cb0';
}
function csEntryTime(slot,e,slots){
  if(e.customStart||e.customEnd)return (e.customStart||slot.start)+' – '+(e.customEnd||slot.end);
  const endSlot=slots[e.endSlot??e.startSlot];
  return slot.start+' – '+(endSlot?endSlot.end:slot.end);
}
function csClassSummary(s,e){
  if(!e.classValues)return '';
  const parts=[];
  const c=s.classifications||{};
  if(c.gender&&e.classValues.gender)parts.push(e.classValues.gender);
  if(c.groups&&c.groups.length&&e.classValues.group)parts.push('Grp '+e.classValues.group);
  (c.custom||[]).forEach(cc=>{
    const v=e.classValues[cc.id];if(v)parts.push(cc.name+': '+v);
  });
  return parts.join(' • ');
}

function saveCourseScheduleSetup(cid){
  const type=document.querySelector('input[name="cs-type"]:checked').value;
  const days=Array.from(document.querySelectorAll('.cs-day-cb:checked')).map(cb=>parseInt(cb.value,10)).sort((a,b)=>a-b);
  if(!days.length)return alert('Select at least one day.');
  const gender=document.getElementById('cs-gender').checked;
  const groupsOn=document.getElementById('cs-groups-on').checked;
  let groups=null;
  if(groupsOn){
    groups=(document.getElementById('cs-groups').value||'').split(',').map(x=>x.trim()).filter(Boolean);
    if(!groups.length)return alert('List at least one group (e.g. A, B, C).');
  }
  const custom=[];
  document.querySelectorAll('.cs-custom-row').forEach(r=>{
    const n=r.querySelector('.cs-cc-name').value.trim();
    const opts=r.querySelector('.cs-cc-opts').value.split(',').map(x=>x.trim()).filter(Boolean);
    if(n&&opts.length)custom.push({id:gid(),name:n,options:opts});
  });
  const timeSlots=[];
  document.querySelectorAll('.cs-slot-row').forEach(r=>{
    const a=r.querySelector('.cs-slot-start').value,b=r.querySelector('.cs-slot-end').value;
    if(a&&b&&t2m(b)>t2m(a))timeSlots.push({start:a,end:b});
  });
  if(!timeSlots.length)return alert('Add at least one time slot.');
  timeSlots.sort((x,y)=>t2m(x.start)-t2m(y.start));
  const weeks=[];
  if(type==='multi'){
    document.querySelectorAll('.cs-week-row').forEach(r=>{
      const wid=r.getAttribute('data-wid')||gid();
      const label=r.querySelector('.cs-wk-label').value.trim();
      const s=r.querySelector('.cs-wk-start').value;
      const e=r.querySelector('.cs-wk-end').value;
      const ov=r.querySelector('.cs-wk-override').checked;
      let slotsOverride=null;
      if(ov){
        slotsOverride=[];
        r.querySelectorAll('.cs-wk-slot').forEach(sr=>{
          const a=sr.querySelector('[data-k="start"]').value,b=sr.querySelector('[data-k="end"]').value;
          if(a&&b&&t2m(b)>t2m(a))slotsOverride.push({start:a,end:b});
        });
        if(!slotsOverride.length)slotsOverride=null;
        else slotsOverride.sort((x,y)=>t2m(x.start)-t2m(y.start));
      }
      const w={id:wid,label,startDate:s||'',endDate:e||''};
      if(slotsOverride)w.slotsOverride=slotsOverride;
      weeks.push(w);
    });
    if(!weeks.length)return alert('Add at least one week (or switch to Static).');
  }
  const existing=getCourseSchedule(cid);
  if(!S.courseSchedules)S.courseSchedules={};
  const entries=existing?existing.entries:[];
  // Re-clamp entries' startSlot/endSlot to new slot counts
  const n=timeSlots.length;
  entries.forEach(e=>{
    if(typeof e.startSlot!=='number')e.startSlot=0;
    if(e.startSlot>=n)e.startSlot=n-1;
    if(typeof e.endSlot!=='number')e.endSlot=e.startSlot;
    if(e.endSlot>=n)e.endSlot=n-1;
    if(e.endSlot<e.startSlot)e.endSlot=e.startSlot;
    // If multi, ensure weekId still valid
    if(type==='multi'){if(!weeks.find(w=>w.id===e.weekId))e.weekId=weeks[0]?weeks[0].id:null;}
    else{delete e.weekId;}
    // Remove day entries whose day isn't selected
    if(!days.includes(e.day))e.day=days[0];
  });
  const orientEl=document.querySelector('input[name="cs-orient"]:checked');
  const orientation=orientEl?orientEl.value:'days-cols';
  S.courseSchedules[cid]={
    type,days,
    timeSlots,
    classifications:{gender,groups,custom},
    weeks,
    entries,
    orientation
  };
  if(type==='multi'&&weeks.length)_csCurrentWeek[cid]=weeks[0].id;
  save();closeModal();render();
}

function resetCourseSchedule(cid){
  const s=getCourseSchedule(cid);if(!s)return;
  if(!confirm('Delete this course\'s schedule (config and all entries)? This cannot be undone.'))return;
  delete S.courseSchedules[cid];delete _csCurrentWeek[cid];
  save();render();
}

function csSyncEndOptions(){
  const start=parseInt(document.getElementById('cse-start').value,10);
  const endSel=document.getElementById('cse-end');
  if(parseInt(endSel.value,10)<start)endSel.value=String(start);
}
function saveCSEntry(cid,eid,isNew){
  const s=getCourseSchedule(cid);if(!s)return;
  const title=(document.getElementById('cse-title').value||'').trim();
  if(!title)return alert('Title is required.');
  const sessionType=document.getElementById('cse-type').value;
  const day=parseInt(document.getElementById('cse-day').value,10);
  const startSlot=parseInt(document.getElementById('cse-start').value,10);
  const endSlot=parseInt(document.getElementById('cse-end').value,10);
  if(isNaN(startSlot)||isNaN(endSlot))return alert('Pick a valid time slot.');
  const classValues={};
  document.querySelectorAll('.cse-class').forEach(sel=>{const v=sel.value;if(v)classValues[sel.getAttribute('data-k')]=v;});
  const notes=(document.getElementById('cse-notes').value||'').trim();
  const date=document.getElementById('cse-date').value||'';
  const useCustom=document.getElementById('cse-custom-on').checked;
  const customStart=useCustom?document.getElementById('cse-cstart').value:'';
  const customEnd=useCustom?document.getElementById('cse-cend').value:'';
  let weekId=null;
  if(s.type==='multi'){const el=document.getElementById('cse-week');weekId=el?el.value:null;}
  const base={id:eid,title,sessionType,day,startSlot,endSlot,notes,classValues,date};
  if(customStart)base.customStart=customStart;
  if(customEnd)base.customEnd=customEnd;
  if(weekId)base.weekId=weekId;
  if(isNew){s.entries.push(base);} else {
    const i=s.entries.findIndex(x=>x.id===eid);
    if(i>=0)s.entries[i]=base;
  }
  save();closeModal();render();
}
function delCSEntry(cid,eid){
  const s=getCourseSchedule(cid);if(!s)return;
  if(!confirm('Delete this entry?'))return;
  s.entries=s.entries.filter(e=>e.id!==eid);
  save();closeModal();render();
}

              <span class="kh-label">${escHtml(n.title||'Untitled')}</span>
              <button class="kh-item-menu" onclick="event.stopPropagation();khNoteMenu('${n.id}',event)" title="More">⋯</button>
            </div>`;
          });
          h+=`<div class="kh-sub-add" onclick="khAddNote('${f.id}','${sub.id}')">+ New note</div>`;
          h+='</div>';
        }
        h+='</div>';
      });
      h+=`<div class="kh-sub-add" onclick="khAddSubject('${f.id}')">+ New subject</div>`;
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</aside>';

  // RIGHT NOTE
  h+='<section class="kh-note">';
  // Top bar inside note area: reopen button when hidden, or spacer
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;min-height:28px">';
  if(!khTreeVisible){
    h+=`<button class="kh-toggle-btn" onclick="khToggleTree()" title="Show navigation panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Show navigation</button>`;
  }
  h+='</div>';
  const act=khActiveNote();
  if(!act){
    h+=`<div class="kh-empty-note">
      <div class="big">📚</div>
      <p>${khTreeVisible?'Select a note from the left, or create a new one to get started.':'Open the navigation panel to select or create a note.'}</p>
    </div>`;
  } else {
    const {folder,subject,note}=act;
    h+=`<div class="kh-breadcrumb">${escHtml(folder.name)}<span class="sep">/</span>${escHtml(subject.name)}<span class="sep">›</span>${escHtml(note.title||'Untitled')}</div>`;
    h+=`<input class="kh-note-title-input" value="${escHtml(note.title||'').replace(/"/g,'&quot;')}" placeholder="Note Title" oninput="khRenameNote('${note.id}',this.value,true)">`;
    h+=`<div class="kh-add-block-row">
      <button class="kh-add-block-btn" onclick="khAddBlock('${note.id}','full')" title="Add full-width block">+</button>
      <button class="kh-add-block-btn half" onclick="khAddBlock('${note.id}','half')" title="Add half-width block">+ ½</button>
    </div>`;
    h+='<div class="kh-blocks-grid" id="kh-blocks-grid">';
    (note.blocks||[]).forEach(b=>{h+=khRenderBlock(note.id,b);});
    h+='</div>';
  }
  h+='</section>';
  // Floating reopen tab on the left edge (visible only when tree is hidden)
  if(!khTreeVisible){
    h+=`<button class="kh-reopen-tab visible" onclick="khToggleTree()" title="Open navigation panel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;
  }
  h+='</div>';
  return h;
}

function khRenderBlock(noteId,b){
  const w=b.width==='half'?'w-half':'w-full';
  const minH=b.minHeight?`style="min-height:${b.minHeight}px"`:'';
  const color=b.color||KH_COLORS[0];
  return `<div class="kh-block ${w}" data-bid="${b.id}" draggable="true"
    ondragstart="khDragStart(event,'${b.id}')" ondragend="khDragEnd(event)"
    ondragover="khDragOver(event,'${b.id}')" ondragleave="khDragLeave(event)"
    ondrop="khDrop(event,'${noteId}','${b.id}')" ${minH}>
    <div class="kh-block-head">
      <span class="kh-block-drag" title="Drag to reorder">⋮⋮</span>
      <span class="kh-block-dot" style="background:${color}" onclick="khOpenColorPop('${noteId}','${b.id}',event)" title="Change color"></span>
      <input class="kh-block-title-input" value="${escHtml(b.title||'').replace(/"/g,'&quot;')}" placeholder="Block title" oninput="khRenameBlock('${noteId}','${b.id}',this.value)">
      <button class="kh-attach-btn" data-tooltip="Attachments (Coming Soon)" onclick="khAttachClick(event,'${noteId}','${b.id}')" aria-label="Attachments (coming soon)">

      </button>
      <button class="kh-block-menu" onclick="khOpenBlockMenu('${noteId}','${b.id}',event)" title="More">⋯</button>

    <div class="kh-block-content" contenteditable="true" data-placeholder="Type content..." data-bid="${b.id}" data-noteid="${noteId}">${b.html||''}</div>
    <div class="kh-block-resize" onmousedown="khStartResize(event,'${noteId}','${b.id}')"></div>
  </div>`;
}

function khAfterRender(){
  // Wire content editors (save on input, show toolbar on selection)
  document.querySelectorAll('.kh-block-content').forEach(el=>{
    el.addEventListener('input',khOnContentInput);
    el.addEventListener('mouseup',khOnSelection);
    el.addEventListener('keyup',khOnSelection);
    el.addEventListener('blur',khMaybeHideToolbar);
  });
  // Close popovers on outside click
  if(!window._khOutsideBound){
    document.addEventListener('click',khOutsideClick,true);
    window._khOutsideBound=true;
  }
}
function khOnContentInput(e){
  const el=e.target;const bid=el.getAttribute('data-bid');const nid=el.getAttribute('data-noteid');
  const act=khFindNote(nid);if(!act)return;
  const b=act.note.blocks.find(x=>x.id===bid);if(!b)return;
  b.html=el.innerHTML;
  save();
}
function khOutsideClick(e){
  if(khOpenPopover){
    const pop=document.getElementById('kh-popover');
    if(pop&&!pop.contains(e.target)){khOpenPopover=null;pop.remove();}
  }
  const tb=document.getElementById('kh-float-tb');
  if(tb&&!tb.contains(e.target)){
    const ae=document.activeElement;
    if(!ae||!ae.classList||!ae.classList.contains('kh-block-content'))tb.remove();
  }
}

// --- FOLDER / SUBJECT / NOTE CRUD ---
function khAddFolder(){
  const name=prompt('Folder name:');if(!name||!name.trim())return;
  khData().folders.push({id:gid(),name:name.trim(),expanded:true,subjects:[]});
  save();render();
}
function khAddSubject(fid){
  const name=prompt('Subject name:');if(!name||!name.trim())return;
  const f=khData().folders.find(x=>x.id===fid);if(!f)return;
  if(!f.subjects)f.subjects=[];
  f.subjects.push({id:gid(),name:name.trim(),expanded:true,notes:[]});
  save();render();
}
function khAddNote(fid,sid){
  const name=prompt('Note title:','Untitled');if(name===null)return;
  const f=khData().folders.find(x=>x.id===fid);if(!f)return;
  const s=(f.subjects||[]).find(x=>x.id===sid);if(!s)return;
  if(!s.notes)s.notes=[];
  const n={id:gid(),title:name.trim()||'Untitled',blocks:[]};
  s.notes.push(n);khData().activeNoteId=n.id;
  save();render();
}
function khToggleFolder(fid){const f=khData().folders.find(x=>x.id===fid);if(f){f.expanded=!f.expanded;save();render();}}
function khToggleSubject(fid,sid){const f=khData().folders.find(x=>x.id===fid);if(!f)return;const s=(f.subjects||[]).find(x=>x.id===sid);if(s){s.expanded=!s.expanded;save();render();}}
function khOpenNote(nid){khData().activeNoteId=nid;save();render();}

function khFolderMenu(fid,ev){

}
function khSubjectMenu(fid,sid,ev){

  const s=(f.subjects||[]).find(x=>x.id===sid);if(!s)return;

    {label:'Rename',fn:()=>{const n=prompt('Subject name:',s.name);if(n&&n.trim()){s.name=n.trim();save();render();}}},

function khNoteMenu(nid,ev){

function khRenameNote(nid,v,silent){
  const act=khFindNote(nid);if(!act)return;
  act.note.title=v;save();
  if(!silent)render();

  const bc=document.querySelector('.kh-breadcrumb');if(bc)bc.lastChild.textContent=v||'Untitled';

  const row=document.querySelector(`.kh-note-row.active .kh-label`);if(row)row.textContent=v||'Untitled';

function khShowPop(ev,items){
  const existing=document.getElementById('kh-popover');if(existing)existing.remove();
  const btn=ev.currentTarget||ev.target;
  const rect=btn.getBoundingClientRect();
  const pop=document.createElement('div');pop.id='kh-popover';pop.className='kh-block-popmenu';
  pop.style.position='fixed';pop.style.top=(rect.bottom+4)+'px';pop.style.left=Math.max(8,rect.right-150)+'px';
  items.forEach(it=>{
    const b=document.createElement('button');b.textContent=it.label;if(it.danger)b.className='danger';
    b.onclick=(e)=>{e.stopPropagation();it.fn();pop.remove();khOpenPopover=null;};
    pop.appendChild(b);
  });
  document.body.appendChild(pop);khOpenPopover={type:'menu'};
}

// --- BLOCK CRUD ---
function khAddBlock(nid,width){

  act.note.blocks.push({id:gid(),color:KH_COLORS[act.note.blocks.length%KH_COLORS.length],title:'',html:'',width:width||'full'});

}
function khRenameBlock(nid,bid,v){
  const act=khFindNote(nid);if(!act)return;
  const b=act.note.blocks.find(x=>x.id===bid);if(!b)return;
  b.title=v;save();
}
function khOpenColorPop(nid,bid,ev){
  ev.stopPropagation();
  const existing=document.getElementById('kh-popover');if(existing)existing.remove();
  const act=khFindNote(nid);if(!act)return;
  const b=act.note.blocks.find(x=>x.id===bid);if(!b)return;
  const rect=ev.currentTarget.getBoundingClientRect();
  const pop=document.createElement('div');pop.id='kh-popover';pop.className='kh-color-popover';
  pop.style.top=(rect.bottom+6)+'px';pop.style.left=rect.left+'px';
  KH_COLORS.forEach(c=>{
    const sw=document.createElement('div');sw.className='kh-color-swatch'+(c===b.color?' active':'');sw.style.background=c;
    sw.onclick=(e)=>{e.stopPropagation();b.color=c;save();pop.remove();khOpenPopover=null;render();};
    pop.appendChild(sw);
  });

function khOpenBlockMenu(nid,bid,ev){
  ev.stopPropagation();
  const act=khFindNote(nid);if(!act)return;
  const b=act.note.blocks.find(x=>x.id===bid);if(!b)return;
  khShowPop(ev,[
    {label:b.width==='half'?'Make full width':'Make half width',fn:()=>{b.width=b.width==='half'?'full':'half';save();render();}},
    {label:'Duplicate',fn:()=>{const copy={...b,id:gid()};const i=act.note.blocks.findIndex(x=>x.id===bid);act.note.blocks.splice(i+1,0,copy);save();render();}},
    {label:'Delete block',danger:true,fn:()=>{act.note.blocks=act.note.blocks.filter(x=>x.id!==bid);save();render();}}
  ]);
}

// --- DRAG & DROP ---
function khDragStart(ev,bid){khDragBlockId=bid;ev.dataTransfer.effectAllowed='move';try{ev.dataTransfer.setData('text/plain',bid);}catch(_){}ev.currentTarget.classList.add('dragging');}
function khDragEnd(ev){ev.currentTarget.classList.remove('dragging');document.querySelectorAll('.kh-block.drag-over').forEach(el=>el.classList.remove('drag-over'));}
function khDragOver(ev,bid){if(khDragBlockId&&khDragBlockId!==bid){ev.preventDefault();ev.currentTarget.classList.add('drag-over');}}
function khDragLeave(ev){ev.currentTarget.classList.remove('drag-over');}
function khDrop(ev,nid,targetBid){
  ev.preventDefault();ev.currentTarget.classList.remove('drag-over');
  if(!khDragBlockId||khDragBlockId===targetBid)return;
  const act=khFindNote(nid);if(!act)return;
  const arr=act.note.blocks;
  const from=arr.findIndex(x=>x.id===khDragBlockId);
  const to=arr.findIndex(x=>x.id===targetBid);
  if(from<0||to<0)return;
  const [moved]=arr.splice(from,1);
  arr.splice(to,0,moved);
  khDragBlockId=null;save();render();
}

// --- RESIZE ---
function khStartResize(ev,nid,bid){
  ev.preventDefault();
  const el=ev.currentTarget.closest('.kh-block');
  const startY=ev.clientY;
  const startH=el.getBoundingClientRect().height;
  const onMove=(e)=>{const nh=Math.max(80,startH+(e.clientY-startY));el.style.minHeight=nh+'px';};
  const onUp=(e)=>{
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
    const nh=Math.max(80,startH+(e.clientY-startY));
    const act=khFindNote(nid);if(act){const b=act.note.blocks.find(x=>x.id===bid);if(b){b.minHeight=Math.round(nh);save();}}
  };
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
}

// --- FLOATING FORMATTING TOOLBAR ---
function khOnSelection(e){
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed||!sel.rangeCount){khMaybeHideToolbar();return;}
  const range=sel.getRangeAt(0);
  const host=e.currentTarget;
  // Only show for selections inside this block-content
  if(!host.contains(range.commonAncestorContainer))return;
  const rect=range.getBoundingClientRect();
  if(!rect||(!rect.width&&!rect.height))return;
  khShowFloatingToolbar(rect);
}
function khMaybeHideToolbar(){
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed){const tb=document.getElementById('kh-float-tb');if(tb)tb.remove();}
  },150);
}
function khShowFloatingToolbar(rect){
  let tb=document.getElementById('kh-float-tb');
  if(!tb){
    tb=document.createElement('div');tb.id='kh-float-tb';tb.className='kh-float-tb';
    tb.innerHTML=`
      <button onclick="khFmt(event,'bold')" title="Bold" style="font-weight:900">B</button>
      <button onclick="khFmt(event,'underline')" title="Underline" style="text-decoration:underline">U</button>
      <button onclick="khFmt(event,'italic')" title="Italic" style="font-style:italic">I</button>
      <div class="kh-tb-sep"></div>
      <div class="kh-tb-group" onclick="event.stopPropagation();this.classList.toggle('open')">
        <button title="Highlight"><span style="background:#fef08a;color:#333;padding:0 4px;border-radius:3px;font-size:.78rem">H</span></button>
        <div class="kh-tb-sub">${KH_HIGHLIGHTS.map(c=>`<div class="kh-tb-swatch" style="background:${c==='transparent'?'#fff':c};${c==='transparent'?'border:1px solid #888;position:relative':''}" onclick="khFmt(event,'hiliteColor','${c}')">${c==='transparent'?'<span style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#888;font-size:14px\">⊘</span>':''}</div>`).join('')}</div>
      </div>
      <div class="kh-tb-group" onclick="event.stopPropagation();this.classList.toggle('open')">
        <button title="Text color"><span style="color:#ef4444;font-weight:900">A</span></button>
        <div class="kh-tb-sub">${KH_TEXT_COLORS.map(c=>`<div class="kh-tb-swatch" style="background:${c}" onclick="khFmt(event,'foreColor','${c}')"></div>`).join('')}</div>
      </div>`;
    document.body.appendChild(tb);
  }
  // Position above selection
  const tbRect=tb.getBoundingClientRect();
  let top=rect.top-tbRect.height-8;if(top<6)top=rect.bottom+8;
  let left=rect.left+(rect.width/2)-(tbRect.width/2);
  if(left<6)left=6;
  if(left+tbRect.width>window.innerWidth-6)left=window.innerWidth-tbRect.width-6;
  tb.style.top=top+'px';tb.style.left=left+'px';
}

function khFmt(ev,cmd,arg){

  }
}

  if(plFilter.minRating)out=out.filter(e=>(e.rating||0)>=plFilter.minRating);
  if(plFilter.verifiedOnly)out=out.filter(e=>(e.badges||[]).includes('verified'));
  if(q)out=out.filter(e=>(e.title||'').toLowerCase().includes(q)||(e.description||'').toLowerCase().includes(q)||(e.creator||'').toLowerCase().includes(q));
  if(plFilter.mostUsed)out.sort((a,b)=>(b.users||0)-(a.users||0));
  else out.sort((a,b)=>(b.rating||0)-(a.rating||0));
  return out;
}

function plFilterGroup(title,key,values,labels){
  let h=`<div class="pl-filter-group"><div class="pl-side-title">${escHtml(title)}</div>`;
  h+=`<label><input type="radio" name="pl-${key}" ${!plFilter[key]?'checked':''} onchange="plFilter['${key}']='';render()"> All</label>`;
  values.forEach((v,i)=>{
    const lbl=labels?labels[i]:v;
    h+=`<label><input type="radio" name="pl-${key}" ${plFilter[key]===v?'checked':''} onchange="plFilter['${key}']='${escJs(v)}';render()"> ${escHtml(lbl)}</label>`;
  });
  h+='</div>';
  return h;
}

function plPickRate(n){window._plPickingRate=n;document.querySelectorAll('#pl-rate-stars span').forEach(s=>{s.style.opacity=(parseInt(s.getAttribute('data-r'),10)<=n)?1:.3;});}
function plSaveRating(eid){
  const n=window._plPickingRate||0;if(!n)return alert('Pick a rating');
  const e=plData().entries.find(x=>x.id===eid);if(!e)return;
  const prev=plData().myRatings[eid];
  const totalScore=(e.rating||0)*(e.ratingCount||0);
  if(prev){
    // Update
    e.rating=((totalScore-prev+n)/(e.ratingCount||1));
  } else {
    e.ratingCount=(e.ratingCount||0)+1;
    e.rating=(totalScore+n)/e.ratingCount;
  }
  plData().myRatings[eid]=n;
  save();closeModal();render();
}

function plPubOnType(){
  const type=document.getElementById('pl-pub-type').value;
  const w=document.getElementById('pl-pub-source');
  if(!type){w.style.display='none';return;}
  w.style.display='';
  if(type==='course'){
    const courses=getAllCoursesMeta();
    w.innerHTML=`<label class="form-label">Pick one of your courses</label>
      <select class="form-control" id="pl-pub-src"><option value="">— Select —</option>${courses.map(c=>`<option value="${c.id}">${escHtml(c.name)}</option>`).join('')}</select>
      <div style="font-size:.72rem;color:var(--text-light);margin-top:4px">A snapshot of the course and its subjects/lectures will be shared. Your original is not affected.</div>`;
  } else if(type==='subject'){
    const courses=getAllCoursesMeta();
    w.innerHTML=`<label class="form-label">Course</label>
      <select class="form-control" id="pl-pub-src-course" onchange="plPubFillSubjects()"><option value="">— Select —</option>${courses.map(c=>`<option value="${c.id}">${escHtml(c.name)}</option>`).join('')}</select>
      <label class="form-label" style="margin-top:8px">Subject</label>
      <select class="form-control" id="pl-pub-src"><option value="">— Select a course first —</option></select>`;
  } else if(type==='round'){
    const rounds=(S.studyRounds||[]);
    w.innerHTML=`<label class="form-label">Pick a study round</label>
      <select class="form-control" id="pl-pub-src"><option value="">— Select —</option>${rounds.map(r=>`<option value="${r.id}">${escHtml(r.title||'Untitled round')}</option>`).join('')}</select>
      ${rounds.length?'':'<div style="font-size:.78rem;color:var(--text-light);margin-top:4px">You don\'t have any study rounds yet.</div>'}`;
  } else if(type==='note'){
    const notes=[];(S.knowledgeHub.folders||[]).forEach(f=>(f.subjects||[]).forEach(s=>(s.notes||[]).forEach(n=>notes.push({id:n.id,label:`${f.name} › ${s.name} › ${n.title||'Untitled'}`}))));
    w.innerHTML=`<label class="form-label">Pick a note</label>
      <select class="form-control" id="pl-pub-src"><option value="">— Select —</option>${notes.map(n=>`<option value="${n.id}">${escHtml(n.label)}</option>`).join('')}</select>
      ${notes.length?'':'<div style="font-size:.78rem;color:var(--text-light);margin-top:4px">No notes in Knowledge Hub yet.</div>'}`;

function plPubFillSubjects(){
  const cid=document.getElementById('pl-pub-src-course').value;
  const sub=document.getElementById('pl-pub-src');if(!sub)return;
  if(!cid){sub.innerHTML='<option value="">— Select a course first —</option>';return;}
  const subjects=plCollectSubjectsOfCourse(cid);
  sub.innerHTML='<option value="">— Select —</option>'+subjects.map(s=>`<option value="${escHtml(s.name)}">${escHtml(s.name)}</option>`).join('');
}
function plCollectSubjectsOfCourse(cid){
  const map={};
  const lecs=(typeof getLecs==='function')?getLecs(cid):(COURSES_LECTURES[cid]||[]);
  lecs.forEach(l=>{const sn=l.subject||'General';if(!map[sn])map[sn]={name:sn,lectures:[]};map[sn].lectures.push(l.title||'');});
  (S.extraSubjects[cid]||[]).forEach(sn=>{if(!map[sn])map[sn]={name:sn,lectures:[]};});
  return Object.values(map);
}

function plDoPublish(){
  const type=document.getElementById('pl-pub-type').value;
  if(!type)return alert('Pick a type.');
  const title=(document.getElementById('pl-pub-title').value||'').trim();
  const university=(document.getElementById('pl-pub-uni').value||'').trim();
  const year=(document.getElementById('pl-pub-year').value||'').trim();
  const course=(document.getElementById('pl-pub-course').value||'').trim();
  const creator=(document.getElementById('pl-pub-creator').value||'You').trim();
  const description=(document.getElementById('pl-pub-desc').value||'').trim();
  if(!title||!university||!year)return alert('Title, University, and Year are required.');
  let data=null,finalTitle=title,finalCourse=course;
  if(type==='course'){
    const cid=(document.getElementById('pl-pub-src')||{}).value;if(!cid)return alert('Pick a course.');
    const meta=getAllCoursesMeta().find(c=>c.id===cid);if(!meta)return;
    data={courseName:meta.name,courseDesc:meta.desc||'',subjects:plCollectSubjectsOfCourse(cid)};
    if(!finalCourse)finalCourse=meta.name;
  } else if(type==='subject'){
    const cid=(document.getElementById('pl-pub-src-course')||{}).value;const sname=(document.getElementById('pl-pub-src')||{}).value;
    if(!cid||!sname)return alert('Pick course + subject.');
    const subs=plCollectSubjectsOfCourse(cid);const s=subs.find(x=>x.name===sname);if(!s)return;
    data={name:s.name,lectures:s.lectures};
  } else if(type==='round'){
    const rid=(document.getElementById('pl-pub-src')||{}).value;if(!rid)return alert('Pick a round.');
    const r=(S.studyRounds||[]).find(x=>x.id===rid);if(!r)return;
    // Deep copy (strip internal IDs)
    data=JSON.parse(JSON.stringify({title:r.title,days:(r.days||[]).map(d=>({tasks:(d.tasks||[]).map(t=>({kind:t.kind,title:t.title||t.lectureTitle||'',subject:t.subject||'',week:t.week||'',courseId:t.courseId||'',lectureId:t.lectureId||''}))}))}));
  } else if(type==='note'){
    const nid=(document.getElementById('pl-pub-src')||{}).value;if(!nid)return alert('Pick a note.');
    const act=khFindNote(nid);if(!act)return;
    data=JSON.parse(JSON.stringify({title:act.note.title,blocks:act.note.blocks||[]}));
  }
  const entry={id:gid(),type,title:finalTitle,university,year,course:finalCourse,creator,createdAt:Date.now(),rating:0,ratingCount:0,users:0,badges:[],description,data};
  plData().entries.unshift(entry);
  save();closeModal();alert('Published to Public Library.');render();
}

// --- IMPORT ---
function plImportEntry(eid){
  const e=plData().entries.find(x=>x.id===eid);if(!e)return;
  if(!confirm(`Import "${e.title}" as an editable copy into your account?`))return;
  const d=e.data||{};
  if(e.type==='course'){
    const newId='lib_'+gid();
    S.customCourses.push({id:newId,name:d.courseName||e.title,desc:d.courseDesc||e.description||'',color:'#4299e1'});
    COURSES_LECTURES[newId]=[];
    // Create subjects + lectures
    (d.subjects||[]).forEach(sub=>{
      (sub.lectures||[]).forEach(lt=>{
        COURSES_LECTURES[newId].push({id:gid(),title:lt,subject:sub.name,date:''});
      });
      if(!(sub.lectures||[]).length){S.extraSubjects[newId]=S.extraSubjects[newId]||[];if(!S.extraSubjects[newId].includes(sub.name))S.extraSubjects[newId].push(sub.name);}
    });
    S.lectureStore[newId]=COURSES_LECTURES[newId].slice();
    S.unlockedCourses.push(newId);
  } else if(e.type==='subject'){
    // Ask which course to put it into
    const courses=getAllCoursesMeta();
    const cid=prompt('Import subject "'+d.name+'" into which course? Type the course name exactly:\n'+courses.map(c=>'• '+c.name).join('\n'));
    if(!cid)return;
    const meta=courses.find(c=>c.name.toLowerCase()===cid.toLowerCase());
    if(!meta)return alert('Course not found.');
    if(!COURSES_LECTURES[meta.id])COURSES_LECTURES[meta.id]=[];
    (d.lectures||[]).forEach(lt=>COURSES_LECTURES[meta.id].push({id:gid(),title:lt,subject:d.name,date:''}));
    if(!(d.lectures||[]).length){S.extraSubjects[meta.id]=S.extraSubjects[meta.id]||[];if(!S.extraSubjects[meta.id].includes(d.name))S.extraSubjects[meta.id].push(d.name);}
    S.lectureStore[meta.id]=COURSES_LECTURES[meta.id].slice();
  } else if(e.type==='round'){
    const copy=JSON.parse(JSON.stringify(d));
    const newRound={id:gid(),title:(copy.title||e.title)+' (imported)',days:(copy.days||[]).map(dd=>({tasks:(dd.tasks||[]).map(t=>({id:gid(),kind:t.kind||'custom',title:t.title||'',subject:t.subject||'',week:t.week||'',courseId:'',lectureId:''}))}))};
    if(!Array.isArray(S.studyRounds))S.studyRounds=[];
    S.studyRounds.push(newRound);
  } else if(e.type==='note'){
    // Place into / Imported folder in Knowledge Hub
    let folder=S.knowledgeHub.folders.find(f=>f.name==='Imported from Library');
    if(!folder){folder={id:gid(),name:'Imported from Library',expanded:true,subjects:[]};S.knowledgeHub.folders.push(folder);}
    let subject=folder.subjects.find(s=>s.name===(e.course||'General'));
    if(!subject){subject={id:gid(),name:e.course||'General',expanded:true,notes:[]};folder.subjects.push(subject);}
    const note={id:gid(),title:(d.title||e.title)+' (imported)',blocks:(d.blocks||[]).map(b=>({...b,id:gid()}))};
    subject.notes.push(note);
    S.knowledgeHub.activeNoteId=note.id;
  }
  // Increment usage + mark imported
  e.users=(e.users||0)+1;
  plData().myImports[eid]=Date.now();
  save();
  alert('Imported into your account. You can now edit your copy freely.');
  render();
}

// ============ CALENDAR HELPERS ============
function chgMonth(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCalendarInPlace();}
function goToday(){const d=new Date();calM=d.getMonth();calY=d.getFullYear();selDate=today();todoDate=today();renderCalendarInPlace();}
function selDateFn(ds){calSelectDayInPlace(ds);}
function chgTodo(d){
  // Advance/retreat by one day and keep both panels in sync
  todoDate=addDays(todoDate,d);
  selDate=todoDate;

  // If the new date is in a different month than the calendar is showing, navigate there
  var nd=new Date(todoDate+'T00:00:00');
  var newM=nd.getMonth(), newY=nd.getFullYear();
  if(newM!==calM||newY!==calY){
    calM=newM; calY=newY;
    // Full calendar panel swap (month changed), then update planner
    renderCalendarInPlace();
    updatePlannerPanel();
  } else {
    // Same month — just update selected class on calendar + re-render planner
    var prev=document.querySelector('.cal-day-dnd.selected');
    if(prev)prev.classList.remove('selected');
    var next=document.querySelector('.cal-day-dnd[data-date="'+todoDate+'"]');
    if(next)next.classList.add('selected');
    updatePlannerPanel();
  }
}
function plannerGoToday(){
  // Navigate planner and calendar back to today
  var t=today();
  todoDate=t; selDate=t;
  var td=new Date(t+'T00:00:00');
  var newM=td.getMonth(), newY=td.getFullYear();
  if(newM!==calM||newY!==calY){
    calM=newM; calY=newY;
    renderCalendarInPlace();
    updatePlannerPanel();
  } else {
    var prev=document.querySelector('.cal-day-dnd.selected');
    if(prev)prev.classList.remove('selected');
    var next=document.querySelector('.cal-day-dnd[data-date="'+t+'"]');
    if(next)next.classList.add('selected');
    updatePlannerPanel();
  }
}

    lecsInSubj.forEach(l=>{delete S.revisions[l.id];});

    S.events=S.events.filter(e=>!lecsInSubj.some(l=>l.id===e.lectureId));

    if(!confirm(`Remove empty subject "${name}"?`))return;

  if(S.extraSubjects&&S.extraSubjects[cid])S.extraSubjects[cid]=S.extraSubjects[cid].filter(s=>s!==name);
